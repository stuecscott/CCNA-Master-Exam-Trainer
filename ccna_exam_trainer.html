{topic:3,diff:'easy',type:'Multiple Choice',
q:'What is a VLAN and what problem does it solve?',
opts:['A virtual WAN connection between offices','A logical grouping of devices into separate broadcast domains on a physical switch, reducing broadcast traffic and improving security','A type of routing protocol','A method to increase port speed on a switch'],
ans:1,
hint:'Think about what happens when every device on a switch receives every broadcast.',
correct_fb:'A <strong>VLAN (Virtual Local Area Network)</strong> creates logical broadcast domains on a physical switch. Without VLANs, all devices on a switch share one broadcast domain — every broadcast reaches every device. VLANs solve this by isolating groups: Sales in VLAN 10, Engineering in VLAN 20. Benefits: security, reduced broadcast traffic, organizational flexibility, and improved performance.',
wrong_fb:'VLANs create <strong>separate logical broadcast domains on one physical switch</strong>. Benefits: (1) Security — VLANs isolate sensitive departments, (2) Broadcast control — broadcasts stay within VLANs, (3) Flexibility — group devices logically, not physically, (4) Cost savings — fewer physical switches needed. Communication between VLANs requires a Layer 3 device (router or L3 switch).'
},
{topic:3,diff:'easy',type:'Multiple Choice',
q:'What is the default VLAN on a Cisco switch?',
opts:['VLAN 0','VLAN 1','VLAN 10','VLAN 100'],
ans:1,
hint:'All ports are assigned to this VLAN by default when a switch is first powered on.',
correct_fb:'<strong>VLAN 1</strong> is the default VLAN on all Cisco switches. All ports are assigned to VLAN 1 by default. VLAN 1 also carries management traffic (CDP, VTP, STP BPDUs) by default. Best practice: do NOT use VLAN 1 for user data — create dedicated VLANs for different groups and change the native VLAN to an unused VLAN for security.',
wrong_fb:'<strong>VLAN 1 = Cisco default VLAN</strong>. All ports start in VLAN 1. VLAN 1 carries control plane traffic (CDP, VTP, PVSTs). Reserved VLANs: 1002-1005 (Token Ring/FDDI legacy). VLANs 1006-4094 are extended range VLANs. Best practice: use VLAN 1 only for management and never for user data (security principle).'
},
{topic:3,diff:'medium',type:'Multiple Choice',
q:'What command assigns a switch port to VLAN 20?',
opts:['switchport vlan 20','switchport access vlan 20','vlan 20 interface','set port vlan 20'],
ans:1,
hint:'First you must set the port to access mode, then assign the VLAN.',
correct_fb:'The correct commands are:\n<strong>switchport mode access</strong>\n<strong>switchport access vlan 20</strong>\n\nFirst set the port to access mode (ensures it carries only one VLAN), then assign it to VLAN 20. If VLAN 20 doesn\'t exist, it will be created automatically on the switch. Verify with "show vlan brief".',
wrong_fb:'Correct VLAN assignment:\n<strong>interface GigabitEthernet0/1</strong>\n<strong>switchport mode access</strong>\n<strong>switchport access vlan 20</strong>\n\n"switchport mode access" sets the port type. "switchport access vlan 20" assigns the VLAN. If VLAN 20 doesn\'t exist, it\'s created. Verify: "show vlan brief" to confirm port-to-VLAN mapping.'
},
{topic:3,diff:'medium',type:'Multiple Choice',
q:'What is the native VLAN, and what is the default native VLAN on Cisco switches?',
opts:['A VLAN used only for routing; default is VLAN 10','The VLAN whose traffic is sent UNTAGGED on a trunk link; default is VLAN 1','The highest-priority VLAN on a trunk; default is VLAN 100','A backup VLAN activated only during failover; default is VLAN 0'],
ans:1,
hint:'On a trunk, most VLAN traffic gets an 802.1Q tag — but one VLAN\'s traffic goes untagged.',
correct_fb:'The <strong>native VLAN</strong> is the VLAN whose traffic traverses a trunk link <strong>without an 802.1Q tag</strong>. By default, this is <strong>VLAN 1</strong>. Untagged frames arriving on a trunk are assumed to belong to the native VLAN. The native VLAN must match on both ends of a trunk — a mismatch causes a native VLAN mismatch warning and potential connectivity/security issues.',
wrong_fb:'Native VLAN = <strong>untagged VLAN on a trunk; default VLAN 1</strong>. 802.1Q trunks tag every VLAN\'s traffic EXCEPT the native VLAN. Why? Legacy devices that don\'t understand 802.1Q can still communicate. Security best practice: change the native VLAN to an unused VLAN (e.g., VLAN 999) to prevent VLAN hopping attacks. Match native VLAN on both ends of every trunk.'
},
{topic:3,diff:'hard',type:'Scenario',
q:`A switch port is configured:\ninterface GigabitEthernet0/1\n switchport trunk allowed vlan 10,20,30\n\nA user in VLAN 40 cannot communicate across this trunk. Why?`,
opts:['VLAN 40 has not been created on the switch','The port is not in trunk mode','VLAN 40 is not in the allowed VLAN list','VLAN 40 requires a different encapsulation'],
ans:2,
hint:'Look at the "allowed vlan" list carefully.',
correct_fb:'VLAN 40 is <strong>not in the allowed VLAN list</strong> on this trunk. The command "switchport trunk allowed vlan 10,20,30" explicitly permits ONLY VLANs 10, 20, and 30. VLAN 40 traffic is blocked. Fix: "switchport trunk allowed vlan add 40". Verify with "show interfaces trunk" to see the allowed VLAN list.',
wrong_fb:'VLAN 40 is <strong>excluded from the allowed VLAN list</strong>. The trunk only passes VLANs 10, 20, 30. To add VLAN 40: "switchport trunk allowed vlan add 40". To see active VLANs on the trunk: "show interfaces trunk". Common mistake: using "switchport trunk allowed vlan 40" which REPLACES the list (removes 10, 20, 30). Always use "add" to append.'
},
{topic:3,diff:'medium',type:'Multiple Choice',
q:'What is VTP (VLAN Trunking Protocol) and what does it do?',
opts:['A protocol that trunks VLANs across WAN links','A Cisco proprietary protocol that propagates VLAN configuration from a VTP server to client switches automatically','A protocol that determines which VLANs are allowed on a trunk','A replacement for STP that prevents VLAN loops'],
ans:1,
hint:'It reduces the administrative burden of configuring the same VLANs on every switch.',
correct_fb:'<strong>VTP</strong> is a Cisco proprietary protocol that automatically synchronizes VLAN configurations across a network. A VTP server creates/deletes VLANs — changes propagate to all VTP client switches in the same domain. VTP modes: Server (creates, modifies VLANs), Client (receives, cannot modify), Transparent (passes VTP but maintains local VLANs). Danger: a new switch with high revision number can wipe VLAN configs.',
wrong_fb:'<strong>VTP (VLAN Trunking Protocol)</strong> = Cisco VLAN management protocol. Server creates VLANs → propagates to all Client switches via trunk links. Modes: Server (default), Client (read-only), Transparent (forwards VTP but uses local VLAN DB). VTP danger: adding a switch with higher revision number can overwrite the entire network\'s VLAN database. Many admins use VTP transparent or disable it entirely.'
},
{topic:3,diff:'hard',type:'Multiple Choice',
q:'What is the primary security risk of leaving the native VLAN as VLAN 1?',
opts:['Performance degradation from too many broadcasts','VLAN hopping — an attacker can send double-tagged frames to cross VLAN boundaries','Routing loops in STP','Authentication failures on trunk links'],
ans:1,
hint:'Attackers can exploit how native VLAN traffic is handled to jump between VLANs.',
correct_fb:'<strong>VLAN hopping</strong> via double-tagging. An attacker connected to an access port on VLAN 1 (native VLAN) crafts a frame with TWO 802.1Q tags: outer tag=VLAN 1 (native, stripped at first switch), inner tag=target VLAN 20. The first switch strips the outer tag (native) and forwards it. The second switch sees only the inner tag and delivers to VLAN 20. Fix: change native VLAN to unused VLAN (e.g., VLAN 999).',
wrong_fb:'<strong>VLAN hopping via double-tagging</strong>. Attacker sends: [VLAN1 tag][VLAN20 tag][payload]. Switch 1 strips VLAN1 tag (native, untagged). Switch 2 sees VLAN20 tag and delivers to VLAN 20 — bypassing segmentation. Prevention: change native VLAN to unused VLAN (999), set access ports to non-native VLANs, and use "switchport nonegotiate" to disable DTP.'
},
{topic:3,diff:'medium',type:'Multiple Choice',
q:'In a Layer 3 switch inter-VLAN routing configuration, what is an SVI (Switched Virtual Interface)?',
opts:['A physical port configured for routing','A virtual interface created for each VLAN that serves as the default gateway for that VLAN','A trunk link between Layer 3 switches','An OSPF virtual link for inter-area routing'],
ans:1,
hint:'Layer 3 switches don\'t need a physical router — they route between VLANs internally.',
correct_fb:'An <strong>SVI (Switched Virtual Interface)</strong> is a virtual Layer 3 interface created on a Layer 3 switch for each VLAN. The SVI IP address serves as the <strong>default gateway</strong> for hosts in that VLAN. Configuration: "interface Vlan10" → "ip address 10.0.10.1 255.255.255.0". Enable routing with "ip routing". SVIs route between VLANs in hardware (ASIC) — much faster than router-on-a-stick.',
wrong_fb:'<strong>SVI = virtual Layer 3 interface on a multilayer switch</strong>. Each VLAN gets an SVI with an IP address. That IP becomes the default gateway for hosts in the VLAN. Config:\n"interface Vlan10\n ip address 192.168.10.1 255.255.255.0"\nPlus: "ip routing" globally. SVIs route in hardware — much more efficient than router-on-a-stick for large LANs. Verify: "show ip interface brief" shows Vlan10 interface.'
},
{topic:3,diff:'easy',type:'Multiple Choice',
q:'Which command shows all VLANs configured on a Cisco switch and which ports belong to each?',
opts:['show vlan','show vlan brief','show interfaces trunk','show vlan database'],
ans:1,
hint:'The "brief" version gives a clean summary table.',
correct_fb:'"<strong>show vlan brief</strong>" displays all VLANs, their status (active/inactive), and the ports assigned to each VLAN in a concise table format. "show vlan" shows the same information but with more detail. Note: trunk ports are NOT shown in this output — they appear in "show interfaces trunk" instead.',
wrong_fb:'"<strong>show vlan brief</strong>" = concise VLAN table with ports. Key: trunk ports do NOT appear here. Full output: "show vlan" shows same but verbose. "show interfaces trunk" shows trunk-specific details. "show vlan database" is used in older IOS. The CCNA exam frequently tests which show command to use for specific information.'
},
{topic:3,diff:'hard',type:'Scenario',
q:`Two switches are connected. SW1 port is "dynamic desirable." SW2 port is "dynamic auto." Will a trunk form?`,
opts:['No — both must be set to "trunk" manually','Yes — dynamic desirable actively negotiates; dynamic auto will respond and accept','No — dynamic auto never forms trunks','Yes — but only if VLAN 1 is the native VLAN'],
ans:1,
hint:'One side is actively seeking to trunk, one side is passively waiting — what happens when they meet?',
correct_fb:'<strong>Yes, a trunk forms</strong>. "Dynamic desirable" actively tries to negotiate trunking. "Dynamic auto" will passively accept if the other side initiates. Desirable + Auto = <strong>Trunk</strong>. DTP negotiation matrix: Trunk+anything=Trunk, Desirable+Desirable=Trunk, Desirable+Auto=Trunk, Auto+Auto=Access, Access+anything=Access.',
wrong_fb:'<strong>Trunk forms</strong>. DTP results: Trunk|Desirable|Auto paired with: Trunk=always trunk, Desirable=trunk, Auto=access. But Desirable+Auto=<strong>trunk</strong> (desirable actively initiates, auto accepts). Auto+Auto=access link. Best practice: use "switchport mode trunk" explicitly rather than relying on DTP negotiation. Disable DTP on non-trunking ports with "switchport nonegotiate".'
},
{topic:3,diff:'medium',type:'Multiple Choice',
q:'What is the purpose of the "switchport nonegotiate" command?',
opts:['Forces the port to become a trunk','Disables DTP, preventing the port from negotiating trunking with neighbors','Sets the port speed to auto-negotiate','Prevents VLAN assignment changes'],
ans:1,
hint:'Security best practice for ports that should not participate in trunk negotiation.',
correct_fb:'"<strong>switchport nonegotiate</strong>" disables DTP (Dynamic Trunking Protocol) on the port, preventing it from sending or responding to DTP frames. This is a security best practice — you don\'t want end devices potentially negotiating a trunk. Used on access ports facing hosts, or on trunk ports connecting to non-Cisco devices that don\'t understand DTP.',
wrong_fb:'"<strong>switchport nonegotiate</strong>" = disable DTP. Prevents the port from sending DTP frames to negotiate trunking. Use it on: (1) access ports facing end-user devices (security), (2) trunk ports connecting to non-Cisco switches (compatibility). Without this, an attacker could try to negotiate a trunk with their device to access all VLANs. Always combine with explicit "switchport mode access" or "trunk".'
},
{topic:3,diff:'hard',type:'Multiple Choice',
q:'A frame arrives on a trunk port without an 802.1Q tag. Which VLAN does the switch assign it to?',
opts:['VLAN 1 always','The native VLAN configured on that trunk port','It is dropped — all frames on trunks must be tagged','The highest-numbered VLAN on the switch'],
ans:1,
hint:'One VLAN on every trunk is designated for untagged traffic.',
correct_fb:'Untagged frames on a trunk are assigned to the <strong>native VLAN</strong> of that trunk port. By default, this is VLAN 1. This is how the native VLAN works — its traffic is not tagged (or optionally tagged with dot1q native keyword). Devices not supporting 802.1Q can communicate via the native VLAN. This behavior is also the basis for the VLAN hopping double-tagging attack.',
wrong_fb:'Untagged trunk frames → <strong>native VLAN</strong>. Default native = VLAN 1. This allows legacy devices that don\'t understand 802.1Q to communicate on the native VLAN without tagging. Change the native VLAN with: "switchport trunk native vlan [n]". Verify the native VLAN on both trunk ends with "show interfaces trunk" — mismatches cause CDP warnings and connectivity issues.'
},
// ── TOPIC 4: ACLs — additional 33 questions ──
{topic:4,diff:'easy',type:'Multiple Choice',
q:'What is the number range for standard IP ACLs on Cisco routers?',
opts:['1-99','100-199','1000-1099','200-299'],
ans:0,
hint:'Standard ACLs use a lower number range than extended.',
correct_fb:'Standard IP ACLs use numbers <strong>1-99</strong> (and 1300-1999 for additional named-style). Extended ACLs use 100-199 (and 2000-2699). Named ACLs use names instead of numbers and can be standard or extended. Standard ACLs filter ONLY on source IP address.',
wrong_fb:'Standard ACLs: <strong>1-99</strong> (also 1300-1999 extended range). Extended ACLs: 100-199 (also 2000-2699). Named ACLs use names. Number range is a classic CCNA exam question. Remember: low numbers (1-99) = standard (source only). Higher numbers (100-199) = extended (source, destination, protocol, port).'
},
{topic:4,diff:'medium',type:'Multiple Choice',
q:'Which ACL statement correctly permits all traffic from host 192.168.5.10?',
opts:['access-list 50 permit 192.168.5.10 0.0.0.0','access-list 50 permit host 192.168.5.10','access-list 150 permit any host 192.168.5.10','Both A and B are correct'],
ans:3,
hint:'There are two equivalent ways to specify a single host in an ACL.',
correct_fb:'<strong>Both A and B are correct</strong>. "host 192.168.5.10" is shorthand for wildcard "0.0.0.0" (match this exact IP). "192.168.5.10 0.0.0.0" explicitly uses the wildcard. Both produce identical results. Option C is wrong because: (1) it\'s an extended ACL (150), (2) "any" and "host" positions are swapped.',
wrong_fb:'<strong>Both A and B are correct</strong>. In Cisco ACLs: "<strong>host [IP]</strong>" = shorthand for "[IP] 0.0.0.0" (exact match). So "permit host 192.168.5.10" and "permit 192.168.5.10 0.0.0.0" are functionally identical. Similarly, "<strong>any</strong>" = shorthand for "0.0.0.0 255.255.255.255" (match everything). Always use "host" and "any" keywords for clarity.'
},
{topic:4,diff:'hard',type:'Scenario',
q:`This ACL is applied inbound on a router interface:\naccess-list 101 permit tcp 10.0.0.0 0.0.0.255 any eq 80\naccess-list 101 permit tcp 10.0.0.0 0.0.0.255 any eq 443\n\nA host at 10.0.0.5 tries to ping 8.8.8.8. What happens?`,
opts:['The ping succeeds — ICMP is allowed by default','The ping fails — ICMP is not in the ACL and is blocked by the implicit deny','The ping succeeds — the any keyword covers all traffic','The ping is redirected to the DNS server'],
ans:1,
hint:'What does the implicit deny at the end of every ACL do to unmatched traffic?',
correct_fb:'The ping <strong>fails</strong>. The ACL permits only TCP port 80 (HTTP) and TCP port 443 (HTTPS) from 10.0.0.0/24. ICMP (used by ping) is not permitted. The <strong>implicit deny ip any any</strong> at the end blocks ALL other traffic including ICMP. To allow ping, add: "access-list 101 permit icmp 10.0.0.0 0.0.0.255 any".',
wrong_fb:'Ping <strong>fails</strong>. The implicit deny blocks anything not explicitly permitted. ICMP (ping) is not listed — it\'s denied. The ACL only permits TCP/80 and TCP/443 from that subnet. Fix: add "access-list 101 permit icmp 10.0.0.0 0.0.0.255 any". This is one of the most common misconfigurations — forgetting to permit ICMP when locking down an interface with an extended ACL.'
},
{topic:4,diff:'medium',type:'Multiple Choice',
q:'Which direction should an ACL be applied to filter traffic entering a router from the internet?',
opts:['Outbound on the external interface','Inbound on the external interface','Inbound on all internal interfaces','Outbound on all internal interfaces'],
ans:1,
hint:'Filter traffic as early as possible — before it wastes router resources.',
correct_fb:'Apply the ACL <strong>inbound on the external (internet-facing) interface</strong>. This filters traffic from the internet BEFORE the router processes it, preventing unwanted packets from consuming router CPU and memory. Inbound ACLs are checked before the routing decision. Outbound ACLs are checked after the routing decision — useful for filtering specific outbound flows.',
wrong_fb:'<strong>Inbound on the external interface</strong>. Filter internet traffic as it enters the router — this prevents malicious packets from even being processed by the routing engine. Inbound = checked before routing decision. Outbound = checked after routing decision (before sending out an interface). For protection from the internet, always apply inbound on the internet-facing interface.'
},
{topic:4,diff:'hard',type:'Multiple Choice',
q:'An ACL has these rules in order:\n1. deny tcp 192.168.1.0 0.0.0.255 any eq 23\n2. permit ip 192.168.1.0 0.0.0.255 any\n3. deny ip any any\n\nA host at 192.168.1.50 tries Telnet to 10.0.0.1. What happens?',
opts:['Permitted — rule 2 allows all IP','Denied — rule 1 blocks Telnet (port 23) first','Permitted — Telnet is TCP not IP','Denied — rule 3 blocks everything'],
ans:1,
hint:'ACLs are processed top-to-bottom, first match wins.',
correct_fb:'<strong>Denied by rule 1</strong>. ACLs process top-to-bottom, first match wins. Telnet uses TCP port 23. Rule 1 explicitly denies TCP/23 from 192.168.1.0/24 — this matches first and the packet is dropped. Rule 2 (permit ip) would allow it, but the router never reaches rule 2 because rule 1 matched first.',
wrong_fb:'<strong>Denied by rule 1</strong>. ACL processing: sequential, first match wins, no further rules checked. Telnet = TCP/23. Rule 1: "deny tcp 192.168.1.0 0.0.0.255 any eq 23" — matches! Telnet denied. Rule 2 never evaluated. This is the fundamental ACL processing rule: <strong>order matters</strong>. You cannot add a deny above an existing permit for the same traffic — you must rewrite the entire ACL.'
},
{topic:4,diff:'medium',type:'Multiple Choice',
q:'How do you verify that an ACL is being matched by traffic on a Cisco router?',
opts:['show ip access-lists','show interfaces','show ip route','show running-config'],
ans:0,
hint:'You want to see the hit counts for each ACL entry.',
correct_fb:'"<strong>show ip access-lists</strong>" displays all ACLs with <strong>match counts</strong> for each line. Example: "permit tcp any any eq 80 (143 matches)". If a line has 0 matches, either no traffic has hit it or it\'s unreachable (a higher rule catches all traffic first). This is the primary ACL troubleshooting tool. "clear ip access-list counters" resets counts.',
wrong_fb:'"<strong>show ip access-lists</strong>" shows ACL entries with match counts. Use it to verify an ACL is working. If a line shows "(0 matches)" when you expect traffic — either the wrong ACL is applied, it\'s on the wrong interface/direction, or an earlier rule is catching the traffic. Reset counts with "clear ip access-list counters [acl-name/number]".'
},
{topic:4,diff:'hard',type:'Multiple Choice',
q:'What is a "named ACL" and what advantage does it offer over numbered ACLs?',
opts:['Named ACLs support more entries','Named ACLs allow individual lines to be deleted without removing the entire ACL, and have descriptive names','Named ACLs work on switches but numbered ACLs do not','Named ACLs automatically apply to all interfaces'],
ans:1,
hint:'The key operational advantage is the ability to edit specific lines.',
correct_fb:'<strong>Named ACLs</strong> have two key advantages: (1) <strong>Descriptive names</strong> (e.g., "BLOCK_TELNET") instead of numbers for clarity. (2) <strong>Individual line editing</strong> — you can delete or insert specific lines using sequence numbers without rewriting the entire ACL. Numbered ACLs require you to delete the entire ACL and rewrite it to make changes.',
wrong_fb:'Named ACLs: (1) <strong>human-readable names</strong> for documentation, (2) <strong>line-level editing</strong> using sequence numbers. With numbered ACLs, any change requires "no access-list [n]" (delete all) and full rewrite. With named ACLs: "ip access-list extended WEBFILTER" then "no 30" removes line 30, or "15 permit tcp..." inserts a new line at sequence 15. Critical for production management.'
},
{topic:4,diff:'easy',type:'Multiple Choice',
q:'What keyword in an ACL matches ALL IP addresses?',
opts:['all','host','any','0.0.0.0'],
ans:2,
hint:'This single keyword represents the wildcard "match everything" in ACL syntax.',
correct_fb:'"<strong>any</strong>" matches all IP addresses. It is shorthand for the wildcard mask "0.0.0.0 255.255.255.255". Example: "permit ip any any" = allow all IP traffic from any source to any destination. "deny ip any any" = block everything (same as the implicit deny at the end of every ACL).',
wrong_fb:'"<strong>any</strong>" = all IPs = "0.0.0.0 255.255.255.255". Two key ACL keywords: "<strong>host [IP]</strong>" = specific single IP (wildcard 0.0.0.0). "<strong>any</strong>" = all IPs (wildcard 255.255.255.255). Common uses: "permit ip any any" (allow all), "deny tcp any host 10.0.0.1 eq 23" (block Telnet to specific server from any source).'
},
{topic:4,diff:'hard',type:'Scenario',
q:'An administrator wants to permit only SSH (port 22) from the management network 10.10.10.0/24 to any destination. Which ACL entry is correct?',
opts:['access-list 50 permit tcp 10.10.10.0 0.0.0.255 any eq 22','access-list 150 permit tcp 10.10.10.0 0.0.0.255 any eq 22','access-list 150 permit udp 10.10.10.0 0.0.0.255 any eq 22','access-list 50 permit ip 10.10.10.0 0.0.0.255 any'],
ans:1,
hint:'SSH uses TCP. You need to filter by protocol and port — which ACL type does that?',
correct_fb:'<strong>access-list 150</strong> (Extended ACL — 100-199). Protocol = <strong>tcp</strong> (SSH uses TCP). Source = "10.10.10.0 0.0.0.255" (the management subnet with wildcard mask). Destination = "any". Port = "eq 22" (SSH). Option A is wrong (50 = Standard — can\'t specify protocol/port). Option C is wrong (SSH uses TCP not UDP). Option D is wrong (Standard, no port filtering).',
wrong_fb:'<strong>access-list 150 permit tcp 10.10.10.0 0.0.0.255 any eq 22</strong>. SSH = TCP/22. Need to filter by protocol and port = Extended ACL (100-199). Standard ACLs (1-99) CANNOT filter by protocol or port — only source IP. Wildcard for /24: 0.0.0.255. "any" = all destinations. "eq 22" = destination port 22 (SSH). This is the exact syntax tested on the CCNA exam.'
},
{topic:4,diff:'medium',type:'Multiple Choice',
q:'Where should an extended ACL be placed for best efficiency?',
opts:['As close to the destination as possible','As close to the source as possible','In the center of the network','On every router in the path'],
ans:1,
hint:'Extended ACLs can pinpoint specific traffic — filter it before it wastes bandwidth.',
correct_fb:'Extended ACLs should be placed <strong>as close to the source as possible</strong>. Since extended ACLs can filter on source IP, destination IP, protocol, and port, they can precisely identify unwanted traffic and drop it immediately — before it consumes bandwidth across the network to reach the destination.',
wrong_fb:'Extended ACLs: <strong>close to the source</strong>. Standard ACLs: <strong>close to the destination</strong>. The logic: Extended ACLs are precise enough to filter the right traffic at the source without affecting other traffic. Standard ACLs only match source IP, so placing them near the source could block access to ALL destinations — place them near the destination to limit collateral damage.'
},
{topic:4,diff:'hard',type:'Multiple Choice',
q:'What is the difference between "permit ip any any" and "permit tcp any any"?',
opts:['They are identical — IP includes TCP','permit ip any any allows ALL IP protocols (TCP, UDP, ICMP, etc.); permit tcp any any allows ONLY TCP traffic','permit tcp any any is more permissive','permit ip any any only works on routers'],
ans:1,
hint:'IP is a Layer 3 protocol; TCP is just one of the protocols that runs over IP.',
correct_fb:'"<strong>permit ip any any</strong>" allows ALL Layer 3 IP traffic — TCP, UDP, ICMP, GRE, OSPF, and all other IP protocols. "<strong>permit tcp any any</strong>" allows ONLY TCP-based traffic (HTTP, HTTPS, SSH, Telnet, FTP, etc.). UDP traffic (DNS, DHCP, SNMP, VoIP) and ICMP (ping) would still be blocked by the implicit deny after "permit tcp any any".',
wrong_fb:'"permit ip any any" = <strong>allow ALL IP protocols</strong> (TCP+UDP+ICMP+all others). "permit tcp any any" = <strong>allow only TCP</strong>. UDP (DNS=53, DHCP=67/68, NTP=123, SNMP=161) and ICMP (ping) would NOT be permitted by "permit tcp any any" — they\'d hit the implicit deny. Always understand which Layer 4 protocol an application uses before writing ACL entries.'
},
{topic:4,diff:'medium',type:'Multiple Choice',
q:'What does the "log" keyword do at the end of an ACL entry?',
opts:['Saves the ACL to flash memory','Sends a syslog message when that ACL entry is matched, including source/destination and port information','Increases the priority of that ACL entry','Shows ACL matches in real-time on the console'],
ans:1,
hint:'Useful for security monitoring and troubleshooting — creates a record of matched traffic.',
correct_fb:'"<strong>log</strong>" generates a syslog message each time that ACL entry is matched. The message includes: protocol, source/destination IP, port, interface, and direction. Example: "access-list 101 deny tcp any host 10.0.0.1 eq 23 log" — logs every blocked Telnet attempt. Useful for security auditing. Warning: high-traffic rules with "log" can consume significant CPU.',
wrong_fb:'"<strong>log</strong>" = generate syslog alerts when the ACL entry matches. Syntax: add "log" at the end of an ACE: "deny tcp any any eq 23 log". Logs appear with "show logging". Forward to a syslog server for centralized monitoring. Caution: logging every match on a high-traffic permit/deny can overwhelm router CPU. Use selectively, especially on deny rules for security events.'
},
// ── TOPIC 5: Spanning Tree — additional 33 questions ──
{topic:5,diff:'easy',type:'Multiple Choice',
q:'Why is Spanning Tree Protocol (STP) necessary in a switched network?',
opts:['To increase port speed','To prevent broadcast storms and MAC address table instability caused by switching loops','To enable VLANs to communicate','To provide routing between subnets'],
ans:1,
hint:'What would happen if frames could loop around the network indefinitely?',
correct_fb:'<strong>STP prevents switching loops</strong>. Without STP, redundant switch paths create broadcast storms: a broadcast frame would loop forever, multiplying exponentially and consuming 100% of bandwidth. STP logically blocks redundant ports to create a loop-free topology, while keeping those ports available as backups if the primary path fails.',
wrong_fb:'<strong>STP prevents switching loops and broadcast storms</strong>. Without STP + redundant links = broadcast storm (frame loops forever, exponential multiplication). Result: network crashes. STP detects loops by exchanging BPDUs, elects a root bridge, and blocks redundant ports. Modern variant: Rapid PVST+ converges in seconds instead of 30-50 seconds with classic STP.'
},
{topic:5,diff:'medium',type:'Multiple Choice',
q:'What are the four STP port states in classic 802.1D STP?',
opts:['Blocking, Listening, Learning, Forwarding','Down, Init, Up, Active','Disabled, Standby, Active, Forwarding','Blocking, Active, Passive, Forwarding'],
ans:0,
hint:'Ports transition through these states over about 30-50 seconds during STP convergence.',
correct_fb:'Classic 802.1D STP port states: <strong>Blocking → Listening (15s) → Learning (15s) → Forwarding</strong>. Blocking: receives BPDUs only, no forwarding. Listening: participates in BPDU exchange, selects root bridge/ports. Learning: learns MAC addresses into the table but no forwarding. Forwarding: normal operation. Total convergence time: ~30-50 seconds.',
wrong_fb:'802.1D STP states: <strong>Blocking, Listening, Learning, Forwarding</strong>. Blocking (max): receives BPDUs, no data forwarding. Listening (15s): BPDU exchange, root bridge election. Learning (15s): populates MAC table, no forwarding. Forwarding: active. Disabled: admin shutdown. Rapid PVST+ (RSTP) replaces these with Discarding/Learning/Forwarding for much faster convergence.'
},
{topic:5,diff:'medium',type:'Multiple Choice',
q:'What is a "Root Port" in STP?',
opts:['The port on the root bridge that connects to other switches','The port on each non-root switch that provides the best path back to the root bridge','A port that is currently in the forwarding state','The port with the lowest number on a switch'],
ans:1,
hint:'Every non-root switch needs one path toward the root — this port provides it.',
correct_fb:'A <strong>Root Port</strong> is the port on a non-root switch with the <strong>lowest cost path back to the root bridge</strong>. Every non-root switch has exactly ONE root port. It is always in the forwarding state. Cost is calculated based on cumulative port costs along the path to the root bridge (lower bandwidth = higher cost).',
wrong_fb:'<strong>Root Port = lowest-cost port back to root bridge</strong>. Every non-root switch has exactly one Root Port. The root bridge itself has NO root port — all its ports are designated. Root Port is always forwarding. If multiple paths have equal cost, tie-breaking: lowest upstream Bridge ID, then lowest port ID. The root port leads traffic toward the root bridge.'
},
{topic:5,diff:'hard',type:'Scenario',
q:'SW-A (priority 32768, MAC aa:aa:aa:aa:aa:01) connects to SW-B (priority 32768, MAC bb:bb:bb:bb:bb:01). Both connect to SW-C (priority 32768, MAC cc:cc:cc:cc:cc:01). Which switch becomes root bridge and why?',
opts:['SW-C — highest MAC','SW-A — lowest MAC address aa:aa:aa:aa:aa:01','SW-B — middle MAC address','Cannot determine without knowing port costs'],
ans:1,
hint:'When priorities are equal, the tiebreaker is the MAC address — and lower wins.',
correct_fb:'<strong>SW-A wins</strong> — it has the lowest Bridge ID. All priorities are equal (32768), so MAC address breaks the tie. aa:aa:aa < bb:bb:bb < cc:cc:cc. SW-A\'s MAC aa:aa:aa:aa:aa:01 is lowest. In STP, <strong>lower Bridge ID = more preferred root bridge</strong>. To control this in production, manually set priorities instead of relying on MAC address election.',
wrong_fb:'<strong>SW-A is root bridge</strong>. Priorities equal → MAC address decides. Comparing MACs: aa < bb < cc. SW-A has the lowest MAC address → lowest Bridge ID → wins root bridge election. Production best practice: NEVER rely on default MAC-based election. Use "spanning-tree vlan [x] priority 4096" on the intended root bridge to ensure predictable topology.'
},
{topic:5,diff:'medium',type:'Multiple Choice',
q:'What is Rapid PVST+ and how does it improve on classic STP?',
opts:['Rapid PVST+ only runs on VLAN 1','Rapid PVST+ converges in 1-2 seconds using new port roles and states instead of 30-50 seconds','Rapid PVST+ eliminates the need for a root bridge','Rapid PVST+ uses VTP to synchronize STP topology'],
ans:1,
hint:'The word "Rapid" is the key — how does it achieve faster convergence?',
correct_fb:'<strong>Rapid PVST+</strong> (based on 802.1w RSTP) converges in <strong>1-2 seconds</strong> vs. 30-50 seconds for classic 802.1D. Key improvements: (1) New port roles: Alternate (backup to root port) and Backup (backup to designated port). (2) Three states: Discarding, Learning, Forwarding (simpler than 802.1D\'s 5). (3) Direct proposal/agreement handshake for instant transitions without waiting for timers. Default on modern Cisco switches.',
wrong_fb:'<strong>Rapid PVST+ (RSTP-based)</strong>: converges in <strong>1-2 seconds</strong>. Improvements over 802.1D: faster proposal/agreement mechanism, new Alternate (backup root) and Backup (backup designated) port roles, simplified 3 states (Discarding/Learning/Forwarding). Discarding replaces both Blocking and Listening. This is now the default on Cisco switches. Verify: "show spanning-tree" shows "ieee" (802.1D) or "rstp" (Rapid).'
},
{topic:5,diff:'medium',type:'Multiple Choice',
q:'What STP command makes a switch the primary root bridge?',
opts:['spanning-tree vlan 1 root','spanning-tree vlan 1 root primary','spanning-tree priority 0','spanning-tree vlan 1 priority 32768'],
ans:1,
hint:'Cisco provides a shortcut command that automatically sets the priority low enough to win.',
correct_fb:'"<strong>spanning-tree vlan 1 root primary</strong>" automatically sets the switch priority to 24576 (or lower than the current root) to ensure it wins the root bridge election. The secondary root command uses priority 28672. Alternatively, manually set: "spanning-tree vlan 1 priority 4096" (must be in increments of 4096).',
wrong_fb:'"<strong>spanning-tree vlan 1 root primary</strong>" is the shortcut to become root. It sets priority to 24576 (or lower). Manual method: "spanning-tree vlan 1 priority 4096". Priority must be 0-61440 in increments of 4096: 0, 4096, 8192, 12288, 16384, 20480, 24576, 28672, 32768 (default). Lower priority = more likely to be root. "root secondary" sets priority to 28672.'
},
{topic:5,diff:'hard',type:'Multiple Choice',
q:'What is a "Designated Port" in STP?',
opts:['The port that connects to the root bridge','The port on each network segment with the best path to the root bridge, which forwards traffic for that segment','Any port in the forwarding state','The port on the root bridge only'],
ans:1,
hint:'Every network segment must have exactly one designated port to prevent loops.',
correct_fb:'A <strong>Designated Port</strong> is the port on each network segment (link between switches) that has the <strong>lowest cost to the root bridge for that segment</strong>. It forwards traffic for that segment. The root bridge\'s ports are ALL designated ports. Every active segment has exactly one designated port. Non-designated, non-root ports are in blocking state.',
wrong_fb:'<strong>Designated Port = best path to root for that segment, forwarding state</strong>. Rules: (1) ALL root bridge ports are designated. (2) Each segment has exactly one designated port — the switch with the lowest cost to root wins; tie = lowest Bridge ID, then lowest Port ID. (3) Non-root, non-designated ports → Blocking. STP creates a logical tree with no loops.'
},
{topic:5,diff:'medium',type:'Multiple Choice',
q:'What is the default STP bridge priority, and in what increment must it be changed?',
opts:['Default 32768, increments of 4096','Default 0, increments of 1000','Default 65535, increments of 256','Default 32768, increments of 1024'],
ans:0,
hint:'The increment is tied to the 12-bit VLAN ID that gets added to the priority.',
correct_fb:'Default STP priority = <strong>32768</strong>. Must be changed in increments of <strong>4096</strong>. Valid values: 0, 4096, 8192, ..., 28672, 32768 (default), 36864, ..., 61440. The 4096 increment exists because the Bridge Priority field (16-bit) is split: 4 bits for priority + 12 bits for VLAN ID (per PVST+). Set with: "spanning-tree vlan [id] priority [value]".',
wrong_fb:'Default STP priority = <strong>32768</strong>, increments of <strong>4096</strong>. This is because PVST+ encodes the VLAN ID (12 bits) into the lower portion of the priority field, leaving 4 bits for the configurable priority (which gives 16 increments of 4096 each). Valid priorities: 0, 4096, 8192, 12288, 16384, 20480, 24576, 28672, 32768, 36864, 40960, 45056, 49152, 53248, 57344, 61440.'
},
{topic:5,diff:'hard',type:'Multiple Choice',
q:'What is "STP Topology Change Notification (TCN)" and when is it sent?',
opts:['A BPDU sent by the root bridge every 2 seconds','A special BPDU sent when a port transitions to forwarding or goes down, causing switches to age out their MAC tables faster','A message sent when a new switch joins the network','An OSPF-like LSA for Layer 2 topology changes'],
ans:1,
hint:'MAC addresses may become invalid when the topology changes — switches need to relearn.',
correct_fb:'<strong>TCN (Topology Change Notification)</strong> is sent when a non-root switch detects a topology change (port enters forwarding or goes down). It propagates to the root bridge via BPDUs. The root bridge then sends a Topology Change BPDU to all switches, causing them to reduce their MAC address aging time from 300s to 15s (Forward Delay) to quickly flush stale MAC entries.',
wrong_fb:'TCN = <strong>BPDU sent when STP topology changes, causing fast MAC table aging</strong>. When a port transitions or fails, a TCN travels to the root bridge (via each switch sending TCN to its root port). The root broadcasts TC (Topology Change) flag, reducing MAC aging from 300s to 15s. This ensures stale MAC entries are quickly removed after failover. Excessive TCNs cause instability — use PortFast to prevent TCNs from access ports.'
},
{topic:5,diff:'medium',type:'Multiple Choice',
q:'Which STP feature prevents a PortFast-enabled access port from accidentally creating a loop if a switch is connected to it?',
opts:['STP Root Guard','BPDU Guard','BPDU Filter','Loop Guard'],
ans:1,
hint:'If a switch is connected to a PortFast port, it will send BPDUs — something needs to respond to that.',
correct_fb:'<strong>BPDU Guard</strong> immediately places a port in err-disabled state if ANY BPDU is received on it. Since PortFast ports should only connect to end devices (which don\'t send BPDUs), receiving a BPDU means a switch was connected — a potential loop. BPDU Guard shuts the port, protecting the network. Admin must manually recover: "shutdown" then "no shutdown".',
wrong_fb:'<strong>BPDU Guard</strong> = err-disable port on first BPDU received. Protects PortFast ports from unauthorized switches. BPDU Filter suppresses BPDUs (use carefully — can create loops). Root Guard prevents a port from accepting superior BPDUs (protects root bridge placement). Loop Guard prevents blocking ports from transitioning to forwarding if BPDUs stop (protects against unidirectional failures).'
},
{topic:5,diff:'hard',type:'Multiple Choice',
q:'What is "Root Guard" and when should it be used?',
opts:['Prevents the root bridge from being changed by operator error','Placed on designated ports to prevent a connected switch from becoming the root bridge','Used to prevent loops on access ports','Prevents BPDUs from leaving specific ports'],
ans:1,
hint:'You use this on ports where you never want a new root bridge to appear.',
correct_fb:'<strong>Root Guard</strong> prevents a switch connected to a specific port from becoming the root bridge. If Root Guard receives a superior BPDU on a guarded port, it places the port in root-inconsistent state (blocks it). Use it on designated ports where no new root bridge should appear — protecting your carefully designed STP topology from being disrupted by new or misconfigured switches.',
wrong_fb:'<strong>Root Guard</strong> = blocks ports that receive superior BPDUs (prevents that neighbor from becoming root). Applied on designated ports at the edge of your controlled network. If a rogue switch sends better BPDUs: port → root-inconsistent (blocking). Remove the rogue → port automatically recovers. BPDU Guard is for PortFast ports (end devices). Root Guard is for designated ports (where other switches shouldn\'t become root).'
},
{topic:5,diff:'medium',type:'Multiple Choice',
q:'What command enables PortFast on all access ports globally on a Cisco switch?',
opts:['spanning-tree portfast','spanning-tree portfast default','interface range all portfast enable','spanning-tree mode portfast'],
ans:1,
hint:'The "default" keyword applies the setting globally to access ports.',
correct_fb:'"<strong>spanning-tree portfast default</strong>" in global configuration mode enables PortFast on all access ports automatically. Individual interface: "spanning-tree portfast" under the interface. Note: PortFast is automatically disabled on trunk ports even with the global command. Always pair with "spanning-tree portfast bpduguard default" to enable BPDU Guard globally.',
wrong_fb:'Global PortFast: "<strong>spanning-tree portfast default</strong>". Per-interface: "spanning-tree portfast" under "interface [x]". Global BPDU Guard: "spanning-tree portfast bpduguard default". These two global commands together are best practice for all access layer switches. Trunk ports are automatically excluded from the global portfast default setting.'
},
{topic:5,diff:'easy',type:'Multiple Choice',
q:'What does STP do with ports that are in the "blocking" state?',
opts:['Shuts the port down completely — no traffic passes','Receives STP BPDUs but does not forward data frames or learn MAC addresses','Forwards all traffic normally but monitors for loops','Sends BPDUs only and blocks all other traffic'],
ans:1,
hint:'Blocking ports are not completely dead — they still participate in STP.',
correct_fb:'Blocking ports <strong>receive and process STP BPDUs but do NOT forward data frames or learn MAC addresses</strong>. They are "logically blocked" but physically active. If the active path fails, a blocking port can transition to forwarding (taking ~30s in 802.1D, ~1-2s in Rapid PVST+). The port is ready to take over — it\'s a standby, not a shutdown.',
wrong_fb:'Blocking state: <strong>receives BPDUs, does NOT forward data or learn MACs</strong>. The port is UP physically — it\'s in standby. If the active (forwarding) path fails, the blocking port transitions to forwarding (slowly in 802.1D, quickly in RSTP). This is how STP provides redundancy without loops: redundant paths are blocked until needed.'
},

{topic:6,diff:'easy',type:'Multiple Choice',
q:'How many bits are in an IPv6 address?',
opts:['32','64','128','256'],
ans:2,
hint:'IPv6 was designed to be much larger than IPv4 to solve address exhaustion.',
correct_fb:'IPv6 addresses are <strong>128 bits</strong>, written as 8 groups of 4 hexadecimal digits separated by colons. Example: 2001:0DB8:0000:0000:0000:0000:0000:0001. This provides 2^128 ≈ 3.4 × 10^38 possible addresses — effectively unlimited. IPv4 is only 32 bits (≈4.3 billion addresses, already exhausted).',
wrong_fb:'IPv6 = <strong>128 bits</strong> (vs IPv4\'s 32 bits). 128 bits = 8 groups × 16 bits each (written as 4 hex digits per group). Total addresses: 2^128 ≈ 3.4 undecillion. By comparison, IPv4 has 2^32 ≈ 4.3 billion — exhausted. IPv6 solves address exhaustion and adds features: built-in IPSec, simplified header, no broadcast (uses multicast instead).'
},
{topic:6,diff:'medium',type:'Multiple Choice',
q:'What is a "Global Unicast Address" in IPv6?',
opts:['An address only used within a single subnet','A publicly routable IPv6 address, equivalent to a public IPv4 address','An address used only between routers','An address automatically assigned without DHCPv6'],
ans:1,
hint:'These are the IPv6 equivalent of public IPv4 addresses — routable on the internet.',
correct_fb:'A <strong>Global Unicast Address (GUA)</strong> is a publicly routable IPv6 address, equivalent to a public IPv4 address. GUAs begin with the prefix <strong>2000::/3</strong> (first bits are 001). They are globally unique and routable on the internet. ISPs assign GUA prefixes. Example: 2001:DB8::/32 is reserved for documentation/examples.',
wrong_fb:'Global Unicast = <strong>publicly routable IPv6, starts with 2000::/3</strong>. Equivalent to public IPv4 addresses. Key IPv6 address types: GUA (2000::/3, internet-routable), ULA (FC00::/7, private like RFC1918), Link-Local (FE80::/10, local segment only), Multicast (FF00::/8, one-to-many). There are NO broadcast addresses in IPv6 — multicast replaces broadcast.'
},
{topic:6,diff:'medium',type:'Multiple Choice',
q:'What replaces the ARP protocol in IPv6 for MAC address resolution?',
opts:['DHCP Snooping','ICMPv6 Neighbor Discovery Protocol (NDP)','ARPv6','DNS'],
ans:1,
hint:'IPv6 uses ICMPv6 messages for many functions that IPv4 handled with ARP.',
correct_fb:'IPv6 uses <strong>NDP (Neighbor Discovery Protocol)</strong> via ICMPv6 to replace ARP. NDP uses multicast instead of broadcast — more efficient. Key NDP messages: Neighbor Solicitation (NS, like ARP request), Neighbor Advertisement (NA, like ARP reply), Router Solicitation (RS), Router Advertisement (RA), and Redirect. NDP also handles router/prefix discovery.',
wrong_fb:'ARP is replaced in IPv6 by <strong>NDP (Neighbor Discovery Protocol) using ICMPv6</strong>. NDP is more efficient — uses multicast (224.x.x.x in IPv4 terms) instead of broadcast. NDP functions: MAC resolution (NS/NA), router discovery (RS/RA), duplicate address detection (DAD), and redirect. Verify with "show ipv6 neighbors" (equivalent to "show arp" in IPv4).'
},
{topic:6,diff:'hard',type:'Multiple Choice',
q:'What is SLAAC (Stateless Address Autoconfiguration) in IPv6?',
opts:['A method requiring a DHCPv6 server to assign addresses','A method allowing hosts to self-configure an IPv6 address using the network prefix from Router Advertisements plus their own EUI-64 interface ID','A static address assignment method','A method only used for link-local addresses'],
ans:1,
hint:'Stateless = no server needed. How does a host know which prefix to use?',
correct_fb:'<strong>SLAAC</strong> allows hosts to automatically configure a global IPv6 address WITHOUT a DHCPv6 server. Process: (1) Host generates a link-local address and sends a Router Solicitation. (2) Router responds with a Router Advertisement containing the network prefix (e.g., 2001:DB8::/64). (3) Host combines the prefix with its EUI-64 interface ID to form a full 128-bit address.',
wrong_fb:'<strong>SLAAC = self-assigned IPv6 without DHCPv6</strong>. Steps: Router Advertisement → host gets /64 prefix → host generates 64-bit interface ID (EUI-64 from MAC or random) → combines into 128-bit address. Stateless = no server tracks assignments. The router is only needed for the prefix — not for individual address assignment. Contrast: DHCPv6 = stateful (server tracks every assignment).'
},
{topic:6,diff:'medium',type:'Multiple Choice',
q:'What is the "Unique Local Address" (ULA) in IPv6 and what is its equivalent in IPv4?',
opts:['Equivalent to public IPv4 addresses','Equivalent to RFC 1918 private IPv4 addresses, prefixed FC00::/7, not routed on the internet','Equivalent to loopback addresses','Equivalent to APIPA addresses'],
ans:1,
hint:'Think of addresses used for internal communication that don\'t appear on the internet.',
correct_fb:'<strong>ULA (FC00::/7)</strong> is the IPv6 equivalent of <strong>RFC 1918 private addresses</strong> (10.x.x.x, 172.16.x.x, 192.168.x.x). ULAs are used for internal/private communication and are NOT routed on the internet. The most common ULA range is FC00::/7, typically FC00:: or FD00::. They provide internal connectivity without consuming public address space.',
wrong_fb:'ULA = <strong>IPv6 private addresses (FC00::/7)</strong>, equivalent to RFC 1918. FD00::/8 is the commonly used portion of ULA. Like 192.168.x.x in IPv4: usable internally, not routed on the internet. IPv6 address type summary: GUA (2000::/3)=public, ULA (FC00::/7)=private, Link-Local (FE80::/10)=local segment, Loopback (::1/128), Multicast (FF00::/8).'
},
{topic:6,diff:'hard',type:'Multiple Choice',
q:'Expand the compressed IPv6 address 2001:DB8::1 to its full 128-bit form.',
opts:['2001:0DB8:0000:0000:0000:0000:0000:0001','2001:DB80:0000:0000:0000:0000:0000:0001','2001:0DB8:0001:0000:0000:0000:0000:0000','2001:DB8:0000:0000:0000:0000:0000:1000'],
ans:0,
hint:'The :: replaces the longest run of all-zero groups. Count the groups and fill them in.',
correct_fb:'<strong>2001:0DB8:0000:0000:0000:0000:0000:0001</strong>. Expansion steps: (1) Restore leading zeros: 2001→2001, DB8→0DB8, 1→0001. (2) The :: represents 5 groups of zeros (8 total groups - 2 existing = 5 zero groups): 0000:0000:0000:0000:0000. Full form: 2001:<strong>0</strong>DB8:<strong>0000:0000:0000:0000:0000:0001</strong>.',
wrong_fb:'Full expansion: <strong>2001:0DB8:0000:0000:0000:0000:0000:0001</strong>. The "::" represents all the middle zero groups. 8 groups total: 2001 (1) + 0DB8 (2) + "::" fills groups 3-7 with zeros + 0001 (8). Always restore: leading zeros per group, and replace "::" with the correct number of 0000 groups (enough to make 8 total groups). This expansion is tested directly on the CCNA.'
},
{topic:6,diff:'medium',type:'Multiple Choice',
q:'Compress the IPv6 address 2001:0DB8:0000:0000:ABCD:0000:0000:0001',
opts:['2001:DB8::ABCD::1','2001:DB8:0:0:ABCD::1','2001:DB8::ABCD:0:0:1','All of the above'],
ans:1,
hint:'Remember: :: can only be used ONCE. Which group of zeros is longest?',
correct_fb:'<strong>2001:DB8:0:0:ABCD::1</strong>. Rules applied: (1) Drop leading zeros: 0DB8→DB8, 0000→0. (2) Use :: ONCE for the longest consecutive run of zeros. The two trailing zeros (groups 6-7) form the longest consecutive run — replace with ::. The two zeros at groups 3-4 remain as "0:0" (because :: was used for the longer run at the end). Option A is invalid — two :: in one address.',
wrong_fb:'Correct compression: <strong>2001:DB8:0:0:ABCD::1</strong>. Option A is INVALID — you cannot use "::" twice. Option C "::ABCD:0:0:1" would incorrectly compress groups 3-4, not 6-7. The "::" must replace the LONGEST consecutive run of all-zero groups. Longest run: groups 6 and 7 (0000:0000) = 2 groups. Groups 3-4 are only 1 group each so they become "0:0".'
},
{topic:6,diff:'medium',type:'Multiple Choice',
q:'What is the IPv6 loopback address?',
opts:['::0','::1','FE80::1','FF00::1'],
ans:1,
hint:'IPv4 loopback is 127.0.0.1. IPv6 compresses its equivalent heavily.',
correct_fb:'The IPv6 loopback address is <strong>::1</strong>. Expanded: 0000:0000:0000:0000:0000:0000:0000:0001. It serves the same purpose as 127.0.0.1 in IPv4 — testing the local TCP/IP stack. "ping ::1" tests IPv6 loopback. The /128 prefix covers exactly one address: ::1/128.',
wrong_fb:'IPv6 loopback = <strong>::1</strong> (equivalent to 127.0.0.1). Full form: 0000:0000:0000:0000:0000:0000:0000:0001. The "::" replaces 7 groups of zeros. Test: "ping ::1" or "ping ipv6 ::1" on Cisco. The subnet is ::1/128 (host route). FE80:: = link-local. FF00:: = multicast. ::0 = unspecified address (used before an address is assigned).'
},
{topic:6,diff:'hard',type:'Multiple Choice',
q:'A router interface is configured with "ipv6 address 2001:DB8::/64 eui-64". The interface MAC address is 00:11:22:33:44:55. What is the full IPv6 address?',
opts:['2001:DB8::0211:22FF:FE33:4455','2001:DB8::0011:2233:4455:0000','2001:DB8::1122:33FF:FE44:5500','2001:DB8::FF11:2233:FE44:55'],
ans:0,
hint:'EUI-64: split MAC, insert FFFE, flip 7th bit (0→2 for locally administered).',
correct_fb:'EUI-64 with MAC 00:11:22:33:44:55: (1) Split: 00:11:22 | 33:44:55. (2) Insert FFFE: 00:11:22:<strong>FF:FE</strong>:33:44:55. (3) Flip 7th bit: 00 (0000 0000) → 02 (0000 0010). Result: 02:11:22:FF:FE:33:44:55 → IPv6 interface ID: <strong>0211:22FF:FE33:4455</strong>. Full address: <strong>2001:DB8::0211:22FF:FE33:4455</strong>.',
wrong_fb:'EUI-64 process: (1) Split MAC 00:11:22 | 33:44:55. (2) Insert FFFE: 00:11:22:FF:FE:33:44:55. (3) Flip bit 7 of first byte: 00=00000000 → 00000010=02. Interface ID: <strong>0211:22FF:FE33:4455</strong>. Full: 2001:DB8::<strong>0211:22FF:FE33:4455</strong>. The 7th bit flip distinguishes MAC-derived interface IDs from randomly generated ones. 0→2 is common for OUI-assigned MACs.'
},
{topic:6,diff:'medium',type:'Multiple Choice',
q:'What is "DAD" (Duplicate Address Detection) in IPv6?',
opts:['A protocol that assigns addresses via DHCP','An ICMPv6 process that verifies a newly configured IPv6 address is not already in use before it becomes active','A routing protocol for IPv6','A method to compress IPv6 addresses'],
ans:1,
hint:'Before using a new address, a host checks if anyone else is already using it.',
correct_fb:'<strong>DAD (Duplicate Address Detection)</strong> uses ICMPv6 Neighbor Solicitation to verify that a new IPv6 address is unique. Before making the address active, the host sends an NS to the solicited-node multicast address for the new IP. If no NA (Neighbor Advertisement) is received — the address is unique and becomes active. This prevents duplicate IP addresses on IPv6 networks.',
wrong_fb:'<strong>DAD = ICMPv6-based duplicate IP check</strong>. Process: (1) Host generates new IPv6 address. (2) Sends Neighbor Solicitation to solicited-node multicast for that address. (3) If another host responds with NA → duplicate detected, address not used. (4) No response after timeout → address is unique, host configures it. DAD runs automatically for every IPv6 address configuration.'
},
{topic:6,diff:'hard',type:'Multiple Choice',
q:'What is the purpose of the solicited-node multicast address in IPv6?',
opts:['Used for routing protocol multicast communication','Used for efficient MAC address resolution, replacing IPv4 broadcast ARP with targeted multicast','Used to send data to all hosts in a subnet','Used only by routers for OSPF neighbor discovery'],
ans:1,
hint:'NDP uses multicast instead of broadcast for address resolution — this is the specific multicast address used.',
correct_fb:'The <strong>solicited-node multicast address</strong> enables efficient MAC address resolution using multicast instead of broadcast. It is formed by taking the last 24 bits of an IPv6 address and appending them to FF02::1:FF00:0/104. Only the host with that specific IPv6 address listens on that multicast group — much more targeted than ARP broadcasts, which go to every host on the subnet.',
wrong_fb:'Solicited-node multicast = <strong>targeted multicast for NDP MAC resolution</strong>. Format: FF02::1:FF[last 24 bits of IPv6 address]. Example: host with ...4455 uses FF02::1:FF33:4455. Only that specific host listens on this group. Much more efficient than IPv4 ARP broadcast (which every host must process). This is one of IPv6\'s improvements over IPv4.'
},
{topic:6,diff:'easy',type:'Multiple Choice',
q:'What command enables IPv6 on a Cisco router interface?',
opts:['ip ipv6 enable','ipv6 address enable','ipv6 enable','enable ipv6 interface'],
ans:2,
hint:'This command activates IPv6 on the interface and generates a link-local address.',
correct_fb:'"<strong>ipv6 enable</strong>" activates IPv6 on an interface and automatically generates a link-local address (FE80::/10). To assign a full global unicast address: "ipv6 address 2001:DB8::1/64". Remember: "ipv6 unicast-routing" is ALSO needed globally to enable IPv6 forwarding between interfaces. Without it, the router will have IPv6 addresses but won\'t route IPv6 traffic.',
wrong_fb:'"<strong>ipv6 enable</strong>" activates IPv6 on an interface (generates link-local auto). Assign a specific address: "ipv6 address 2001:DB8::1/64". For routing between interfaces: "ipv6 unicast-routing" (global config). Common sequence:\nconfig t\nipv6 unicast-routing\ninterface Gi0/0\nipv6 enable\nipv6 address 2001:DB8:1::1/64\nno shutdown'
},
{topic:6,diff:'medium',type:'Multiple Choice',
q:'In IPv6, what replaces the broadcast address from IPv4?',
opts:['A special unicast address','Anycast addresses','Multicast addresses','IPv6 has no equivalent to broadcast'],
ans:2,
hint:'IPv6 uses a more targeted approach — instead of sending to everyone, it sends to a specific group.',
correct_fb:'IPv6 uses <strong>multicast addresses</strong> instead of broadcast. Key multicast addresses: FF02::1 (all nodes on the link, like 255.255.255.255 in IPv4), FF02::2 (all routers on the link), FF02::5 (OSPF routers), FF02::6 (OSPF DR/BDR), FF02::A (EIGRP routers). Multicast is more efficient than broadcast because only interested devices process the traffic.',
wrong_fb:'IPv6 <strong>replaces broadcast with multicast</strong>. No broadcast addresses exist in IPv6. Common IPv6 multicasts: FF02::1=all nodes (like IPv4 broadcast), FF02::2=all routers, FF02::5=OSPF routers, FF02::A=EIGRP. More efficient than broadcast — only devices that joined a multicast group process those packets. This is one of IPv6\'s key improvements over IPv4.'
},
{topic:6,diff:'hard',type:'Multiple Choice',
q:'What is an "anycast" address in IPv6?',
opts:['An address assigned to multiple interfaces; packets are delivered to the nearest one','An address used for one-to-many communication','The same as a multicast address','A temporary address used only during SLAAC'],
ans:0,
hint:'Think of a service (like a DNS server) that exists in multiple locations — you want to reach the CLOSEST one.',
correct_fb:'An <strong>anycast address</strong> is a single address assigned to <strong>multiple interfaces</strong> (usually on different routers/servers). Packets sent to an anycast address are delivered to the <strong>nearest interface</strong> with that address (based on routing metric). Used for: load balancing, geographic redundancy (e.g., closest DNS server), CDN services. Anycast uses the same address format as unicast — routers distinguish them by configuration.',
wrong_fb:'<strong>Anycast = one address, multiple devices, nearest wins</strong>. Contrast: Unicast=one-to-one, Multicast=one-to-many-groups, Anycast=one-to-nearest. Use cases: Google\'s 8.8.8.8 DNS (served from many global locations — anycast routes you to nearest). CDNs use anycast for content delivery. In IPv6, anycast is explicitly defined; IPv4 uses BGP-based anycast informally. CCNA expects you to know all three address delivery types.'
},
// ── TOPIC 7: Device Security — additional 34 questions ──
{topic:7,diff:'easy',type:'Multiple Choice',
q:'Which command encrypts all plaintext passwords in the Cisco IOS running configuration?',
opts:['enable secret','password encryption','service password-encryption','crypto encrypt all passwords'],
ans:2,
hint:'This single global command applies weak encryption to all cleartext passwords at once.',
correct_fb:'"<strong>service password-encryption</strong>" encrypts all plaintext passwords in the configuration (console, VTY, enable password) with Type 7 encryption (weak, reversible). Note: this does NOT encrypt "enable secret" (already MD5 hashed). Type 7 can be decoded — always use "enable secret" for privileged mode. "service password-encryption" provides minimal protection against casual shoulder-surfing.',
wrong_fb:'"<strong>service password-encryption</strong>" applies Type 7 encryption to all cleartext passwords. Warning: Type 7 is weak and easily reversed with online tools. Best practices: always use "enable secret" (MD5/SHA, Type 5/8/9). Use "service password-encryption" as a minimum baseline. Newer IOS versions support stronger algorithms: "password encryption aes" for Type 6 encryption.'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What is the purpose of the "banner motd" command on a Cisco device?',
opts:['Displays the device model when logging in','Displays a legal warning/message to users before they authenticate — used for unauthorized access warnings','Shows the current time and date','Configures the hostname displayed at the CLI prompt'],
ans:1,
hint:'MOTD stands for Message of the Day — it appears before login.',
correct_fb:'"<strong>banner motd #[message]#</strong>" displays a message BEFORE authentication. This is legally important — it warns unauthorized users that access is prohibited and establishes legal grounds for prosecution. Without a banner, attackers can argue they didn\'t know access was unauthorized. Configure: "banner motd # AUTHORIZED USE ONLY #". The # is the delimiter (can be any character).',
wrong_fb:'"banner motd" = <strong>pre-login warning message</strong>. Critical for legal protection — establishes that unauthorized access is known to be prohibited. Without it, legal action may be difficult. Types: banner motd (pre-login, most important), banner login (after motd, before password prompt), banner exec (after successful login). Best practice: always configure a legal warning banner on all devices.'
},
{topic:7,diff:'hard',type:'Scenario',
q:`A Cisco switch port shows:\nSw1# show port-security interface Gi0/1\nPort Security: Enabled\nViolation Mode: Shutdown\nMaximum MAC Addresses: 1\nTotal MAC Addresses: 1\nSecure MAC Addresses: 1\nLast Source Address: 0000.1111.2222\nSecurity Violation Count: 0\n\nA new PC with MAC 0000.3333.4444 is plugged in. What happens?`,
opts:['The new PC is allowed — port security allows 1 MAC at a time and switches when new device connects','The port is placed in err-disabled state — violation mode is Shutdown','The switch sends an alert but allows the new PC','The old MAC is aged out and the new MAC is learned'],
ans:1,
hint:'Maximum is 1 MAC, one is already learned, and violation mode is Shutdown.',
correct_fb:'The port is <strong>immediately err-disabled</strong>. Maximum MACs = 1, already learned 0000.1111.2222. When 0000.3333.4444 sends a frame, it violates the policy. Shutdown mode = port immediately goes err-disabled. Recovery: admin must "shutdown" then "no shutdown" the port (and remove the unauthorized device). Violation count increments to 1.',
wrong_fb:'<strong>Port goes err-disabled</strong>. Violation mode Shutdown = immediate err-disable on first violation. The new PC\'s MAC (0000.3333.4444) is not the allowed MAC. Port security triggers, disabling the port. Recovery: "interface Gi0/1 → shutdown → no shutdown" (after removing unauthorized device). Check status: "show port-security interface Gi0/1" — SecureDown state means err-disabled.'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What is the difference between "sticky" MAC addresses and statically configured MAC addresses in port security?',
opts:['They are identical','Sticky MACs are dynamically learned and automatically saved to the running config; static MACs are manually configured','Sticky MACs expire after a timeout; static MACs are permanent','Sticky MACs only work on trunk ports'],
ans:1,
hint:'Sticky learning reduces the administrative burden of manually entering MAC addresses.',
correct_fb:'"<strong>Sticky</strong>" MAC addresses are <strong>dynamically learned and saved to the running config</strong> automatically. When the first device connects, its MAC is learned and immediately added as "switchport port-security mac-address sticky [MAC]" in the config. If you save the config (write mem), the MAC is preserved after reload. Static MACs must be manually configured per port.',
wrong_fb:'"<strong>Sticky</strong>" = auto-learn + save to config. Enable with: "switchport port-security mac-address sticky". The switch dynamically learns and saves the first MAC to running-config. "write memory" makes it permanent through reloads. Without sticky: manually type each allowed MAC per port. Sticky is the best practice for most deployments — auto-configures security without manual MAC entry.'
},
{topic:7,diff:'easy',type:'Multiple Choice',
q:'Which command configures a Cisco device to require local username/password authentication on VTY lines?',
opts:['login','login local','authentication aaa','password login local'],
ans:1,
hint:'You need to tell the VTY lines to check the local user database.',
correct_fb:'"<strong>login local</strong>" under VTY line configuration requires authentication against the local username database (configured with "username [name] secret [password]"). "login" alone uses the line password (set with "password [pw]"). "login local" is more secure because each user has individual credentials and can be tracked via logging.',
wrong_fb:'VTY authentication with local users:\nline vty 0 4\n login local\n transport input ssh\n\n"login" = uses line password (same for all users).\n"login local" = uses local user database (individual accounts). Create users with: "username admin privilege 15 secret [password]". "login local" is required for SSH authentication. Always pair with "transport input ssh" to disable Telnet.'
},
{topic:7,diff:'hard',type:'Multiple Choice',
q:'What is AAA and what are its three components?',
opts:['Address, Authentication, Authorization — used for IP management','Authentication, Authorization, and Accounting — controls who can access devices, what they can do, and tracks their actions','Administration, Access, and Audit — a security framework','Application, Authentication, and Authorization — web security model'],
ans:1,
hint:'It\'s a security framework for controlling network device access.',
correct_fb:'<strong>AAA = Authentication, Authorization, and Accounting</strong>: (1) <strong>Authentication</strong>: Who are you? (verify identity via username/password, certificates). (2) <strong>Authorization</strong>: What can you do? (privilege levels, command restrictions). (3) <strong>Accounting</strong>: What did you do? (audit trail, logging commands executed). Implemented via RADIUS (UDP 1812/1813) or TACACS+ (TCP 49) servers.',
wrong_fb:'<strong>AAA = Authentication + Authorization + Accounting</strong>. Authentication: identity verification. Authorization: access control (what commands, which devices). Accounting: logging all actions for audit. Protocols: RADIUS (open standard, UDP, combines auth+authz) and TACACS+ (Cisco, TCP/49, separates all three — preferred for granular command authorization). Configure with: "aaa new-model" globally.'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What is NTP (Network Time Protocol) and why is it important for network security?',
opts:['A protocol that assigns IP addresses dynamically','A protocol that synchronizes clocks across network devices; critical for log correlation, certificate validation, and security auditing','A protocol that encrypts management traffic','A backup protocol for DHCP'],
ans:1,
hint:'If devices have different times, security events become very difficult to investigate.',
correct_fb:'<strong>NTP</strong> synchronizes device clocks across the network. Security importance: (1) <strong>Log correlation</strong>: comparing logs from multiple devices requires consistent timestamps. (2) <strong>Certificate validation</strong>: SSL/TLS certificates have validity periods — wrong time breaks HTTPS. (3) <strong>Security forensics</strong>: accurate timestamps are legally required for incident investigation. Configure: "ntp server [IP]".',
wrong_fb:'<strong>NTP (port UDP 123)</strong> = clock synchronization. Critical for: log correlation (events on different devices must have matching timestamps), SSL/TLS certificate validation, Kerberos authentication (fails if clocks differ by >5 min), and forensic investigations. Config: "ntp server 192.168.1.1". Verify: "show ntp status" and "show ntp associations". Use hierarchical NTP: Stratum 1 (atomic clock) → Stratum 2 (router) → devices.'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What is the function of Syslog in network management?',
opts:['Assigns IP addresses to network devices','Forwards log messages from network devices to a central syslog server for monitoring, storage, and alerting','Encrypts management traffic between devices','Synchronizes configurations between routers'],
ans:1,
hint:'Centralized logging is essential for troubleshooting and security monitoring.',
correct_fb:'<strong>Syslog</strong> centralizes log messages from network devices (routers, switches, firewalls) to a syslog server. Benefits: (1) Central monitoring and alerting. (2) Long-term storage (devices have limited local storage). (3) Correlation of events across multiple devices. Syslog severity levels 0-7: Emergency(0), Alert(1), Critical(2), Error(3), Warning(4), Notice(5), Info(6), Debug(7). Config: "logging host [server-IP]".',
wrong_fb:'<strong>Syslog (UDP 514)</strong> = centralized logging. Devices send log messages to a syslog server. Severity levels (0=most severe): 0-Emergency, 1-Alert, 2-Critical, 3-Error, 4-Warning, 5-Notice, 6-Info, 7-Debug. Config: "logging host 192.168.1.100", "logging trap [level]". Mnemonic for levels: Every Awesome Cisco Engineer Will Need Daily Debugging. CCNA expects you to know the 8 levels and their numbers.'
},
{topic:7,diff:'easy',type:'Multiple Choice',
q:'Why should Telnet be replaced with SSH for remote device management?',
opts:['SSH is faster than Telnet','Telnet sends all data including passwords in plaintext; SSH encrypts all traffic','SSH supports more simultaneous connections','Telnet is not supported on Cisco devices'],
ans:1,
hint:'If someone captures your Telnet traffic with Wireshark, what would they see?',
correct_fb:'<strong>Telnet sends everything in PLAINTEXT</strong> — usernames, passwords, commands, and output are all visible to anyone capturing traffic. <strong>SSH encrypts all traffic</strong>, protecting credentials and session data. Use "transport input ssh" on VTY lines to disable Telnet. Minimum SSH configuration: hostname, domain name, RSA keys, local user account, "login local", "transport input ssh".',
wrong_fb:'Telnet = <strong>cleartext</strong> (password visible in Wireshark). SSH = <strong>encrypted</strong>. This is a critical security principle: never use Telnet for device management. Disable it: "line vty 0 4 → transport input ssh". SSH setup: hostname, ip domain-name, crypto key generate rsa (min 1024-bit, recommended 2048), username admin secret [pw], login local. Verify: "show ip ssh" for SSH version and status.'
},
{topic:7,diff:'hard',type:'Multiple Choice',
q:'What is "privilege level" in Cisco IOS and what are the key default privilege levels?',
opts:['A rating of how powerful a router is','A hierarchical access control system with 16 levels (0-15); 0=minimum access, 1=user mode, 15=privileged exec (full access)','A per-VLAN access control mechanism','A method for encrypting configuration files'],
ans:1,
hint:'Different users need different levels of access — not everyone needs the ability to change configurations.',
correct_fb:'Cisco IOS has <strong>16 privilege levels (0-15)</strong>. Key defaults: Level 0 = minimal (enable, disable, exit, help, logout only). Level 1 = User EXEC (default ">" prompt, limited show commands). Level 15 = Privileged EXEC (full access, "#" prompt, all commands). Levels 2-14 are configurable. Assign users: "username admin privilege 15 secret [pw]". Control access with "privilege exec level [n] [command]".',
wrong_fb:'<strong>16 privilege levels (0-15)</strong>: Level 1 = User EXEC (">"), Level 15 = Privileged EXEC ("#", full access). Levels 2-14 are customizable — assign specific commands to specific levels for granular control. Create user at level 15: "username admin privilege 15 secret [pw]". User at level 15 accesses privileged mode directly after SSH login (no "enable" needed). Used with AAA for role-based access control.'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What is CDP (Cisco Discovery Protocol) and when should it be disabled?',
opts:['A routing protocol for small networks','A Cisco proprietary Layer 2 protocol that discovers directly connected Cisco devices; should be disabled on interfaces facing untrusted networks','A method to assign VLANs automatically','A backup for Spanning Tree Protocol'],
ans:1,
hint:'CDP reveals device information — useful internally, dangerous externally.',
correct_fb:'<strong>CDP</strong> is a Cisco proprietary Layer 2 protocol that advertises device information (model, IOS version, IP addresses, capabilities) to directly connected Cisco devices. Disable on interfaces facing: internet, customers, or untrusted networks — the information CDP advertises helps attackers fingerprint your network. Global disable: "no cdp run". Per-interface: "no cdp enable".',

},
{topic:7,diff:'hard',type:'Multiple Choice',
q:'What is "Dynamic ARP Inspection (DAI)" and what attack does it prevent?',
opts:['Prevents duplicate IP addresses on a network','Validates ARP packets against the DHCP snooping binding table, preventing ARP spoofing/poisoning attacks','Prevents MAC address flooding on switch ports','Encrypts ARP traffic between hosts'],
ans:1,
hint:'ARP has no authentication — an attacker can send false ARP replies claiming to be the default gateway.',
correct_fb:'<strong>DAI (Dynamic ARP Inspection)</strong> validates ARP replies against the DHCP snooping binding table. It prevents <strong>ARP spoofing/poisoning</strong> — where an attacker sends false ARP replies claiming a malicious MAC corresponds to the gateway\'s IP. Without DAI, all hosts would send traffic to the attacker (man-in-the-middle). DAI drops ARP replies that don\'t match the binding table. Requires DHCP snooping to be enabled first.',
wrong_fb:'<strong>DAI prevents ARP spoofing/poisoning</strong>. Without DAI: attacker broadcasts "I am the default gateway, my MAC is [attacker MAC]" → all hosts update ARP cache → traffic flows to attacker (MITM). DAI checks each ARP reply against the DHCP snooping binding table (IP=MAC=port). Mismatches are dropped. Config: "ip arp inspection vlan [n]", "ip arp inspection trust" on uplinks. Requires DHCP snooping first.'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What command verifies the SSH version and configuration on a Cisco device?',

wrong_fb:'"<strong>show ip ssh</strong>" = SSH status and configuration. Shows version, timeout, retry settings. Check active sessions: "show ssh". Verify RSA keys: "show crypto key mypubkey rsa". Force SSH v2 (more secure): "ip ssh version 2". Check which VTY lines accept SSH: "show running-config | section line vty". Use "debug ip ssh" (sparingly) for detailed troubleshooting.'
},
{topic:7,diff:'easy',type:'Multiple Choice',
q:'What is the "enable secret" password used for on a Cisco device?',
opts:['Authenticating VTY line access','Protecting privileged EXEC mode — required to enter "#" from user mode with "enable"','Encrypting the startup configuration file','Setting the console password'],

wrong_fb:'"enable secret" = <strong>password for Privileged EXEC mode</strong>. Entering "enable" at the ">" prompt requires this password to access "#". Config: "enable secret [password]". Uses MD5 hashing (always encrypted in config). Hierarchical access: Console login → User EXEC (>) → enable + secret → Privileged EXEC (#) → config t → Global Config. Always configure enable secret — never leave privileged mode unprotected.'
},
{topic:7,diff:'hard',type:'Multiple Choice',
q:'What is "802.1X port-based Network Access Control (NAC)"?',
opts:['A trunking protocol for VLANs','A standard that requires endpoints to authenticate before gaining network access at the switch port level','A method to configure port security using MAC addresses','A protocol for encrypting traffic on switch ports'],
ans:1,
hint:'Authentication happens at the port level, before any IP address is assigned.',
correct_fb:'<strong>802.1X NAC</strong> requires devices to <strong>authenticate before gaining network access</strong> at the switch port level. Components: Supplicant (end device), Authenticator (switch), Authentication Server (RADIUS). The port is blocked until authentication succeeds. If authentication fails, the device is placed in a guest VLAN or denied. Prevents unauthorized devices from connecting to the network at Layer 2.',
wrong_fb:'<strong>802.1X = port-based authentication before network access</strong>. Three components: Supplicant (client), Authenticator (switch acts as gatekeeper), Authentication Server (RADIUS). Port states: Unauthorized (pre-auth, only EAP traffic), Authorized (full access after auth). Failed auth → Guest VLAN or blocked. Used in enterprise environments to ensure only authenticated devices connect. Pair with AD/LDAP for Windows domain authentication.'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What does the "no ip domain-lookup" command do on a Cisco router?',
opts:['Disables DNS resolution on the device entirely for all applications','Prevents the router from trying to DNS-resolve mistyped commands in the CLI, avoiding long timeouts','Removes all DNS server configurations','Disables DHCP on all interfaces'],

wrong_fb:'"<strong>no ip domain-lookup</strong>" stops the CLI from resolving unrecognized strings as DNS hostnames. Without it, mistyped commands cause: "Translating [typo]...domain server (255.255.255.255)" followed by a ~30-second timeout. Add to every lab config for sanity. Note: this doesn\'t break DNS for the device itself — only prevents CLI typo lookups. Lab staple command along with: "no logging console", "exec-timeout 0 0".'
},
{topic:7,diff:'hard',type:'Multiple Choice',
q:'What is the purpose of the "crypto key generate rsa" command and what is the recommended key size for SSH on a Cisco device?',
opts:['Generates a symmetric AES key for configuration encryption; 128-bit recommended','Generates an asymmetric RSA key pair used by SSH; 2048-bit or higher recommended for security','Creates a pre-shared key for IPSec VPN; 256-bit required','Generates a hash for enable secret encryption; 1024-bit minimum'],

},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What is the "exec-timeout" command used for on VTY and console lines?',

},
