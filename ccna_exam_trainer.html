{topic:2,diff:'easy',type:'Multiple Choice',
q:'What does the "S" prefix indicate in the output of "show ip route"?',
opts:['A summary route learned via OSPF','A static route manually configured by an administrator','A route learned via EIGRP successor','A directly connected subnet'],
ans:1,
hint:'Administrators configure these routes manually when they need full control.',
correct_fb:'"<strong>S</strong>" = <strong>Static route</strong>. Static routes are manually configured by network administrators. They have an AD of 1 (very trusted, second only to connected routes at AD 0). Common route codes: C=Connected, S=Static, O=OSPF, D=EIGRP, R=RIP, B=BGP. An "S*" means it\'s the default static route (gateway of last resort).',
wrong_fb:'"<strong>S</strong>" in "show ip route" = <strong>Static route</strong> (AD=1). Route codes: <strong>C</strong>=Connected (AD 0), <strong>S</strong>=Static (AD 1), <strong>D</strong>=EIGRP (AD 90), <strong>O</strong>=OSPF (AD 110), <strong>R</strong>=RIP (AD 120), <strong>B</strong>=BGP (AD 20 eBGP/200 iBGP). Memorize these — they appear on every CCNA exam.'
},
{topic:2,diff:'medium',type:'Multiple Choice',
q:'What is the administrative distance of a directly connected route?',
opts:['0','1','5','20'],
ans:0,
hint:'A directly connected interface is the most trusted source of routing information possible.',
correct_fb:'Directly connected routes have an AD of <strong>0</strong> — the most trusted possible. This makes sense: if an interface is directly connected, the router knows about that network with absolute certainty. AD scale: 0=Connected, 1=Static, 90=EIGRP, 110=OSPF, 120=RIP. Higher AD = less trusted.',
wrong_fb:'Directly connected routes = AD <strong>0</strong>. The router trusts its own directly connected interfaces more than any routing protocol. Static routes are AD 1. The AD scale goes from 0 (most trusted) to 255 (untrusted/unusable). AD 255 means "never use this route."'
},
{topic:2,diff:'medium',type:'Multiple Choice',
q:'Which OSPF state comes AFTER the Two-Way state during neighbor establishment?',
opts:['Full','ExStart','Loading','Exchange'],
ans:1,
hint:'OSPF neighbor states in order: Down → Init → Two-Way → ExStart → Exchange → Loading → Full.',
correct_fb:'After Two-Way comes <strong>ExStart</strong>. The full OSPF neighbor state progression: Down → Init → Two-Way → <strong>ExStart</strong> → Exchange → Loading → Full. In ExStart, routers elect a Master/Slave relationship and determine the starting DBD sequence number. Two-Way = bidirectional communication established. Full = complete adjacency with synchronized LSDBs.',
wrong_fb:'OSPF states in order: Down → Init → Two-Way → <strong>ExStart</strong> → Exchange → Loading → Full. ExStart = elect Master/Slave and set sequence numbers. Exchange = share DBD packets listing LSAs. Loading = request missing LSAs. Full = databases synchronized, adjacency complete. Two-Way is where the DR/BDR election also occurs on multi-access networks.'
},
{topic:2,diff:'hard',type:'Scenario',
q:'A router has two paths to 10.1.1.0/24: one via OSPF with cost 10, another via OSPF with cost 20. Both are OSPF routes. What will the router do?',
opts:['Install both routes and load-balance equally','Install only the cost-10 route (lower cost preferred)','Install the cost-20 route as backup only','Disable OSPF and use a static route'],
ans:1,
hint:'Within the same routing protocol, metric determines the best path.',
correct_fb:'Within OSPF, <strong>lower cost = preferred path</strong>. Only the cost-10 route is installed in the routing table as the active route. The cost-20 route is known but not used (unless the cost-10 path fails). Equal-cost load balancing only occurs when BOTH paths have identical metrics — in that case OSPF installs both and load-balances.',
wrong_fb:'OSPF installs only the <strong>lowest cost route</strong> (cost 10 wins over cost 20). Equal-cost load balancing (ECMP) only occurs when metric values are identical. If you wanted to use both paths, you would need to tune the interface cost so both paths equal the same value. OSPF supports up to 16 equal-cost paths by default.'
},
{topic:2,diff:'medium',type:'Multiple Choice',
q:'What command configures a default static route (gateway of last resort) on a Cisco router?',
opts:['ip route 0.0.0.0 0.0.0.0 [next-hop]','ip default-gateway [next-hop]','ip route default 0.0.0.0 [next-hop]','ip static-route 0.0.0.0 255.255.255.0 [next-hop]'],

wrong_fb:'"<strong>ip route 0.0.0.0 0.0.0.0 [next-hop-ip]</strong>" is the default static route. 0.0.0.0/0 is the "quad zero" route — matches everything. It shows as S* in the routing table. "ip default-gateway" is ONLY for Layer 2 switches to reach management destinations, not for routing. Routers use "ip route 0.0.0.0 0.0.0.0."'
},
{topic:2,diff:'hard',type:'Multiple Choice',
q:'What is the EIGRP Feasibility Condition, and why does it matter?',
opts:['The successor route must have the lowest bandwidth','A Feasible Successor\'s Reported Distance must be less than the current Successor\'s Feasible Distance — guarantees a loop-free backup path','All EIGRP neighbors must be in the same autonomous system','The Feasible Distance must equal the Reported Distance for backup paths'],
ans:1,
hint:'EIGRP uses this math to guarantee that backup paths are loop-free before a failure occurs.',
correct_fb:'The <strong>Feasibility Condition</strong>: a neighbor\'s Reported Distance (RD) must be <strong>less than</strong> the local Feasible Distance (FD) of the current best path. This mathematically guarantees the backup path (Feasible Successor) is loop-free. If a backup path meets this condition, it\'s pre-installed and can be used instantly upon failure — no reconvergence needed.',
wrong_fb:'EIGRP Feasibility Condition: backup path (Feasible Successor) is valid only if its <strong>Reported Distance < current Feasible Distance</strong>. This guarantees loop-free fast failover. If no FS exists when the Successor fails, EIGRP enters <strong>Active state</strong> and sends QUERY messages to find a new path. Understanding this distinction is critical for the CCNA exam.'
},
{topic:2,diff:'medium',type:'Multiple Choice',
q:'What does the "show ip protocols" command display?',
opts:['The routing table with all learned routes','Routing protocol configuration, timers, networks, and redistribution info','The OSPF neighbor adjacency table','Interface IP address assignments'],
ans:1,
hint:'This command shows HOW routing protocols are configured, not WHAT routes they\'ve learned.',
correct_fb:'"<strong>show ip protocols</strong>" displays: which routing protocols are running, their timers (hello/dead/update), the networks being advertised, passive interfaces, neighboring routers, and redistribution settings. It\'s essential for verifying routing protocol configuration. Use "show ip route" to see the actual routing table.',
wrong_fb:'"<strong>show ip protocols</strong>" shows routing protocol <strong>configuration details</strong>: protocol type, AD, networks advertised, timers, neighbors, and passive interfaces. It does NOT show the routing table (that\'s "show ip route") or neighbor state (that\'s "show ip ospf neighbor" or "show ip eigrp neighbors"). Use both commands together for complete troubleshooting.'
},
{topic:2,diff:'hard',type:'Scenario',
q:'An OSPF router shows neighbor 10.0.0.2 stuck in "EXSTART/Exchange" state. What is the MOST likely cause?',
opts:['Mismatched Hello/Dead timers','MTU mismatch between the two routers','Different OSPF process IDs','Mismatched area IDs'],
ans:1,
hint:'ExStart/Exchange involves exchanging database description packets — what could prevent these from being accepted?',
correct_fb:'<strong>MTU mismatch</strong> is the classic cause of OSPF stuck in ExStart/Exchange. During this phase, routers exchange DBD packets. If one router\'s interface MTU differs, DBD packets may be fragmented and rejected. Fix: "ip ospf mtu-ignore" or correct the MTU mismatch. Mismatched hello/dead timers prevent reaching Two-Way state — a different symptom entirely.',
wrong_fb:'<strong>MTU mismatch</strong> causes OSPF to get stuck in ExStart/Exchange. DBD packets larger than the lower MTU get fragmented and rejected. Hello/dead timer mismatches would keep the neighbor in INIT or prevent adjacency from starting. Area ID mismatches also prevent adjacency but at a different stage. MTU mismatch is the definitive ExStart/Exchange trap.'
},
{topic:2,diff:'easy',type:'Multiple Choice',
q:'RIP uses which metric to determine the best path?',
opts:['Cost (bandwidth-based)','Hop count (maximum 15)','Composite metric (bandwidth + delay)','Administrative distance'],
ans:1,
hint:'RIP is a distance-vector protocol with a very simple, easy-to-understand metric.',
correct_fb:'RIP uses <strong>hop count</strong> as its metric, with a maximum of <strong>15 hops</strong>. A hop count of 16 is considered unreachable. This simplicity is both RIP\'s strength (easy to understand) and weakness (doesn\'t consider bandwidth — a slow link counts the same as a fast link). RIP is rarely used in modern networks but still appears on the CCNA exam.',
wrong_fb:'RIP metric = <strong>hop count</strong>, max 15 (16 = unreachable). OSPF uses cost (bandwidth-based). EIGRP uses a composite metric (bandwidth + delay by default). RIP\'s hop count metric doesn\'t consider link speed — a 56Kbps dial-up link and a 10Gbps fiber link both count as "1 hop." This is why RIP is obsolete in modern enterprise networks.'
},
{topic:2,diff:'medium',type:'Multiple Choice',
q:'What is route summarization and what is its primary benefit?',
opts:['Breaking one large network into many small subnets to improve security','Combining multiple specific routes into one summarized advertisement to reduce routing table size','Distributing routes between different routing protocols','Blocking specific routes from being advertised'],
ans:1,
hint:'Think about what happens to routing table size as networks grow larger.',
correct_fb:'<strong>Route summarization</strong> (aggregation) combines multiple contiguous networks into a single advertisement. Example: 192.168.0.0/24 through 192.168.3.0/24 can be summarized as 192.168.0.0/22. Benefits: smaller routing tables, faster lookups, less routing protocol traffic, and isolating topology changes. OSPF does this at ABRs; EIGRP can do it at any router.',
wrong_fb:'<strong>Route summarization</strong> = combining multiple routes into one summary advertisement. Example: 10.1.0.0/24, 10.1.1.0/24, 10.1.2.0/24, 10.1.3.0/24 → summarized as 10.1.0.0/22. Benefits: reduced routing table size, faster convergence, less CPU/memory use, and contained topology changes. It\'s different from VLSM (which divides networks) — summarization combines them.'
},
{topic:2,diff:'hard',type:'Multiple Choice',
q:'Which OSPF router type connects two or more OSPF areas and has interfaces in multiple areas?',
opts:['Internal Router','Backbone Router','Area Border Router (ABR)','Autonomous System Boundary Router (ASBR)'],
ans:2,
hint:'This router sits at the boundary between OSPF areas and summarizes LSAs.',
correct_fb:'An <strong>ABR (Area Border Router)</strong> connects two or more OSPF areas, with at least one interface in Area 0 (backbone). ABRs maintain separate LSDBs for each area they connect and generate Type 3 Summary LSAs to advertise networks between areas. ABRs are also where inter-area route summarization is configured.',
wrong_fb:'<strong>ABR (Area Border Router)</strong> connects multiple OSPF areas (must include Area 0). An <strong>ASBR</strong> connects OSPF to other routing domains (redistributes external routes). An <strong>Internal Router</strong> has all interfaces in one area. A <strong>Backbone Router</strong> has at least one interface in Area 0. These distinctions are all tested on the CCNA.'
},
{topic:2,diff:'medium',type:'Multiple Choice',
q:'What is the purpose of the OSPF DR (Designated Router) on a broadcast network?',
opts:['To encrypt OSPF Hello packets','To reduce the number of OSPF adjacencies on a multi-access segment by acting as a central point for LSA flooding','To assign IP addresses to OSPF routers','To forward all data traffic between OSPF routers'],
ans:1,
hint:'Without a DR, how many adjacencies would 10 routers on the same segment need?',
correct_fb:'On a broadcast/multi-access network (like Ethernet), the <strong>DR reduces adjacency count</strong>. Without a DR, N routers would need N(N-1)/2 adjacencies. With a DR, every router forms full adjacency only with the DR and BDR — reducing overhead dramatically. All LSAs are sent to the DR (224.0.0.6), which then floods to all others (224.0.0.5).',
wrong_fb:'The OSPF <strong>DR (Designated Router)</strong> reduces adjacency overhead on broadcast networks. Without DR/BDR, 5 routers would need 10 full adjacencies [N(N-1)/2]. With DR/BDR, each router only fully adjacents with DR and BDR. The DR collects LSAs and re-floods them. Election: highest priority wins; tie broken by highest Router ID (usually highest loopback IP).'
},
{topic:2,diff:'easy',type:'Multiple Choice',
q:'Which command verifies EIGRP neighbor relationships on a Cisco router?',
opts:['show ip route eigrp','show ip eigrp neighbors','show eigrp topology','show ip protocols eigrp'],

correct_fb:'"<strong>show ip eigrp neighbors</strong>" displays all EIGRP neighbors, their interface, hold time, uptime, and queue counts. If a neighbor doesn\'t appear here, EIGRP adjacency hasn\'t formed. Compare with OSPF: "show ip ospf neighbor." For EIGRP routes specifically, use "show ip route eigrp" or "show ip eigrp topology" for the full topology table.',
wrong_fb:'"<strong>show ip eigrp neighbors</strong>" shows EIGRP neighbor table. "show ip eigrp topology" shows all EIGRP-known routes including Feasible Successors. "show ip route eigrp" shows only EIGRP routes in the routing table (the Successors). "show ip protocols" shows EIGRP configuration. Know all four — the exam tests which command to use in which scenario.'
},
{topic:2,diff:'hard',type:'Multiple Choice',
q:'A network has OSPF configured. A new loopback interface (10.10.10.1/32) is added to a router but does not appear in OSPF. What is the MOST likely cause?',
opts:['Loopback interfaces cannot run OSPF','The network statement does not include the loopback address','OSPF does not support /32 masks','The router-id must be changed to advertise loopbacks'],

correct_fb:'OSPF only advertises networks covered by the "<strong>network</strong>" statement. If the loopback 10.10.10.1/32 isn\'t included, it won\'t be advertised. Fix: "network 10.10.10.1 0.0.0.0 area 0" (exact match with /32 wildcard) OR use "ip ospf [process] area [area]" directly on the loopback interface. Loopbacks work fine with OSPF and /32 masks.',
wrong_fb:'OSPF only advertises networks matched by the "<strong>network [ip] [wildcard] area [id]</strong>" command. The loopback 10.10.10.1/32 is simply not covered by existing network statements. Fix: add "network 10.10.10.1 0.0.0.0 area 0" under the OSPF process. OSPF handles /32 loopbacks fine — they are actually preferred as Router IDs because they never go down.'
},
{topic:2,diff:'medium',type:'Multiple Choice',
q:'What is the difference between OSPF cost and EIGRP metric?',
opts:['Both use hop count as their metric','OSPF uses cost (reference bandwidth/interface bandwidth); EIGRP uses a composite metric (bandwidth + delay by default)','OSPF uses delay; EIGRP uses bandwidth only','Both use the same composite metric formula'],
ans:1,
hint:'These two protocols calculate path quality very differently — one looks at one factor, the other combines several.',
correct_fb:'<strong>OSPF cost</strong> = 10^8 / interface bandwidth (simple, single-factor). <strong>EIGRP metric</strong> = composite formula using bandwidth and delay by default (can also include reliability and load). Key difference: OSPF cost ignores delay; EIGRP considers it. Both result in lower = better. This is why identical links may be preferred differently by OSPF vs EIGRP.',
wrong_fb:'OSPF: <strong>cost = 10^8 / bandwidth</strong> (single factor). EIGRP: <strong>composite metric = [K1×BW + K3×Delay] × 256</strong> by default (K1=1, K3=1, others=0). OSPF considers only bandwidth; EIGRP uses bandwidth AND delay. Neither uses hop count (that\'s RIP). Understanding these metric calculations is essential for predicting path selection.'
},

{topic:3,diff:'easy',type:'Multiple Choice',
q:'What is the default VLAN on a Cisco switch port?',
opts:['VLAN 0','VLAN 1','VLAN 100','VLAN 1001'],
ans:1,
hint:'This VLAN is special — it cannot be deleted and carries management traffic by default.',
correct_fb:'<strong>VLAN 1</strong> is the default VLAN on all Cisco switch ports. All ports belong to VLAN 1 out of the box. VLAN 1 also carries CDP, VTP, and STP BPDUs. Security best practice: move user traffic off VLAN 1 and use it only for management (or not at all). VLANs 1002-1005 are reserved for legacy protocols (FDDI, Token Ring).',
wrong_fb:'<strong>VLAN 1</strong> is the default VLAN. Every switch port is in VLAN 1 by factory default. VLAN 1 carries control plane traffic (CDP, VTP, STP) and cannot be deleted. Security best practice: create dedicated VLANs for user traffic and keep VLAN 1 unused or strictly for management. VLANs 1002-1005 are reserved and also cannot be modified.'
},
{topic:3,diff:'medium',type:'Multiple Choice',
q:'What command assigns a switch port to VLAN 30?',
opts:['vlan 30','switchport vlan 30','switchport access vlan 30','interface vlan 30'],
ans:2,
hint:'You are configuring a specific interface to belong to a VLAN.',
correct_fb:'Under interface configuration mode: "<strong>switchport access vlan 30</strong>" assigns the port to VLAN 30. The full sequence: "interface Gi0/1" → "switchport mode access" → "switchport access vlan 30". The "switchport mode access" command is technically optional if the port is already in access mode, but always include it as best practice.',
wrong_fb:'"<strong>switchport access vlan 30</strong>" assigns a port to VLAN 30 in interface config mode. "interface vlan 30" creates a Layer 3 SVI (Switched Virtual Interface) for routing. "vlan 30" in global config creates the VLAN in the database but doesn\'t assign any ports. Always set "switchport mode access" first, then "switchport access vlan [id]."'
},
{topic:3,diff:'medium',type:'Multiple Choice',
q:'What is VTP (VLAN Trunking Protocol) and what are its modes?',
opts:['A protocol to trunk multiple VLANs; modes: access, trunk, hybrid','A Cisco protocol to synchronize VLAN databases across switches; modes: Server, Client, Transparent','A routing protocol for VLANs; modes: active, passive, standalone','An encryption protocol for VLAN traffic; modes: encrypt, pass-through, block'],
ans:1,
hint:'VTP is a management protocol that helps administrators avoid manually creating VLANs on every switch.',
correct_fb:'<strong>VTP (VLAN Trunking Protocol)</strong> synchronizes VLAN configuration across switches: <strong>Server</strong> = creates/modifies/deletes VLANs and propagates changes; <strong>Client</strong> = receives VTP updates but cannot make changes; <strong>Transparent</strong> = ignores VTP updates, forwards them, manages its own local VLAN database. VTP domain name and password must match for synchronization.',
wrong_fb:'<strong>VTP modes</strong>: <strong>Server</strong> (create/modify/delete VLANs, propagate changes), <strong>Client</strong> (receive updates only, cannot change), <strong>Transparent</strong> (local VLAN config only, passes VTP through). VTP3 adds a fourth mode: Off (does not participate at all). Beware: connecting a rogue VTP server with a higher revision number can wipe your VLAN database — a famous real-world outage scenario.'
},
{topic:3,diff:'hard',type:'Scenario',
q:'A switch port is configured as "switchport mode dynamic desirable." The neighbor switch port is "switchport mode dynamic auto." What will be the result?',
opts:['The link becomes a trunk — desirable actively negotiates and auto accepts','The link stays as an access port — both sides are passive','The link forms a trunk only if VLAN 1 is removed','The link fails — conflicting DTP modes cause an error'],
ans:0,
hint:'One side actively tries to form a trunk; the other passively accepts. What happens?',
correct_fb:'"<strong>dynamic desirable</strong>" actively sends DTP frames trying to form a trunk. "<strong>dynamic auto</strong>" passively waits and accepts trunk formation if the other side initiates. Result: <strong>trunk forms</strong>. DTP negotiation table: desirable+desirable=trunk, desirable+auto=trunk, auto+auto=access, trunk+any=trunk, access+any=access. Know this table cold.',
wrong_fb:'<strong>Trunk forms</strong>: "dynamic desirable" actively negotiates → "dynamic auto" passively accepts. DTP negotiation results: desirable+desirable=<strong>trunk</strong>, desirable+auto=<strong>trunk</strong>, auto+auto=<strong>access</strong>, trunk+trunk=<strong>trunk</strong>, access+anything=<strong>access</strong>. Memorize this matrix — the CCNA exam presents DTP combination scenarios regularly.'
},
{topic:3,diff:'medium',type:'Multiple Choice',
q:'What is an SVI (Switched Virtual Interface) and what is it used for?',
opts:['A physical interface that handles VLAN tagging','A virtual Layer 3 interface on a switch used for inter-VLAN routing and switch management','A security feature that isolates VLAN traffic','A backup interface activated when a physical port fails'],
ans:1,
hint:'Layer 3 switches can route between VLANs internally without a router.',
correct_fb:'An <strong>SVI (Switched Virtual Interface)</strong> is a virtual Layer 3 interface created with "interface vlan [id]." Uses: (1) inter-VLAN routing on a Layer 3 switch ("ip routing" must be enabled), (2) switch management IP address ("interface vlan 1" → "ip address..."), (3) applying ACLs to VLAN traffic. Each VLAN can have one SVI.',
wrong_fb:'<strong>SVI (interface vlan [id])</strong> = virtual Layer 3 interface for a VLAN. Two main uses: (1) <strong>Management IP</strong> for the switch (usually on VLAN 1 or a dedicated management VLAN), (2) <strong>Inter-VLAN routing</strong> on a Layer 3 switch (requires "ip routing" global command). SVIs are more efficient than router-on-a-stick for inter-VLAN routing in large networks.'
},
{topic:3,diff:'hard',type:'Multiple Choice',
q:'A switch port is connected to a PC but the PC cannot communicate with its default gateway in a different VLAN. The switchport is correctly assigned to VLAN 10. What should be verified NEXT?',
opts:['Verify the PC has the correct subnet mask','Verify inter-VLAN routing is configured on the router or Layer 3 switch','Verify the switch has VLAN 10 in its VLAN database','Verify the trunk link is allowing VLAN 10'],
ans:1,
hint:'The PC is in the right VLAN but can\'t reach a different VLAN — what bridges VLANs?',
correct_fb:'Since the PC is correctly in VLAN 10 but can\'t reach its default gateway in another VLAN, <strong>inter-VLAN routing</strong> must be verified. Check: Is a router-on-a-stick configured? Are the subinterfaces up with correct dot1q encapsulation? Or is the Layer 3 switch running "ip routing" with SVIs for each VLAN? The trunk link carrying VLAN 10 to the router should also be verified.',
wrong_fb:'The PC is correctly in VLAN 10, so the VLAN assignment is fine. The problem is <strong>inter-VLAN routing</strong> — traffic between VLANs requires Layer 3 routing. Verify: router-on-a-stick subinterface config (encapsulation dot1q), OR Layer 3 switch SVIs with "ip routing" enabled. Also verify the trunk link carries VLAN 10. This is a systematic CCNA troubleshooting question.'
},
{topic:3,diff:'easy',type:'Multiple Choice',
q:'What command shows which VLAN each switch port belongs to?',
opts:['show interfaces trunk','show vlan brief','show ip vlan','show switchport vlan'],
ans:1,
hint:'You want a quick summary of all VLANs and their assigned ports.',
correct_fb:'"<strong>show vlan brief</strong>" displays all active VLANs and the ports assigned to each. Output includes VLAN ID, name, status, and ports. This is your first troubleshooting step to verify port VLAN membership. Note: trunk ports do NOT appear in "show vlan brief" — they show up in "show interfaces trunk" instead.',
wrong_fb:'"<strong>show vlan brief</strong>" = VLAN ID, name, status, and assigned access ports. Important: trunk ports do NOT appear here. "show interfaces trunk" shows trunk port details. If a port doesn\'t show in "show vlan brief," either it\'s a trunk port or the VLAN doesn\'t exist in the database. Verify with both commands when troubleshooting.'
},
{topic:3,diff:'medium',type:'Multiple Choice',
q:'What does the "switchport nonegotiate" command do?',
opts:['Prevents VLAN negotiations between switches','Disables DTP on the port so it will not send or respond to DTP frames','Forces the port to always be a trunk','Prevents the port from joining any VLAN'],
ans:1,
hint:'DTP frames can be a security concern on ports connected to untrusted devices.',
correct_fb:'"<strong>switchport nonegotiate</strong>" disables DTP on the port — it stops sending and responding to DTP frames. This is a security best practice: use it on trunk ports where you don\'t want DTP negotiation (especially toward untrusted devices). If you want a static trunk, configure "switchport mode trunk" + "switchport nonegotiate." This prevents VLAN hopping attacks via DTP.',
wrong_fb:'"<strong>switchport nonegotiate</strong>" disables DTP (Dynamic Trunking Protocol) negotiation. The port will not send DTP frames or respond to them. Use it on static trunk/access ports for security — DTP frames can be exploited in VLAN hopping attacks. Best practice: "switchport mode trunk" + "switchport nonegotiate" on all trunk ports.'
},
{topic:3,diff:'hard',type:'Multiple Choice',
q:'A VLAN is in the VLAN database but traffic is not passing on the trunk. What command adds VLAN 50 to an existing trunk link?',
opts:['switchport trunk native vlan 50','switchport trunk allowed vlan add 50','vlan 50 trunk','trunk allowed vlan 50'],
ans:1,
hint:'Trunk links have an "allowed VLAN" list — VLANs not on the list are pruned.',
correct_fb:'"<strong>switchport trunk allowed vlan add 50</strong>" adds VLAN 50 to the existing allowed list without removing others. CAUTION: "switchport trunk allowed vlan 50" (without "add") would REPLACE the allowed list with only VLAN 50, removing all others! Always use "add" to append. Use "show interfaces trunk" to verify the allowed VLAN list.',
wrong_fb:'"<strong>switchport trunk allowed vlan add 50</strong>" appends VLAN 50 to the trunk. WARNING: "switchport trunk allowed vlan 50" WITHOUT "add" replaces the ENTIRE allowed list — only VLAN 50 would pass, breaking all other VLANs. This is a very common real-world and exam mistake. Always use "add" when appending to an existing trunk allowed list.'
},
// ── TOPIC 4: ACLs — questions 17-50 ──
{topic:4,diff:'medium',type:'Multiple Choice',
q:'What wildcard mask would match only the host 192.168.1.50?',
opts:['255.255.255.255','0.0.0.255','0.0.0.0','255.0.0.0'],
ans:2,
hint:'A wildcard mask of all zeros means every bit must match exactly.',
correct_fb:'Wildcard mask <strong>0.0.0.0</strong> means "match ALL bits exactly" — equivalent to a /32 host match. This is the same as using the "host" keyword: "host 192.168.1.50" = "192.168.1.50 0.0.0.0". Wildcard masks are the inverse of subnet masks: where subnet mask has 1s, wildcard has 0s (match this bit); where subnet mask has 0s, wildcard has 1s (ignore this bit).',
wrong_fb:'Wildcard <strong>0.0.0.0</strong> = match all bits exactly (host-specific). 0.0.0.255 = match first three octets exactly, ignore last (matches /24 network). 255.255.255.255 = ignore all bits (matches everything = "any" keyword). Wildcard mask rule: 0 bit = must match, 1 bit = don\'t care. It\'s the bitwise inverse of a subnet mask.'
},
{topic:4,diff:'medium',type:'Multiple Choice',
q:'What wildcard mask matches the entire 10.0.0.0/8 network?',
opts:['10.0.0.0 255.255.255.0','10.0.0.0 0.255.255.255','10.0.0.0 0.0.0.255','10.0.0.0 255.0.0.0'],
ans:1,
hint:'For a /8 network, only the first octet needs to match.',
correct_fb:'For 10.0.0.0/8: wildcard = <strong>0.255.255.255</strong>. The first octet (10) must match exactly (0 = must match), the remaining three octets are irrelevant (255 = ignore). ACL entry: "permit ip 10.0.0.0 0.255.255.255 any". Calculate wildcard by subtracting subnet mask from 255.255.255.255: 255.255.255.255 - 255.0.0.0 = 0.255.255.255.',
wrong_fb:'10.0.0.0/8 wildcard = <strong>0.255.255.255</strong>. Formula: 255.255.255.255 minus subnet mask = wildcard mask. For /8: 255.255.255.255 - 255.0.0.0 = 0.255.255.255. The 0 in the first position means "first octet must equal 10." The 255s mean "last three octets = any value." This matches any IP starting with 10.'
},
{topic:4,diff:'hard',type:'Scenario',
q:`An ACL has these entries (applied inbound on Gi0/0):\n10 deny tcp 192.168.1.0 0.0.0.255 any eq 23\n20 permit ip any any\n\nA Telnet packet from 192.168.1.5 arrives. What happens?`,
opts:['Permitted — line 20 permits all IP','Denied — line 10 matches TCP port 23 (Telnet) from 192.168.1.x','Denied — the implicit deny catches it','Permitted — Telnet is always allowed on inbound ACLs'],
ans:1,
hint:'ACLs process rules top-to-bottom and stop at the first match.',
correct_fb:'<strong>Line 10 matches and denies</strong> the Telnet packet. ACLs process <strong>top to bottom, first match wins</strong>. The packet is from 192.168.1.5 (matches 192.168.1.0/24), uses TCP (matches tcp), and targets port 23 (Telnet). Line 10 fires, the packet is denied, and processing stops — line 20 is never reached. This is correct security: block Telnet (insecure), permit everything else.',
wrong_fb:'<strong>Line 10 matches first and denies the packet</strong>. ACL processing is <strong>sequential — first match wins</strong>, no further lines checked. 192.168.1.5 matches 192.168.1.0 0.0.0.255, TCP matches, port 23 = Telnet matches → DENY. Line 20 is never reached. This is why ACL order is critical — more specific rules must come BEFORE general permits.'
},
{topic:4,diff:'easy',type:'Multiple Choice',
q:'Which command applies an ACL named "BLOCK_TELNET" to interface Gi0/0 in the inbound direction?',
opts:['access-group BLOCK_TELNET in','ip access-group BLOCK_TELNET in','access-list BLOCK_TELNET in','ip access-list BLOCK_TELNET in Gi0/0'],
ans:1,
hint:'ACLs must be applied to an interface in a specific direction using a specific command.',
correct_fb:'"<strong>ip access-group BLOCK_TELNET in</strong>" applies the ACL to the interface inbound. This command is entered under interface configuration mode: "interface Gi0/0" → "ip access-group BLOCK_TELNET in". "in" = filter traffic entering the interface; "out" = filter traffic leaving. Each interface can have one ACL inbound and one outbound.',
wrong_fb:'"<strong>ip access-group [name/number] in|out</strong>" applies an ACL to an interface. Entered in interface configuration mode. Direction: "in" = arriving packets, "out" = departing packets. Each interface supports one inbound + one outbound ACL. "access-group" without "ip" is not a valid IOS command. Named and numbered ACLs use the same application command.'
},
{topic:4,diff:'hard',type:'Multiple Choice',
q:'A standard ACL "permit 172.16.0.0 0.0.255.255" is applied outbound on the interface facing the server. Traffic from 172.16.50.100 to the server is denied. What is MOST likely wrong?',
opts:['Standard ACLs cannot be applied outbound','The implicit deny is blocking traffic not explicitly permitted — only 172.16.x.x is allowed','The wildcard mask is wrong — it should be 255.255.0.0','Standard ACLs cannot match /16 networks'],
ans:1,
hint:'What happens to all traffic that doesn\'t match the permit statement?',
correct_fb:'The <strong>implicit deny</strong> is blocking all traffic that doesn\'t match the permit. If the ACL only has "permit 172.16.0.0 0.0.255.255," then ONLY 172.16.x.x traffic is allowed. All other traffic hits the implicit "deny all" at the end. If 172.16.50.100 is being denied, verify it\'s actually from the 172.16.0.0/16 range — it should match. If other subnets need access, add explicit permit statements.',
wrong_fb:'The <strong>implicit deny all</strong> at the end of every ACL blocks everything not explicitly permitted. If only "permit 172.16.0.0 0.0.255.255" exists, ONLY 172.16.x.x addresses are allowed. Since 172.16.50.100 SHOULD match 172.16.0.0/16 (0.0.255.255 wildcard), verify the source IP and wildcard math. The fix for allowing other traffic: add additional permit statements before the implicit deny takes effect.'
},
{topic:4,diff:'medium',type:'Multiple Choice',
q:'What is the purpose of the "show access-lists" command?',
opts:['Shows which interfaces have ACLs applied','Shows all ACL rules and how many times each rule has been matched','Shows only active ACL denies in real time','Shows the routing table filtered by ACL'],
ans:1,
hint:'This command is your primary ACL troubleshooting tool.',
correct_fb:'"<strong>show access-lists</strong>" displays all configured ACLs with their rules AND <strong>match counts</strong> (how many packets matched each line). This is invaluable for troubleshooting: if a rule has 0 matches, traffic isn\'t reaching it. If an unexpected deny has high match count, you found your problem. Use "show ip interface [name]" to see which ACL is applied to which interface and direction.',
wrong_fb:'"<strong>show access-lists</strong>" shows ACL rules + <strong>hit counts</strong> per rule. If a permit rule shows 0 matches, traffic isn\'t reaching it (maybe blocked by an earlier deny). High match counts on a deny rule = that rule is actively filtering. To see which interfaces have ACLs applied: "show ip interface [name]" — look for "Inbound/Outbound access list is..."'
},
{topic:4,diff:'hard',type:'Multiple Choice',
q:'What is a "reflexive ACL" and when would you use it?',
opts:['An ACL that applies the same rules on both inbound and outbound directions','An ACL that dynamically creates temporary permit entries to allow return traffic for sessions initiated from inside','An ACL that reflects denied traffic back to the sender','An ACL that copies rules from one interface to another'],
ans:1,
hint:'How do you allow return traffic from an outbound session without permanently opening those ports inbound?',
correct_fb:'A <strong>reflexive ACL</strong> dynamically creates <strong>temporary permit entries</strong> for return traffic. When an inside host initiates a TCP session outbound, the reflexive ACL creates a mirror-image permit for the expected return traffic — then removes it when the session ends. This allows outbound sessions while blocking unsolicited inbound traffic. More advanced than basic extended ACLs.',
wrong_fb:'<strong>Reflexive ACLs</strong> create <strong>dynamic, temporary permit rules</strong> for return traffic based on outbound sessions. Example: PC inside initiates HTTP to internet → reflexive ACL creates temporary "permit tcp [server] → [PC] established" → when session closes, the rule is removed. More sophisticated than statically permitting "established" TCP, as it tracks sessions dynamically.'
},
// ── TOPIC 5: Spanning Tree — questions 18-50 ──
{topic:5,diff:'easy',type:'Multiple Choice',
q:'What problem does Spanning Tree Protocol (STP) solve?',
opts:['IP address conflicts between switches','Layer 2 loops that cause broadcast storms and MAC table instability','Routing loops in Layer 3 networks','VLAN misconfigurations on trunk ports'],
ans:1,
hint:'Without STP, redundant switch links would cause an uncontrollable problem.',
correct_fb:'STP prevents <strong>Layer 2 loops</strong>. Without STP, redundant links between switches create broadcast storms: a broadcast frame is forwarded endlessly around the loop, consuming all bandwidth. STP logically blocks redundant ports to create a loop-free topology while keeping those physical links available for failover when the primary path fails.',
wrong_fb:'STP prevents <strong>Layer 2 broadcast storms</strong> caused by switching loops. Without STP: Frame → Switch A → Switch B → Switch A → Switch B → infinite loop. Broadcasts multiply with each pass, consuming 100% of bandwidth instantly. STP puts redundant ports in "blocking" state, breaking the loop while keeping the physical link ready as a backup.'
},
{topic:5,diff:'medium',type:'Multiple Choice',
q:'What are the four STP port states in order from initial connection to forwarding?',
opts:['Blocking → Forwarding → Learning → Listening','Blocking → Listening → Learning → Forwarding','Disabled → Blocking → Forwarding → Active','Down → Init → Learning → Forwarding'],
ans:1,
hint:'Think about the logical progression: block first, then listen, then learn, then forward.',
correct_fb:'STP port states: <strong>Blocking</strong> (15s max wait, receives BPDUs only) → <strong>Listening</strong> (15s, participates in BPDU exchange, elects root) → <strong>Learning</strong> (15s, builds MAC table, no forwarding) → <strong>Forwarding</strong> (active, forwards frames). Total convergence time: ~30-50 seconds. RSTP (802.1w) reduces this dramatically through proposal/agreement mechanism.',
wrong_fb:'STP states in order: <strong>Blocking → Listening → Learning → Forwarding</strong>. Times: Blocking (up to max age 20s), Listening (15s = forward delay), Learning (15s = forward delay). Total = up to 50 seconds for convergence. This long delay is why Rapid STP (RSTP/802.1w) was developed — it converges in seconds using proposal/agreement instead of timers.'
},
{topic:5,diff:'medium',type:'Multiple Choice',
q:'What is the default STP bridge priority on a Cisco switch?',
opts:['0','4096','32768','65535'],
ans:2,
hint:'This value must be configurable in increments of 4096.',
correct_fb:'Default bridge priority is <strong>32768</strong>. Priority must be configured in increments of 4096: 0, 4096, 8192, 12288, 16384, 20480, 24576, 28672, 32768, 36864... up to 61440. Lower priority = more likely to win root bridge election. "spanning-tree vlan 1 root primary" automatically sets priority to 24576 (or lower if needed to beat current root).',
wrong_fb:'Default priority = <strong>32768</strong>. Must be configured in multiples of 4096 (4096, 8192, ..., 32768). To make a switch root bridge, lower its priority: "spanning-tree vlan 1 priority 4096". The shortcut "spanning-tree vlan 1 root primary" sets priority to 24576 (24576 < default 32768, guarantees root). "root secondary" sets to 28672.'
},
{topic:5,diff:'hard',type:'Scenario',
q:'A switch port with PortFast enabled suddenly shows CDP neighbors from another switch. BPDU Guard is also enabled. What happens?',
opts:['The trunk forms automatically','The port immediately enters err-disabled state','PortFast disables itself and STP runs normally','The new switch becomes the root bridge'],
ans:1,
hint:'BPDU Guard takes immediate, drastic action when it detects switch traffic on a PortFast port.',
correct_fb:'<strong>BPDU Guard immediately err-disables the port</strong>. The newly connected switch sends BPDU frames. BPDU Guard detects a BPDU on a PortFast port, considers this a violation (switches should not connect to PortFast ports), and shuts the port down (err-disabled). The port LED turns amber. An administrator must investigate, disconnect the rogue switch, then manually recover with "shutdown" / "no shutdown."',
wrong_fb:'<strong>BPDU Guard err-disables the port immediately</strong> upon receiving any BPDU. PortFast ports are designated for end devices only. A switch connecting to one and sending BPDUs triggers BPDU Guard — protecting the network from potential loops. Recovery requires: remove the switch, then "interface Gi0/x" → "shutdown" → "no shutdown" (or configure "errdisable recovery cause bpduguard").'
},
{topic:5,diff:'medium',type:'Multiple Choice',
q:'What is Rapid STP (RSTP) and how does it improve on classic STP?',
opts:['RSTP adds more port states for better loop detection','RSTP uses proposal/agreement mechanism instead of timer-based convergence, reducing convergence from 50s to seconds','RSTP eliminates the need for a root bridge','RSTP uses hop count like RIP for better metric calculation'],
ans:1,
hint:'The biggest complaint about classic STP was how long it took to recover from a failure.',
correct_fb:'<strong>RSTP (802.1w)</strong> replaces timer-based convergence with a <strong>proposal/agreement handshake</strong>. Instead of waiting 30-50 seconds through Listening and Learning states, RSTP negotiates directly with neighbors to rapidly transition ports. RSTP also introduces new port roles (Alternate, Backup) that pre-select backup paths. Convergence drops from 50 seconds to under 1 second in most cases.',
wrong_fb:'<strong>RSTP (802.1w)</strong> replaces STP timers with <strong>proposal/agreement messaging</strong> between directly connected switches. Classic STP: 30-50 second convergence (Listening 15s + Learning 15s). RSTP: sub-second convergence using active negotiation. RSTP also adds port roles: Alternate (backup for root port) and Backup (backup for designated port). Cisco\'s PVST+ and Rapid PVST+ implement these per-VLAN.'
},
{topic:5,diff:'hard',type:'Multiple Choice',
q:'On a non-root switch, which port is selected as the Root Port?',
opts:['The port with the lowest port number','The port with the highest bandwidth to the root bridge','The port with the lowest total path cost to the root bridge','The port connected to the highest-priority switch'],
ans:2,
hint:'Every non-root switch needs exactly one path toward the root bridge.',
correct_fb:'The <strong>Root Port</strong> is the port with the <strong>lowest cumulative path cost to the root bridge</strong>. STP adds costs along the path: 10Gbps=2, 1Gbps=4, 100Mbps=19, 10Mbps=100. If costs tie, tiebreakers are: (1) lowest sender Bridge ID, (2) lowest sender port priority, (3) lowest sender port number. Every non-root switch has exactly one Root Port.',
wrong_fb:'Root Port = port with <strong>lowest total path cost to root bridge</strong>. Path cost is cumulative: add costs of all links from this switch back to root. Cost values: 10Gbps=2, 1Gbps=4, 100Mbps=19, 10Mbps=100. Tie-breaking order: (1) lowest upstream Bridge ID, (2) lowest upstream port priority, (3) lowest upstream port number. The Root Port is always in Forwarding state.'
},
{topic:5,diff:'medium',type:'Multiple Choice',
q:'What STP port state actively forwards traffic AND sends/receives BPDUs?',
opts:['Blocking','Listening','Learning','Forwarding'],
ans:3,
hint:'Only one state does all three: forward data, send BPDUs, and receive BPDUs.',
correct_fb:'<strong>Forwarding</strong> is the only state that fully forwards traffic AND sends/receives BPDUs. State summary: Blocking = receive BPDUs only (no forward); Listening = send/receive BPDUs, no data forward, no MAC learning; Learning = send/receive BPDUs, no forward, builds MAC table; Forwarding = full operation. PortFast skips Listening and Learning, jumping directly to Forwarding.',
wrong_fb:'<strong>Forwarding</strong> = full operation (forward frames, send/receive BPDUs, learn MACs). STP state behavior: <strong>Blocking</strong>=receive BPDUs only; <strong>Listening</strong>=send+receive BPDUs, no forward, no learn; <strong>Learning</strong>=send+receive BPDUs, learn MACs, no forward; <strong>Forwarding</strong>=everything. PortFast bypasses Listening and Learning — useful for end-device ports.'
},
// ── TOPIC 6: IPv6 — questions 19-52 ──
{topic:6,diff:'easy',type:'Multiple Choice',
q:'How many bits are in an IPv6 address?',
opts:['32','64','128','256'],
ans:2,
hint:'IPv6 was designed to solve IPv4 address exhaustion — it needed vastly more addresses.',
correct_fb:'IPv6 addresses are <strong>128 bits</strong> long, written as 8 groups of 4 hexadecimal digits separated by colons (e.g., 2001:0DB8:0000:0000:0000:0000:0001:0002). This provides 2^128 ≈ 340 undecillion addresses — enough for every atom on Earth\'s surface to have millions of addresses. IPv4 is only 32 bits (≈4.3 billion addresses).',
wrong_fb:'IPv6 = <strong>128 bits</strong>, written as 8 × 16-bit hex groups (e.g., 2001:DB8::1). IPv4 = 32 bits (≈4.3 billion). IPv6 = 2^128 ≈ 340 undecillion addresses. Format: 8 groups of 4 hex digits, colon-separated: xxxx:xxxx:xxxx:xxxx:xxxx:xxxx:xxxx:xxxx. The 64-bit boundary splits the address into /64 network prefix (first 4 groups) and interface ID (last 4 groups) in most cases.'
},
{topic:6,diff:'medium',type:'Multiple Choice',
q:'What IPv6 address type is equivalent to IPv4 private addresses (RFC 1918)?',
opts:['Global Unicast (2000::/3)','Link-Local (FE80::/10)','Unique Local Unicast (FC00::/7)','Multicast (FF00::/8)'],
ans:2,
hint:'These addresses are routable within an organization but not on the public internet.',
correct_fb:'<strong>Unique Local Unicast (ULA)</strong> addresses (FC00::/7, commonly FC00:: or FD00::) are the IPv6 equivalent of RFC 1918 private addresses. They are routable within an organization/site but NOT on the public internet. The "FD" prefix (FD00::/8) is commonly used with a randomly generated 40-bit site ID. Compare: Global Unicast = public IPv4, Link-Local = 169.254.x.x (APIPA).',
wrong_fb:'<strong>Unique Local Unicast (FC00::/7)</strong> = IPv6 equivalent of RFC 1918 private space (10.x, 172.16-31.x, 192.168.x). ULA addresses are not routed on the public internet. Typically use FD00::/8 with a random 40-bit global ID. Global Unicast (2000::/3) = public IPv4 equivalent. Link-Local (FE80::/10) = APIPA (169.254.x.x) equivalent.'
},
{topic:6,diff:'medium',type:'Multiple Choice',
q:'What is SLAAC (Stateless Address Autoconfiguration) in IPv6?',
opts:['A DHCPv6 method that tracks all assigned addresses','A method where hosts automatically configure their own IPv6 address using the network prefix from Router Advertisements','A protocol that assigns IPv6 addresses from a central server','A method for IPv6 routers to learn routes automatically'],
ans:1,
hint:'The "stateless" part means no server needs to track which addresses are assigned.',
correct_fb:'<strong>SLAAC</strong> allows hosts to self-configure IPv6 addresses without a DHCPv6 server. Process: (1) Host generates a Link-Local address; (2) Router sends Router Advertisement (RA) with the /64 network prefix; (3) Host combines the /64 prefix + EUI-64 interface ID (from MAC) = full 128-bit address. No server tracks assignments — hence "stateless." Enabled by "ipv6 unicast-routing" on routers.',
wrong_fb:'<strong>SLAAC</strong> = hosts build their own IPv6 addresses by combining: (1) /64 prefix from Router Advertisement + (2) EUI-64 interface ID (derived from MAC). No DHCPv6 server needed — the host generates its own address. "Stateless" = no server tracking assignments. Compare: Stateful DHCPv6 = server assigns and tracks addresses (like IPv4 DHCP). Many networks use both together (SLAAC + DHCPv6 for DNS info).'
},
{topic:6,diff:'hard',type:'Multiple Choice',
q:'Which IPv6 address is the equivalent of the IPv4 broadcast 255.255.255.255?',
opts:['FF02::1 (all-nodes multicast)','FE80::FF:FF','FF00::','::1 (loopback)'],
ans:0,
hint:'IPv6 does not have broadcast — it uses multicast instead. Which multicast reaches all nodes?',
correct_fb:'IPv6 has <strong>no broadcast</strong> — it uses multicast instead. <strong>FF02::1</strong> (all-nodes link-local multicast) is the closest equivalent to IPv4 broadcast, reaching all IPv6 devices on the local link. FF02::2 = all routers. FF02::5 = all OSPF routers. FF02::6 = all OSPF DRs. FF02::9 = all RIPng routers. This is a fundamental IPv6 difference from IPv4.',
wrong_fb:'IPv6 replaces broadcast with multicast. <strong>FF02::1</strong> = all-nodes link-local multicast (≈ broadcast). Other important IPv6 multicast addresses: FF02::2=all routers, FF02::5=OSPF routers, FF02::6=OSPF DR/BDR, FF02::9=RIPng, FF02::A=EIGRP. IPv6 eliminates broadcast entirely to reduce unnecessary traffic — all devices no longer need to process every frame on the segment.'
},
{topic:6,diff:'medium',type:'Multiple Choice',
q:'What is the correct full expansion of the compressed IPv6 address 2001:DB8::1?',
opts:['2001:00DB:0008:0000:0000:0000:0000:0001','2001:0DB8:0000:0000:0000:0000:0000:0001','2001:DB80:0000:0000:0000:0000:0000:0001','2001:0DB8:0001:0000:0000:0000:0000:0000'],
ans:1,
hint:'The :: replaces the longest string of consecutive all-zero groups. Expand each group to 4 hex digits.',
correct_fb:'<strong>2001:0DB8:0000:0000:0000:0000:0000:0001</strong>. Expansion rules: (1) Restore leading zeros to each group — DB8 becomes 0DB8; (2) The :: replaces six consecutive all-zero groups (0000:0000:0000:0000:0000:0000); (3) The final group 1 becomes 0001. Count: 2001 + 0DB8 + six 0000s + 0001 = 8 groups ✓.',
wrong_fb:'Expanding 2001:DB8::1: (1) Restore leading zeros: DB8 → 0DB8, 1 → 0001. (2) Count existing groups: 2001, 0DB8, 0001 = 3 groups. (3) :: represents 8-3 = 5 zero groups. Result: <strong>2001:0DB8:0000:0000:0000:0000:0000:0001</strong>. Always verify: expanded address must have exactly 8 groups of 4 hex digits (128 bits total).'
},
{topic:6,diff:'hard',type:'Multiple Choice',
q:'What is the purpose of NDP (Neighbor Discovery Protocol) in IPv6?',
opts:['Assigns IPv6 addresses via a central server','Replaces ARP, performs router discovery, and handles address autoconfiguration — uses ICMPv6 messages','Encrypts IPv6 traffic between neighbors','Provides QoS for IPv6 multicast traffic'],
ans:1,
hint:'NDP does the job that ARP, ICMP Router Discovery, and ICMP Redirect all did in IPv4.',
correct_fb:'<strong>NDP (Neighbor Discovery Protocol)</strong> is IPv6\'s replacement for ARP and more. Uses ICMPv6 messages: Neighbor Solicitation/Advertisement (replaces ARP), Router Solicitation/Advertisement (router/prefix discovery for SLAAC), Redirect (optimal routing). NDP uses multicast instead of broadcast — Neighbor Solicitations go to the "Solicited-Node Multicast" address (FF02::1:FF/104), making it much more efficient than ARP.',
wrong_fb:'<strong>NDP replaces ARP</strong> and adds capabilities: (1) <strong>Neighbor Solicitation/Advertisement</strong> = IPv6 ARP equivalent; (2) <strong>Router Solicitation/Advertisement</strong> = enables SLAAC; (3) <strong>Redirect</strong> = better routing info. NDP uses ICMPv6 and multicast (not broadcast). Solicited-Node multicast address (FF02::1:FF[last 24 bits]) makes address resolution far more efficient than IPv4 ARP broadcasts.'
},
{topic:6,diff:'medium',type:'Multiple Choice',
q:'A router interface is configured with "ipv6 address 2001:DB8:1:1::1/64". What is the network prefix?',
opts:['2001:DB8::/32','2001:DB8:1::/48','2001:DB8:1:1::/64','2001:DB8:1:1::1/128'],
ans:2,
hint:'The prefix length /64 tells you exactly where the network portion ends.',
correct_fb:'With /64, the <strong>first 64 bits</strong> are the network prefix: <strong>2001:DB8:1:1::/64</strong>. The last 64 bits (::1 in this case) are the interface/host ID. In IPv6, /64 is the standard prefix for most subnets — it\'s required for SLAAC (which uses EUI-64 for the last 64 bits). The interface ID here is 0000:0000:0000:0001.',
wrong_fb:'For 2001:DB8:1:1::1/64: the <strong>/64 prefix</strong> = first 64 bits = <strong>2001:DB8:1:1::/64</strong>. The interface ID = last 64 bits = ::1 (expanded: 0000:0000:0000:0001). Standard IPv6 subnets use /64, which provides 2^64 interface IDs per subnet. SLAAC requires /64 because EUI-64 generates a 64-bit interface identifier.'
},
{topic:6,diff:'easy',type:'Multiple Choice',
q:'Which statement about IPv6 link-local addresses is TRUE?',
opts:['They are publicly routable on the internet','They must be manually configured by an administrator','They are automatically generated on every IPv6-enabled interface and are not routable beyond the local link','They replace global unicast addresses for all communication'],
ans:2,
hint:'Link-local = stays on the local link. Auto-generated. Every interface gets one.',
correct_fb:'Link-local addresses (FE80::/10) are <strong>automatically generated</strong> on every IPv6-enabled interface using the EUI-64 process (or random if privacy extensions enabled). They are <strong>NOT routable</strong> — they cannot leave the local link. Routers use them for neighbor discovery, routing protocol hellos (OSPF, EIGRP), and as next-hop addresses in routing tables.',
wrong_fb:'Link-local addresses (FE80::/10) are <strong>auto-generated</strong> on every IPv6 interface — no manual config needed. They are <strong>not routable</strong> (link-local = local link only). Key uses: Neighbor Discovery Protocol, routing protocol hello messages, next-hop addresses in routing tables. Every IPv6 interface always has at least one link-local address, even without a global unicast address.'
},
// ── TOPIC 7: Device Security — questions 23-55 ──
{topic:7,diff:'easy',type:'Multiple Choice',
q:'What command encrypts all plaintext passwords in the Cisco IOS running configuration?',
opts:['enable secret','password encryption all','service password-encryption','crypto password all'],
ans:2,
hint:'This is a global configuration command that applies to all passwords not already encrypted.',
correct_fb:'"<strong>service password-encryption</strong>" applies Type 7 (weak, reversible) encryption to all plaintext passwords in the running config: line passwords, VTY passwords, username passwords (if not using "secret"). It\'s better than plaintext but NOT secure — Type 7 can be decrypted with free online tools. Always use "enable secret" and "username [name] secret" which use MD5 (Type 5) hashing.',
wrong_fb:'"<strong>service password-encryption</strong>" applies weak Type 7 encryption to all plaintext passwords. It\'s a minimum baseline but NOT truly secure — Type 7 is easily reversible. Better approach: use "enable secret" (Type 5 MD5) and "username [name] secret [password]" (also Type 5). "service password-encryption" only protects passwords already configured as plaintext — it doesn\'t upgrade "enable password" to the strength of "enable secret."'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What is the purpose of "ip ssh version 2" on a Cisco router?',
opts:['Enables SSHv2 only, disabling the weaker SSHv1','Enables both SSHv1 and SSHv2 simultaneously','Configures SSH for version 2 encryption algorithms only','Assigns SSH to VTY line 2'],
ans:0,
hint:'There are two versions of SSH — one has known vulnerabilities.',
correct_fb:'"<strong>ip ssh version 2</strong>" restricts SSH to version 2 only, disabling SSHv1. SSHv1 has known security vulnerabilities and should never be used. SSHv2 uses stronger encryption and improved authentication. Always include this command in SSH configuration. The full SSH hardening sequence: hostname, domain-name, crypto key generate rsa modulus 2048, ip ssh version 2, username/secret, VTY transport input ssh.',
wrong_fb:'"<strong>ip ssh version 2</strong>" enforces SSHv2 only (SSHv1 disabled). SSHv1 has known cryptographic weaknesses. Always specify version 2. For stronger security, also use: "ip ssh version 2" + "crypto key generate rsa modulus 2048" (2048-bit keys). Cisco recommends 2048-bit minimum. The default RSA modulus (512 bits) is insufficient for modern security standards.'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'Port security "sticky" MAC addresses — what do they do?',
opts:['Permanently block all MAC addresses except those manually configured','Dynamically learn and save MAC addresses to the running config (and optionally startup config with copy run start)','Send an alert when a new MAC address connects','Create a VLAN for each unique MAC address'],
ans:1,
hint:'The word "sticky" implies the addresses attach to the port configuration dynamically.',
correct_fb:'"<strong>switchport port-security mac-address sticky</strong>" dynamically learns and <strong>saves MAC addresses to the running config</strong> as if manually configured. Once learned, they persist (unlike normal dynamic learning). To make them permanent, copy running-config to startup-config. This eliminates the need to manually type MAC addresses while still enforcing port security. Ideal for environments where device locations rarely change.',
wrong_fb:'"<strong>Sticky MAC</strong>" dynamically learns connected MAC addresses and <strong>adds them to the running config</strong> as static port-security entries. They survive reboots only if you "copy run start." Without sticky: dynamic MACs are learned but lost on reboot. With sticky: dynamic MACs become semi-permanent. Command: "switchport port-security mac-address sticky" — then verify with "show port-security interface [name]."'
},
{topic:7,diff:'hard',type:'Scenario',
q:`A switch port shows "err-disabled" in "show interfaces." Which sequence correctly recovers it?`,
opts:['shutdown → no shutdown (on the port) after fixing the root cause','no errdisable → no shutdown','errdisable recovery → reload','clear port-security → no shutdown'],
ans:0,
hint:'You must fix the cause first, then reset the port.',
correct_fb:'Recovery from err-disabled: (1) Fix the <strong>root cause</strong> (remove rogue device, fix BPDU Guard violation, etc.); (2) Enter interface: "interface Gi0/x"; (3) "<strong>shutdown</strong>"; (4) "<strong>no shutdown</strong>". This resets the port. Alternatively, configure "errdisable recovery cause [reason]" + "errdisable recovery interval [seconds]" to auto-recover. NEVER just "no shutdown" without fixing the root cause — the port will immediately err-disable again.',
wrong_fb:'Err-disabled recovery: fix root cause → "interface Gi0/x" → "<strong>shutdown</strong>" → "<strong>no shutdown</strong>". The shutdown/no shutdown resets the err-disabled state. Auto-recovery: "errdisable recovery cause bpduguard" + "errdisable recovery interval 300" (5 minutes). Without fixing the root cause first, the port will immediately err-disable again. "show errdisable recovery" shows configured auto-recovery settings.'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What is the difference between Syslog severity levels 0 and 7?',
opts:['0 is informational; 7 is emergencies','0 is emergencies (most critical); 7 is debugging (least critical, most verbose)','0 means disabled; 7 means maximum logging','0 is for warnings; 7 is for critical errors'],
ans:1,
hint:'Syslog levels run from most critical to least critical.',
correct_fb:'Syslog levels: <strong>0=Emergencies</strong> (system unusable), 1=Alerts, 2=Critical, 3=Errors, 4=Warnings, 5=Notifications, 6=Informational, <strong>7=Debugging</strong> (most verbose). Lower number = more severe. "logging trap [level]" sends that level and all levels with LOWER numbers to the syslog server. Example: "logging trap warnings" (4) sends levels 0-4 only. Debugging (7) generates huge log volumes.',
wrong_fb:'Syslog severity: <strong>0=Emergency</strong> (highest severity), 1=Alert, 2=Critical, 3=Error, 4=Warning, 5=Notice, 6=Informational, <strong>7=Debug</strong> (lowest severity, highest verbosity). Mnemonic: "Every Awful Crisis Emanates Warning Notifications In Detail." Lower number = more critical. Configure with "logging trap [level]" — sends specified level AND everything more severe (lower numbers).'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What is DHCP Snooping Binding Table and how does Dynamic ARP Inspection (DAI) use it?',
opts:['A table of blocked MAC addresses used to prevent DHCP access','A table mapping MAC addresses, IP addresses, VLANs, and ports built by DHCP Snooping — used by DAI to validate ARP messages','A routing table for DHCP server paths','A list of trusted DHCP servers and their locations'],
ans:1,
hint:'Two Layer 2 security features work together — one builds the database, the other uses it.',
correct_fb:'DHCP Snooping builds a <strong>binding table</strong>: {MAC address, IP address, VLAN, switch port}. When a client gets a DHCP-assigned IP, the binding is recorded. <strong>DAI (Dynamic ARP Inspection)</strong> uses this table to validate ARP packets: if an ARP says "IP 10.0.0.5 = MAC AA:BB:CC" but the binding table shows that IP belongs to a different MAC, DAI drops the ARP (ARP spoofing/MITM attack blocked).',
wrong_fb:'<strong>DHCP Snooping binding table</strong> = {MAC, IP, VLAN, port} entries created when clients receive DHCP addresses. <strong>DAI</strong> uses this table to validate ARP messages — if an ARP response claims an IP belongs to a MAC that doesn\'t match the binding table, DAI drops it (blocking ARP spoofing/Man-in-the-Middle attacks). These two features are always deployed together. Enable with: "ip dhcp snooping" + "ip arp inspection vlan [id]."'
},
{topic:7,diff:'easy',type:'Multiple Choice',
q:'What command shows the current MAC address table on a Cisco switch?',
opts:['show mac-address-table','show arp','show ip mac','show interfaces mac'],
ans:0,
hint:'You want to see which MAC addresses have been learned on which ports.',
correct_fb:'"<strong>show mac address-table</strong>" (with or without hyphen) displays: VLAN, MAC address, type (Dynamic/Static), and the port it was learned on. This is essential for troubleshooting Layer 2 connectivity — it tells you which physical port a device is connected to. Dynamic entries age out (default 300 seconds). "show mac address-table dynamic" filters to only learned entries.',
wrong_fb:'"<strong>show mac address-table</strong>" shows learned MAC addresses, their VLAN, type (dynamic/static), and port. "show arp" shows the router\'s ARP table (IP-to-MAC mappings) — that\'s Layer 3, not Layer 2. The MAC address table is the switch\'s forwarding database. Entries age out in 300 seconds by default. If a device\'s MAC isn\'t here, the switch floods traffic to find it.'
},
{topic:7,diff:'hard',type:'Multiple Choice',
q:'What is the "login block-for" command used for on Cisco devices?',
opts:['Blocks all logins permanently after a security breach','Implements login lockout — blocks login attempts for a specified time after a certain number of failures','Sets the session timeout for logged-in users','Blocks specific IP addresses from logging in'],
ans:1,
hint:'This is a brute-force attack mitigation feature.',
correct_fb:'"<strong>login block-for [seconds] attempts [n] within [seconds]</strong>" implements <strong>login rate limiting</strong>. Example: "login block-for 120 attempts 5 within 30" = if 5 failed logins occur within 30 seconds, block ALL logins for 120 seconds. This defeats brute-force attacks. Combine with "login quiet-mode access-class [ACL]" to allow admin access from trusted IPs even during lockout.',
wrong_fb:'"<strong>login block-for [time] attempts [n] within [window]</strong>" = login lockout after repeated failures. Example: "login block-for 120 attempts 3 within 60" locks all logins for 2 minutes after 3 failures in 60 seconds. This mitigates brute-force attacks. Also use "login delay [seconds]" to add delay between login attempts. Both are CCNA-tested security hardening commands.'
},
{topic:7,diff:'medium',type:'Multiple Choice',
q:'What does "no ip domain-lookup" do, and why is it configured in Cisco labs?',
opts:['Disables DNS resolution globally on the router','Prevents the router from sending DNS queries when mistyped commands are interpreted as hostnames — avoids long timeouts in lab environments','Disables DHCP on all interfaces','Removes the default gateway from the routing table'],
ans:1,
hint:'Without this, mistyping a command causes a frustrating multi-second hang.',
correct_fb:'"<strong>no ip domain-lookup</strong>" prevents the router from treating mistyped commands as hostnames to resolve via DNS. Without it: if you type "shwo" instead of "show," the router sends DNS queries and hangs for 30+ seconds waiting for a response. In production, keep DNS enabled with a valid server configured. In labs, disable it to avoid annoying pauses. Alternative: "ip domain-lookup" + "ip name-server [IP]" for production.',
wrong_fb:'"<strong>no ip domain-lookup</strong>" stops the IOS from attempting DNS resolution when it encounters unknown text (like a mistyped command). Without this: type "pong 8.8.8.8" instead of "ping" → router tries to DNS-resolve "pong" → 30-second hang. Very common lab configuration. In production environments, configure DNS properly instead: "ip domain-lookup" + "ip name-server 8.8.8.8."'
},
// ── TOPIC 3: VLANs — final questions ──
{topic:3,diff:'medium',type:'Multiple Choice',
q:'What is the range of valid VLAN IDs on a Cisco switch (standard range)?',
opts:['1–256','1–1005','1–4094','1–4096'],
ans:1,
hint:'There is a standard range and an extended range — what is the standard?',
correct_fb:'Standard VLAN range: <strong>1–1005</strong>. VLANs 1002–1005 are reserved for legacy protocols (FDDI, Token Ring) and cannot be modified. Extended VLAN range: 1006–4094 (requires VTP transparent mode or VTP v3). VLAN 1 = default, cannot be deleted. VLANs 1006–4094 are stored in the VLAN database only in extended mode.',
wrong_fb:'Standard VLAN range = <strong>1–1005</strong>. Extended range = 1006–4094 (requires VTP transparent or VTPv3). VLANs 1002–1005 are reserved for Token Ring/FDDI legacy protocols. VLAN 1 = default (cannot delete). VLANs 4095–4096 are reserved by IEEE 802.1Q and cannot be used. Total usable: 1 and 2–1001 (standard), plus 1006–4094 (extended).'
},
{topic:3,diff:'hard',type:'Multiple Choice',
q:'What command verifies that a specific VLAN exists in the switch\'s VLAN database?',
opts:['show vlan id 50','show vlan brief','show interfaces vlan 50','show vlan 50 detail'],
ans:1,
hint:'One command shows ALL VLANs and their ports in a compact format.',
correct_fb:'"<strong>show vlan brief</strong>" lists all VLANs in the database with their ID, name, status, and assigned access ports. To check a specific VLAN: "show vlan id 50." If the VLAN doesn\'t appear in "show vlan brief," it doesn\'t exist and traffic tagged for that VLAN will be dropped. VLANs must exist in the database AND be allowed on the trunk to pass traffic.',
wrong_fb:'"<strong>show vlan brief</strong>" shows all VLANs in the database. "show vlan id 50" shows details for just VLAN 50. If a VLAN isn\'t in "show vlan brief," it does not exist on the switch — trunk links will not carry non-existent VLANs even if they are in the allowed list. Create VLANs with "vlan 50" → "name SALES" in global config mode.'
},
{topic:3,diff:'easy',type:'Multiple Choice',
q:'What is the difference between an access port and a trunk port?',
opts:['Access ports carry multiple VLANs; trunk ports carry one VLAN','Access ports carry traffic for ONE VLAN only; trunk ports carry traffic for MULTIPLE VLANs with 802.1Q tagging','Access ports use 802.1Q tags; trunk ports do not','Access ports connect switches; trunk ports connect end devices'],
ans:1,
hint:'The name "trunk" implies it carries the load of many VLANs at once.',
correct_fb:'<strong>Access port</strong>: belongs to ONE VLAN, no tagging, connects end devices (PCs, servers, printers). <strong>Trunk port</strong>: carries MULTIPLE VLANs using 802.1Q tags (4-byte header inserted into frames identifying the VLAN ID), connects switches-to-switches or switches-to-routers. Native VLAN on a trunk is untagged — all other VLANs are tagged.',
wrong_fb:'<strong>Access port</strong> = one VLAN, no tags, for end devices. <strong>Trunk port</strong> = multiple VLANs, 802.1Q tagging, for switch-to-switch or switch-to-router links. 802.1Q adds a 4-byte tag containing the 12-bit VLAN ID (supporting up to 4094 VLANs). The native VLAN is the one exception — its traffic is sent untagged on a trunk. Native VLAN mismatch = a common exam trap.'
},
{topic:3,diff:'hard',type:'Multiple Choice',
q:'A PC in VLAN 10 needs to communicate with a server in VLAN 20 on the same switch. What is required?',
opts:['A crossover cable between the two VLANs','Layer 3 routing — either a router-on-a-stick, a Layer 3 switch with SVIs, or an external router','VLANs can communicate directly — just enable VLAN bridging','A trunk port between the two VLANs'],
ans:1,
hint:'VLANs are separate broadcast domains — you need Layer 3 to cross between them.',
correct_fb:'VLANs are separate Layer 2 broadcast domains. To communicate between them, <strong>Layer 3 routing is required</strong>. Options: (1) Router-on-a-stick (single router interface with subinterfaces + dot1q encapsulation); (2) Layer 3 switch with SVIs (interface vlan 10 + interface vlan 20) and "ip routing" enabled; (3) External router with separate physical interfaces. No Layer 2 method exists.',
wrong_fb:'Inter-VLAN communication requires <strong>Layer 3 routing</strong>. VLANs are separate broadcast domains — a frame from VLAN 10 cannot reach VLAN 20 without a router or Layer 3 switch. Methods: (1) Router-on-a-stick (router subinterfaces); (2) Layer 3 switch SVIs + "ip routing"; (3) Physical router. Trunk ports carry multiple VLANs but do not route between them.'
},
{topic:3,diff:'medium',type:'Scenario',
q:'A port is configured as "switchport mode trunk" but the neighbor switch port is "switchport mode access." What happens to the link?',
opts:['The trunk side overrides and a trunk forms','The link stays up but only VLAN 1 (native) traffic passes — no trunking occurs','The link is physically disabled','DTP negotiates a compromise and a partial trunk forms'],
ans:1,
hint:'What does an access port do with tagged (802.1Q) frames it receives?',
correct_fb:'The access port will <strong>drop tagged frames</strong> because it expects untagged traffic only. The trunk port sends tagged frames; the access port discards them. Result: only <strong>native VLAN (untagged) traffic may pass</strong>, and even that may behave unexpectedly. This is a classic misconfiguration. Both sides must be configured as trunk for proper trunking. Check with "show interfaces trunk."',
wrong_fb:'An access port discards <strong>802.1Q tagged frames</strong>. The trunk sends tagged frames that the access port drops. Only untagged (native VLAN) traffic might pass — making the link effectively broken for all VLAN traffic. This is a common misconfiguration. Fix: set both sides to "switchport mode trunk" or set both to access on the same VLAN. Verify with "show interfaces trunk."'
},
{topic:3,diff:'easy',type:'Multiple Choice',
q:'What is the native VLAN on a trunk link?',
opts:['The highest numbered VLAN allowed on the trunk','The VLAN whose traffic is sent untagged on the trunk link (default VLAN 1)','The VLAN used for routing between switches','The management VLAN for switch administration'],
ans:1,
hint:'One VLAN on a trunk gets special treatment — its frames have no 802.1Q tag.',
correct_fb:'The <strong>native VLAN</strong> is the VLAN whose traffic is sent <strong>untagged</strong> across a trunk link. Default is VLAN 1. All other VLANs are tagged with 802.1Q headers. Native VLAN must match on BOTH ends of a trunk or a mismatch occurs. Change with "switchport trunk native vlan [id]." Best practice: change native VLAN from 1 to an unused VLAN for security.',
wrong_fb:'<strong>Native VLAN</strong> = traffic sent <strong>untagged</strong> on a trunk (default VLAN 1). All other VLANs are 802.1Q tagged. If both ends of a trunk have different native VLANs, STP generates a topology change notification and CDP generates a native VLAN mismatch warning. Configure with "switchport trunk native vlan [n]." Security best practice: use an unused VLAN (e.g., VLAN 999) as native.'
},
{topic:3,diff:'medium',type:'Multiple Choice',
q:'Which Cisco feature prevents VLAN hopping attacks via double-tagging?',
opts:['Setting native VLAN to an unused VLAN and removing it from all trunks','Enabling VTP on all switches','Using only access ports on the network','Disabling 802.1Q on all ports'],
ans:0,
hint:'VLAN hopping via double-tagging exploits the native VLAN behavior.',
correct_fb:'<strong>Preventing double-tag VLAN hopping</strong>: change the native VLAN to an <strong>unused VLAN</strong> (not used for any user traffic) and ensure it\'s consistent on both trunk ends. Also: "switchport trunk allowed vlan remove [native vlan id]" to explicitly remove it from the allowed list. Double-tagging works by exploiting the untagged native VLAN — if the native VLAN is unused, attacker frames are dropped.',
wrong_fb:'Double-tag VLAN hopping exploits the native VLAN (untagged traffic). Mitigation: (1) <strong>Change native VLAN</strong> to an unused VLAN (e.g., "switchport trunk native vlan 999" where 999 has no hosts); (2) Remove it from the trunk allowed list; (3) Use "switchport nonegotiate" to disable DTP. If the native VLAN is unused, double-tagged attack frames get placed into an empty VLAN and dropped.'
},
{topic:3,diff:'hard',type:'Multiple Choice',
q:'What is the purpose of "spanning-tree portfast trunk" on a switch port?',
opts:['Enables PortFast on trunk ports connecting to servers or hypervisors that need rapid connectivity','Converts a trunk port into an access port with PortFast','Speeds up BPDU transmission on trunk ports','Forces all VLANs to immediately forward on the trunk'],
ans:0,
hint:'Some servers have multiple VMs on different VLANs and need fast convergence too.',
correct_fb:'"<strong>spanning-tree portfast trunk</strong>" enables PortFast behavior on a <strong>trunk port</strong>. Normally PortFast is only for access ports. However, servers running hypervisors (VMware, Hyper-V) or storage arrays may connect via trunk ports (multiple VLANs) and still need immediate port forwarding — they are trusted endpoints, not switches. Use carefully — never on switch-to-switch links.',
wrong_fb:'"<strong>spanning-tree portfast trunk</strong>" applies PortFast to a trunk port — bypassing Listening/Learning for immediate forwarding. Typically used for hypervisor hosts, virtualization servers, or NAS devices that trunk multiple VLANs but are trusted endpoints (not switches). BPDU Guard should still be configured for protection. Never use on actual switch-to-switch trunk links.'
},
{topic:3,diff:'medium',type:'Multiple Choice',
q:'What does "switchport port-security maximum 2" configure on an interface?',
opts:['Limits the port to a maximum bandwidth of 2 Mbps','Allows a maximum of 2 MAC addresses to be learned on the port','Creates 2 VLAN segments on the port','Sets the maximum number of STP BPDUs per second to 2'],
ans:1,
hint:'Port security restricts how many devices can connect to a single switch port.',
correct_fb:'"<strong>switchport port-security maximum 2</strong>" allows up to <strong>2 unique MAC addresses</strong> to be learned on the port. Common use: a PC with a VoIP phone connected in-line (PC behind phone) — each has its own MAC, so maximum 2 is needed. Default maximum is 1. If a 3rd MAC tries to connect, the configured violation action triggers (shutdown/restrict/protect).',
wrong_fb:'"<strong>switchport port-security maximum 2</strong>" = allow max <strong>2 MAC addresses</strong> on the port. Default is 1. Common scenario: IP phone + PC (phone connected to switch, PC connected to phone\'s pass-through port) — needs max 2. If a third device connects, violation action fires. Configure with: switchport mode access → switchport port-security → switchport port-security maximum 2 → switchport port-security violation [action].'
},
{topic:3,diff:'easy',type:'Multiple Choice',
q:'How do you create VLAN 100 and name it "SALES" on a Cisco switch?',
opts:['interface vlan 100, name SALES','vlan 100, name SALES (in global config mode)','switchport vlan 100 name SALES','vlan add 100 SALES'],
ans:1,
hint:'VLAN creation is done in global configuration mode, not interface mode.',
correct_fb:'In global config mode: "<strong>vlan 100</strong>" → enter VLAN config mode → "<strong>name SALES</strong>". The VLAN is created and named. Alternatively, "vlan 100" alone creates the VLAN with default name "VLAN0100." VLANs can also be implicitly created by assigning a port: "switchport access vlan 100" — if VLAN 100 doesn\'t exist, some IOS versions create it automatically.',
wrong_fb:'VLAN creation: global config → "<strong>vlan 100</strong>" → "<strong>name SALES</strong>". "interface vlan 100" creates an SVI (Layer 3 interface), not just the VLAN. "switchport access vlan 100" assigns a port to VLAN 100 (and may create it if it doesn\'t exist on some IOS versions). Always explicitly create and name VLANs for clarity in production networks.'
},
{topic:3,diff:'hard',type:'Multiple Choice',
q:'A switch is configured in VTP transparent mode. What happens when it receives a VTP update from a VTP server?',
opts:['It processes the update and updates its own VLAN database','It discards the update and does not forward it','It forwards the VTP update out its trunk ports but does NOT update its own VLAN database','It becomes a VTP server automatically'],
ans:2,
hint:'Transparent mode has two behaviors — one for its own database, one for forwarding.',
correct_fb:'VTP Transparent mode: the switch <strong>forwards VTP updates out trunk ports</strong> (acts as a pass-through) but does <strong>NOT update its own VLAN database</strong>. It manages its own local VLAN database independently. This is why Transparent mode is often preferred — you get VTP propagation without the risk of a rogue server wiping your VLAN config. VTPv3 also supports this and adds enhanced security.',
wrong_fb:'VTP <strong>Transparent</strong> mode: <strong>forwards VTP messages</strong> (so downstream switches get updates) but <strong>ignores them locally</strong> (local VLAN database is managed independently). This gives you the best of both worlds: VTP propagation continues, but this switch won\'t accidentally wipe its VLANs from a rogue VTP server. VTP Server mode updates its own database; Client mode receives and applies updates.'
},
// ── TOPIC 4: ACLs — final questions ──
{topic:4,diff:'medium',type:'Multiple Choice',
q:'Which ACL type can filter traffic based on TCP port numbers?',
opts:['Standard ACL (1-99)','Extended ACL (100-199)','Named Standard ACL only','Both standard and extended ACLs'],
ans:1,
hint:'Only one type has the granularity to specify both protocol and port.',
correct_fb:'<strong>Extended ACLs (100-199 or named extended)</strong> can filter on: source IP, destination IP, protocol (TCP, UDP, ICMP, IP), and <strong>port numbers</strong> (eq 80 for HTTP, eq 443 for HTTPS, eq 23 for Telnet, etc.). Standard ACLs (1-99) can ONLY filter on source IP address — no destination, no protocol, no port. For any port-based filtering, always use Extended ACLs.',
wrong_fb:'<strong>Extended ACLs</strong> filter on source IP + destination IP + protocol + <strong>port number</strong>. Standard ACLs = source IP only. Port-based filtering examples: "deny tcp any host 10.0.0.1 eq 23" (block Telnet), "permit tcp any any eq 443" (allow HTTPS). Remember: Standard = close to destination; Extended = close to source.'
},
{topic:4,diff:'medium',type:'Multiple Choice',
q:'What does "permit tcp any any established" in an ACL accomplish?',
opts:['Permits all TCP traffic from any source to any destination','Permits only TCP return traffic for connections already established from the inside network','Establishes a permanent TCP connection','Permits TCP traffic only if both endpoints are known'],
ans:1,
hint:'The "established" keyword checks for a specific TCP flag — which one?',
correct_fb:'"<strong>established</strong>" matches TCP packets with the ACK or RST bit set — indicating they are <strong>return traffic for an existing outbound connection</strong>. This is a stateless way to allow return traffic: outbound traffic goes out freely, but inbound TCP is only permitted if it\'s a response (has ACK set). Not as secure as stateful inspection (which tracks full sessions) but better than permitting all inbound TCP.',
