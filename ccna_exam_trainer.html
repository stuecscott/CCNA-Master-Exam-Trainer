<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA Master Exam Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --panel: #0d1520;
  --card: #111d2e;
  --border: #1a2d45;
  --accent: #00c8ff;
  --accent2: #00ff9d;
  --warn: #ffaa00;
  --danger: #ff4466;
  --text: #ccdde8;
  --dim: #4a6070;
  --correct: #00ff9d;
  --wrong: #ff4466;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0a1628 0%, #0d1f35 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.logo { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 700; letter-spacing: 0.1em; color: var(--accent); }
.logo span { color: var(--accent2); }
.score-bar { display: flex; gap: 20px; align-items: center; }
.score-item { text-align: center; }
.score-item .num { font-family: 'Share Tech Mono', monospace; font-size: 1.3rem; font-weight: 700; }
.score-item .lbl { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
.num.green { color: var(--correct); }
.num.red { color: var(--wrong); }
.num.blue { color: var(--accent); }

/* ── MAIN LAYOUT ── */
.main { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 65px); }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  overflow-y: auto;
}
.sidebar h3 { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; }
.topic-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 9px 12px; margin-bottom: 4px;
  background: transparent; border: 1px solid transparent;
  border-radius: 6px; cursor: pointer; text-align: left;
  font-family: 'Inter', sans-serif; font-size: 0.78rem; color: var(--text);
  transition: all 0.15s;
}
.topic-btn:hover { background: rgba(0,200,255,0.06); border-color: var(--border); }
.topic-btn.active { background: rgba(0,200,255,0.1); border-color: var(--accent); color: var(--accent); }
.topic-btn .t-num { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--dim); min-width: 20px; }
.topic-btn .t-icon { font-size: 1rem; }
.topic-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); margin-left: auto; flex-shrink: 0; }
.topic-dot.done { background: var(--correct); }
.topic-dot.partial { background: var(--warn); }

.sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

.mode-btn {
  display: block; width: 100%; padding: 8px 12px; margin-bottom: 6px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; text-align: left;
  font-family: 'Inter', sans-serif; font-size: 0.78rem; color: var(--dim);
  transition: all 0.15s;
}
.mode-btn:hover { color: var(--text); border-color: var(--accent); }
.mode-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,200,255,0.07); }

/* ── CONTENT ── */
.content { padding: 28px; max-width: 860px; }

/* ── QUESTION CARD ── */
.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 28px;
  margin-bottom: 20px;
  position: relative;
}
.q-meta {
  display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap;
}
.badge {
  font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 4px; font-weight: 600;
}
.badge-topic { background: rgba(0,200,255,0.12); color: var(--accent); }
.badge-diff-easy { background: rgba(0,255,157,0.12); color: var(--correct); }
.badge-diff-medium { background: rgba(255,170,0,0.12); color: var(--warn); }
.badge-diff-hard { background: rgba(255,68,102,0.12); color: var(--danger); }
.badge-type { background: rgba(255,255,255,0.06); color: var(--dim); }
.q-num { font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: var(--dim); margin-left: auto; }

.q-text {
  font-size: 1rem; line-height: 1.7; color: var(--text);
  margin-bottom: 22px; font-weight: 400;
}
.q-code {
  background: #060a10; border: 1px solid var(--border); border-radius: 6px;
  padding: 14px 18px; margin: 14px 0;
  font-family: 'Share Tech Mono', monospace; font-size: 0.82rem;
  color: #88ccee; line-height: 1.7; white-space: pre-wrap;
}

/* ── ANSWER OPTIONS ── */
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 18px; border-radius: 8px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.02);
  cursor: pointer; transition: all 0.15s;
  font-size: 0.9rem; line-height: 1.5;
}
.option:hover:not(.disabled) { border-color: var(--accent); background: rgba(0,200,255,0.05); }
.option.disabled { cursor: default; }
.option.selected { border-color: var(--accent); background: rgba(0,200,255,0.08); }
.option.correct { border-color: var(--correct); background: rgba(0,255,157,0.08); }
.option.wrong { border-color: var(--wrong); background: rgba(255,68,102,0.08); }
.option.reveal-correct { border-color: var(--correct); background: rgba(0,255,157,0.05); }
.opt-letter {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; font-weight: 700;
  border: 1px solid var(--border); color: var(--dim);
  transition: all 0.15s;
}
.option.correct .opt-letter { background: var(--correct); color: #000; border-color: var(--correct); }
.option.wrong .opt-letter { background: var(--wrong); color: #fff; border-color: var(--wrong); }
.option.reveal-correct .opt-letter { background: rgba(0,255,157,0.2); color: var(--correct); border-color: var(--correct); }
.option.selected:not(.correct):not(.wrong) .opt-letter { background: var(--accent); color: #000; border-color: var(--accent); }

/* ── FEEDBACK ── */
.feedback {
  margin-top: 20px; padding: 18px 20px;
  border-radius: 8px; line-height: 1.7; font-size: 0.88rem;
  display: none;
}
.feedback.show { display: block; }
.feedback.correct-fb { border: 1px solid var(--correct); background: rgba(0,255,157,0.06); }
.feedback.wrong-fb { border: 1px solid var(--wrong); background: rgba(255,68,102,0.06); }
.feedback-title {
  font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px;
}
.feedback.correct-fb .feedback-title { color: var(--correct); }
.feedback.wrong-fb .feedback-title { color: var(--wrong); }
.feedback strong { color: var(--accent); }

/* ── SUBNET CALCULATOR ── */
.subnet-calc {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px; margin-bottom: 20px;
}
.subnet-calc h4 {
  font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 14px;
}
.calc-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
.calc-row input {
  width: 58px; padding: 7px; background: #060a10; border: 1px solid var(--border);
  color: var(--accent2); font-family: 'Share Tech Mono', monospace; font-size: 0.95rem;
  border-radius: 4px; text-align: center; outline: none; transition: border-color 0.2s;
}
.calc-row input:focus { border-color: var(--accent); }
.calc-sep { color: var(--dim); font-family: 'Share Tech Mono', monospace; }
.cidr-inp { width: 58px; padding: 7px; background: #060a10; border: 1px solid var(--border); color: var(--warn); font-family: 'Share Tech Mono', monospace; font-size: 0.95rem; border-radius: 4px; text-align: center; outline: none; }
.calc-btn2 { padding: 7px 16px; background: var(--accent); color: #000; border: none; border-radius: 4px; font-weight: 700; font-size: 0.8rem; cursor: pointer; font-family: 'Rajdhani', sans-serif; letter-spacing: 0.05em; }
.calc-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
.calc-res-item { background: #060a10; border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; }
.calc-res-item .rl { font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); margin-bottom: 3px; }
.calc-res-item .rv { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: var(--text); }

/* ── CONTROLS ── */
.controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
.btn-next {
  padding: 10px 28px; background: var(--accent); color: #000;
  border: none; border-radius: 6px; font-family: 'Rajdhani', sans-serif;
  font-size: 0.95rem; font-weight: 700; letter-spacing: 0.08em; cursor: pointer;
  text-transform: uppercase; transition: opacity 0.15s, transform 0.1s;
}
.btn-next:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
.btn-skip {
  padding: 10px 20px; background: transparent; color: var(--dim);
  border: 1px solid var(--border); border-radius: 6px;
  font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; letter-spacing: 0.06em;
  cursor: pointer; transition: all 0.15s;
}
.btn-skip:hover { color: var(--text); border-color: var(--dim); }
.btn-hint {
  padding: 10px 18px; background: transparent; color: var(--warn);
  border: 1px solid rgba(255,170,0,0.3); border-radius: 6px;
  font-family: 'Rajdhani', sans-serif; font-size: 0.9rem;
  cursor: pointer; transition: all 0.15s;
}
.btn-hint:hover { background: rgba(255,170,0,0.07); }

/* ── PROGRESS ── */
.progress-wrap { margin-bottom: 22px; }
.progress-bar-bg { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; }
.progress-bar-fill { height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; }
.progress-labels { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--dim); margin-top: 5px; }

/* ── LOADING ── */
.loading-state { text-align: center; padding: 60px 20px; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: var(--dim); }

/* ── RESULTS SCREEN ── */
.results-screen { text-align: center; padding: 40px 20px; }
.results-screen h2 { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.grade-circle {
  width: 120px; height: 120px; border-radius: 50%;
  border: 4px solid var(--accent2); display: flex; align-items: center; justify-content: center;
  margin: 24px auto; flex-direction: column;
}
.grade-pct { font-family: 'Share Tech Mono', monospace; font-size: 1.8rem; color: var(--accent2); }
.grade-lbl { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; }
.results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 24px 0; max-width: 500px; margin-left: auto; margin-right: auto; }
.result-stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.result-stat .rs-num { font-family: 'Share Tech Mono', monospace; font-size: 1.4rem; }
.result-stat .rs-lbl { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }
.btn-restart { padding: 12px 32px; background: var(--accent2); color: #000; border: none; border-radius: 6px; font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; cursor: pointer; margin-top: 10px; }

/* ── HINT BOX ── */
.hint-box { background: rgba(255,170,0,0.06); border: 1px solid rgba(255,170,0,0.25); border-radius: 8px; padding: 14px 18px; margin-top: 14px; font-size: 0.85rem; color: #ffcc55; line-height: 1.6; display: none; }
.hint-box.show { display: block; }

/* ── HOME SCREEN ── */
.home-screen { padding: 40px 28px; max-width: 860px; }
.home-screen h1 { font-family: 'Rajdhani', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
.home-screen p { color: var(--dim); font-size: 0.9rem; margin-bottom: 30px; line-height: 1.7; }
.topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; margin-bottom: 30px; }
.topic-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 20px; cursor: pointer; transition: all 0.15s;
}
.topic-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.topic-card .tc-icon { font-size: 1.6rem; margin-bottom: 10px; }
.topic-card .tc-title { font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.topic-card .tc-desc { font-size: 0.75rem; color: var(--dim); line-height: 1.5; }
.start-btn {
  padding: 13px 40px; background: var(--accent); color: #000;
  border: none; border-radius: 8px; font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em; cursor: pointer;
  text-transform: uppercase; transition: all 0.15s;
}
.start-btn:hover { opacity: 0.85; transform: translateY(-2px); }
.mode-select { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
.mode-option {
  padding: 10px 18px; background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
}
.mode-option:hover { border-color: var(--accent); }
.mode-option.selected { border-color: var(--accent); background: rgba(0,200,255,0.08); color: var(--accent); }

@media (max-width: 700px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .content, .home-screen { padding: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">CCNA <span>MASTER</span> TRAINER</div>
  <div class="score-bar">
    <div class="score-item"><div class="num green" id="h-correct">0</div><div class="lbl">Correct</div></div>
    <div class="score-item"><div class="num red" id="h-wrong">0</div><div class="lbl">Wrong</div></div>

    <div class="score-item"><div class="num" id="h-pct" style="color:var(--warn)">—</div><div class="lbl">Score %</div></div>

<div style="display:flex">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <h3>Topics</h3>
    <button class="topic-btn active" data-topic="all" onclick="setTopic('all',this)">
      <span class="t-icon">🎯</span> All Topics
    </button>
    <button class="topic-btn" data-topic="0" onclick="setTopic(0,this)">
      <span class="t-num">1</span> OSI Model
    </button>
    <button class="topic-btn" data-topic="1" onclick="setTopic(1,this)">
      <span class="t-num">2</span> Subnetting & VLSM
    </button>
    <button class="topic-btn" data-topic="2" onclick="setTopic(2,this)">
      <span class="t-num">3</span> Routing Protocols
    </button>
    <button class="topic-btn" data-topic="3" onclick="setTopic(3,this)">
      <span class="t-num">4</span> VLANs & Trunking
    </button>
    <button class="topic-btn" data-topic="4" onclick="setTopic(4,this)">
      <span class="t-num">5</span> Access Control Lists
    </button>
    <button class="topic-btn" data-topic="5" onclick="setTopic(5,this)">
      <span class="t-num">6</span> Spanning Tree
    </button>

    </button>

    </button>
    <hr class="sidebar-divider">
    <h3>Mode</h3>
    <button class="mode-btn active" id="mb-study" onclick="setMode('study')">📚 Study Mode</button>
    <button class="mode-btn" id="mb-exam" onclick="setMode('exam')">⏱ Exam Mode</button>
    <hr class="sidebar-divider">
    <h3>Tools</h3>
    <button class="mode-btn" onclick="toggleCalc()">🔢 Subnet Calculator</button>
    <button class="mode-btn" onclick="resetSession()">🔄 Reset Session</button>
  </div>

  <!-- MAIN CONTENT -->
  <div style="flex:1; overflow-y:auto">
    <div id="app-root"></div>

<script>
// ═══════════════════════════════════════════════════════
//  SUBNET CALCULATOR (same bulletproof math as tool)
// ═══════════════════════════════════════════════════════
function ipToInt(o){ return (o[0]*16777216)+(o[1]*65536)+(o[2]*256)+o[3]; }
function intToIp(n){ return [Math.floor(n/16777216)%256,Math.floor(n/65536)%256,Math.floor(n/256)%256,n%256].join('.'); }
function cidrToMask(c){ const n=4294967296-Math.pow(2,32-c); return [Math.floor(n/16777216)%256,Math.floor(n/65536)%256,Math.floor(n/256)%256,n%256]; }
function subnetInfo(ip, cidr){
  const ipInt=ipToInt(ip), block=Math.pow(2,32-cidr), net=ipInt-(ipInt%block), bc=net+block-1, mask=cidrToMask(cidr);
  return { mask:mask.join('.'), block, network:intToIp(net), first:intToIp(net+1), last:intToIp(bc-1), broadcast:intToIp(bc), hosts:block-2 };
}

// ═══════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════
let state = {
  screen: 'home', // home | question | results
  topic: 'all',
  mode: 'study',  // study | exam
  correct: 0, wrong: 0, total: 0,
  currentQ: null, answered: false,
  showCalc: false,
  history: [],
  questionNum: 0,
  sessionQuestions: [],
};

const TOPICS = [
  'OSI Model', 'Subnetting & VLSM', 'Routing Protocols',
  'VLANs & Trunking', 'Access Control Lists',
  'Spanning Tree Protocol', 'IPv6 Addressing', 'Device Security'
];

// ═══════════════════════════════════════════════════════
//  QUESTION BANK — 5+ per topic, randomized by AI call
// ═══════════════════════════════════════════════════════
const QUESTION_BANK = [
// ── TOPIC 0: OSI Model ──
{topic:0, diff:'easy', type:'Multiple Choice',
 q:'At which OSI layer does encryption and data formatting typically occur?',
 opts:['Layer 4 – Transport','Layer 5 – Session','Layer 6 – Presentation','Layer 7 – Application'],
 ans:2,
 hint:'Think about the layer that deals with data syntax and translation between systems.',
 correct_fb:'<strong>Layer 6 – Presentation</strong> is responsible for data translation, encryption, compression, and formatting. It acts as a translator between the application layer and the network, ensuring data is in a usable format.',
 wrong_fb:'The <strong>Presentation Layer (Layer 6)</strong> handles encryption and data formatting. Layer 4 (Transport) handles segmentation and flow control. Layer 5 (Session) manages connections between applications. Layer 7 (Application) provides network services to applications.'
},
{topic:0, diff:'easy', type:'Multiple Choice',
 q:'A hub operates at which layer of the OSI model?',
 opts:['Layer 1 – Physical','Layer 2 – Data Link','Layer 3 – Network','Layer 4 – Transport'],
 ans:0,
 hint:'Hubs simply repeat electrical signals without any intelligence.',
 correct_fb:'Correct! A <strong>hub operates at Layer 1 (Physical)</strong>. It has no intelligence — it simply repeats incoming electrical signals out all ports. This is why hubs cause collisions. Switches operate at Layer 2, and Routers at Layer 3.',
 wrong_fb:'A hub operates at <strong>Layer 1 (Physical)</strong>. Hubs are "dumb" devices that broadcast all signals to all ports without reading MAC or IP addresses. Switches use MAC addresses (Layer 2), and Routers use IP addresses (Layer 3).'
},
{topic:0, diff:'medium', type:'Multiple Choice',
 q:'A technician captures traffic and sees that data is being transmitted as "frames." At which OSI layer is this traffic operating?',
 opts:['Layer 1 – Physical','Layer 2 – Data Link','Layer 3 – Network','Layer 4 – Transport'],
 ans:1,
 hint:'The PDU name is the key — bits, frames, packets, segments are all layer-specific terms.',
 correct_fb:'<strong>Layer 2 – Data Link</strong> uses <strong>frames</strong> as its Protocol Data Unit (PDU). Each layer has a specific PDU: Layer 1 = Bits, Layer 2 = Frames, Layer 3 = Packets, Layer 4 = Segments. Knowing these is critical for CCNA troubleshooting.',
 wrong_fb:'The PDU at <strong>Layer 2 (Data Link)</strong> is a <strong>Frame</strong>. Remember: Layer 1 = Bits, Layer 2 = Frames, Layer 3 = Packets, Layer 4 = Segments. Frames contain MAC addresses and are used for local network communication within the same broadcast domain.'
},
{topic:0, diff:'medium', type:'Multiple Choice',
 q:'Which OSI layer is responsible for logical addressing and routing packets between different networks?',
 opts:['Layer 2 – Data Link','Layer 3 – Network','Layer 4 – Transport','Layer 5 – Session'],
 ans:1,
 hint:'This is the layer where IP addresses live and routers operate.',
 correct_fb:'<strong>Layer 3 – Network</strong> is responsible for logical IP addressing and routing. Routers operate at this layer, making decisions about the best path to forward packets between different networks. IP, OSPF, and EIGRP all operate at Layer 3.',
 wrong_fb:'<strong>Layer 3 (Network)</strong> handles logical addressing (IP) and routing. Layer 2 handles physical MAC addressing within a single network. Layer 4 handles end-to-end communication (TCP/UDP). Layer 5 manages sessions between applications.'
},
{topic:0, diff:'hard', type:'Scenario',

 wrong_fb:'<strong>Layer 4 (Transport)</strong> is responsible for end-to-end sequencing, error recovery, and flow control. VoIP typically uses UDP (a Layer 4 protocol) because it is faster than TCP. Choppy audio is a symptom of packet loss or out-of-order delivery — both Layer 4 issues to investigate first.'
},

{topic:1, diff:'medium', type:'Calculation',
 q:'Given the IP address 192.168.10.50/26, what is the broadcast address of this subnet?',
 opts:['192.168.10.63','192.168.10.127','192.168.10.255','192.168.10.64'],
 ans:0,
 hint:'A /26 uses a block size of 64. Find the network ID first, then add block-1.',
 correct_fb:'With /26: block size = 256−192 = <strong>64</strong>. The network IDs in the last octet are 0, 64, 128, 192. Host .50 falls in the 0–63 range. Network ID = 192.168.10.0, Broadcast = <strong>192.168.10.63</strong> (0 + 64 − 1). First host = .1, Last host = .62.',
 wrong_fb:'For /26: block size = <strong>64</strong> (256 − 192 = 64). Starting at 0: network=.0, broadcast=<strong>.63</strong>. Since .50 is between 0–63, the broadcast is <strong>192.168.10.63</strong>. Remember: Broadcast = Network ID + Block Size − 1 = 0 + 64 − 1 = 63.'
},
{topic:1, diff:'hard', type:'Calculation',

},
{topic:1, diff:'medium', type:'Multiple Choice',
 q:'A company needs a subnet that supports at least 30 hosts. Which subnet mask is the MOST efficient choice?',
 opts:['/26 (255.255.255.192)','/27 (255.255.255.224)','/28 (255.255.255.240)','/25 (255.255.255.128)'],
 ans:1,
 hint:'Calculate usable hosts for each: 2^n - 2. Find the smallest block that fits 30.',
 correct_fb:'<strong>/27</strong> gives a block of 32 and <strong>30 usable hosts</strong> (32−2=30) — a perfect fit. /26 gives 62 hosts (wasteful). /28 gives only 14 hosts (not enough). /25 gives 126 hosts (far too many). Always use the smallest block that meets requirements for efficient VLSM.',
 wrong_fb:'<strong>/27</strong> is correct. Block size = 32, usable hosts = 32−2 = <strong>30</strong>. /28 only provides 14 hosts (insufficient). /26 provides 62 hosts (wasteful — fails VLSM efficiency). The CCNA exam tests your ability to find the MOST EFFICIENT subnet, not just one that works.'
},
{topic:1, diff:'hard', type:'Scenario',
 q:'You are designing a VLSM scheme for a company. Three departments need: 500 hosts, 200 hosts, and 6 hosts. Starting from 10.0.0.0, which subnet should you allocate FIRST?',
 opts:['The 6-host subnet (/29)','The 200-host subnet (/24)','The 500-host subnet (/23)','Allocate all three from /24 blocks'],
 ans:2,
 hint:'VLSM rule: always assign the largest requirement first to avoid address fragmentation.',
 correct_fb:'<strong>Always start with the largest subnet first</strong> (500 hosts → /23 = 512 addresses). Then allocate for 200 hosts (/24 = 256 addresses, 254 usable). Finally, the 6-host subnet (/29 = 8 addresses, 6 usable). This prevents address space fragmentation and ensures efficient allocation.',
 wrong_fb:'VLSM best practice: <strong>always allocate largest to smallest</strong>. Starting with 500 hosts: need 512 addresses → <strong>/23</strong> (first). Then 200 hosts → /24. Then 6 hosts → /29. Starting small creates fragmented, unusable gaps in your address space — a guaranteed wrong answer on the CCNA exam.'
},
{topic:1, diff:'medium', type:'Calculation',

 opts:['6','8','14','30'],
 ans:0,
 hint:'Block size = 2^(32-29). Then subtract 2 for network and broadcast.',

 wrong_fb:'For /29: 2^(32−29) = 2^3 = 8 total. Minus 2 = <strong>6 usable hosts</strong>. Common subnet host counts to memorize: /30=2, /29=6, /28=14, /27=30, /26=62, /25=126. These appear constantly on the CCNA exam. Use the magic number method: 256 − mask_octet − 2.'
},
{topic:1, diff:'easy', type:'Multiple Choice',
 q:'What does VLSM stand for, and what is its primary advantage?',
 opts:['Variable Length Subnet Masking — allows different-sized subnets within the same network','Virtual LAN Subnet Masking — creates VLANs using masks','Variable Layer Security Masking — secures subnet boundaries','Virtual Length Subnet Mapping — maps subnets to VLANs'],

 wrong_fb:'<strong>VLSM = Variable Length Subnet Masking</strong>. Its key advantage is IP address efficiency — you can carve out exactly the right size subnet for each requirement rather than wasting addresses with uniform masks. This is a core CCNA subnetting skill tested on every exam.'
},
// ── TOPIC 2: Routing Protocols ──
{topic:2, diff:'medium', type:'Multiple Choice',
 q:'A router learns the same network via EIGRP and OSPF. Which route will it install in the routing table?',
 opts:['The OSPF route (AD 110)','The EIGRP route (AD 90)','Both routes are installed with equal preference','The static route takes precedence'],
 ans:1,
 hint:'Lower Administrative Distance = more trusted source.',
 correct_fb:'<strong>EIGRP wins</strong> because it has a lower Administrative Distance of <strong>90</strong> vs OSPF\'s 110. The router considers EIGRP a more trusted source. AD values to memorize: Connected=0, Static=1, EIGRP=90, OSPF=110, RIP=120. Lower AD = preferred.',
 wrong_fb:'<strong>EIGRP (AD 90)</strong> is preferred over OSPF (AD 110). Administrative Distance determines trustworthiness of a routing source — <strong>lower is better</strong>. Key ADs: Connected=0, Static=1, EIGRP=90, OSPF=110, RIP=120. When two protocols advertise the same network, lower AD wins.'
},
{topic:2, diff:'hard', type:'Scenario',
 q:`Review this output:\n\nRouter# show ip ospf neighbor\nNeighbor ID     State    Interface\n10.0.0.2        INIT     Gi0/0\n\nWhy is the OSPF neighbor stuck in INIT state?`,
 opts:['The neighbor has received Hellos from this router but this router has NOT received Hellos back','The OSPF process IDs are mismatched','The routers are in the same OSPF area but with different priorities','The neighbor relationship is fully established'],
 ans:0,
 hint:'INIT means one-way communication. The neighbor received your Hello, but you haven\'t received theirs yet.',
 correct_fb:'<strong>INIT state</strong> means one-way communication: the neighbor received your Hello packet (that\'s why it sees you), but this router has <strong>NOT received</strong> the neighbor\'s Hello back. Common causes: ACL blocking Hellos, mismatched hello/dead timers, or a network type mismatch. The relationship cannot progress past INIT without bidirectional Hellos.',
 wrong_fb:'OSPF INIT state means <strong>one-way communication only</strong>. The neighbor listed (10.0.0.2) has received your Hello packets, but this local router has not received any Hello from 10.0.0.2. Check for: ACLs blocking multicast 224.0.0.5, mismatched Hello/Dead timers, or interface network type mismatches.'
},
{topic:2, diff:'medium', type:'Multiple Choice',
 q:'What is the purpose of the "passive-interface" command in OSPF configuration?',
 opts:['Stops the interface from sending Hello packets but still advertises its network','Shuts down the interface physically','Prevents the network from being advertised in OSPF','Forces the interface into a passive forwarding state'],
 ans:0,
 hint:'Passive means no routing protocol conversation, but the network can still be known.',
 correct_fb:'<strong>passive-interface</strong> prevents OSPF from sending Hello packets out that interface, so no adjacency can form. However, the network on that interface <strong>is still advertised</strong> into OSPF. This is used for security (access ports, internet-facing links) and efficiency (prevents unnecessary OSPF traffic on LAN segments).',
 wrong_fb:'<strong>passive-interface</strong> suppresses Hello packets on an interface — no neighbors can form. But the connected network IS still injected into OSPF. This is a key distinction! The interface stays up and its network is advertised; it just won\'t form neighbor relationships. Very common CCNA exam topic.'
},
{topic:2, diff:'easy', type:'Multiple Choice',
 q:'Which command displays the routing table on a Cisco router?',

},
{topic:2, diff:'hard', type:'Multiple Choice',
 q:'OSPF calculates the cost of a route using which metric?',
 opts:['Hop count','Bandwidth only','Composite of bandwidth, delay, load, and reliability','Reference bandwidth divided by interface bandwidth'],
 ans:3,
 hint:'OSPF cost = 10^8 / interface bandwidth in bps. Lower cost = better path.',
 correct_fb:'OSPF uses <strong>Cost = Reference Bandwidth (10^8 bps) ÷ Interface Bandwidth</strong>. Default costs: 10Gbps=1, 1Gbps=1, 100Mbps=1, T1=64. Note that FastEthernet and Gigabit both default to cost 1, which is why Cisco recommends changing the reference bandwidth with "auto-cost reference-bandwidth". Lower cost = preferred path.',
 wrong_fb:'OSPF metric = <strong>Reference Bandwidth ÷ Interface Bandwidth</strong> (default ref = 100 Mbps = 10^8 bps). EIGRP uses a composite metric (bandwidth, delay, reliability, load). RIP uses hop count. OSPF\'s cost calculation favors <strong>higher bandwidth links</strong>. A 100Mbps link costs 1; a 10Mbps link costs 10.'
},
// ── TOPIC 3: VLANs & Trunking ──
{topic:3, diff:'easy', type:'Multiple Choice',
 q:'What is the purpose of a trunk link between two switches?',
 opts:['Carry traffic for a single VLAN only','Carry traffic for multiple VLANs simultaneously','Block all VLAN traffic for security','Connect switches to end devices'],
 ans:1,
 hint:'Trunk links use 802.1Q tagging to identify which VLAN each frame belongs to.',
 correct_fb:'A <strong>trunk link</strong> carries traffic for <strong>multiple VLANs</strong> simultaneously using 802.1Q tagging. Each frame is tagged with a VLAN ID (except native VLAN traffic). Trunks typically connect switches to switches, or switches to routers. Access ports, by contrast, carry traffic for only ONE VLAN.',
 wrong_fb:'<strong>Trunk links carry multiple VLANs</strong> using 802.1Q encapsulation. Each frame gets a 4-byte tag inserted identifying the VLAN. The native VLAN is the exception — its traffic is untagged. Access ports serve a single VLAN and are used for end devices. Remember: trunks = switch-to-switch or switch-to-router.'
},
{topic:3, diff:'hard', type:'Scenario',
 q:`A switch port connecting to a router is configured as:\n\ninterface GigabitEthernet0/1\n switchport mode dynamic auto\n\nThe router interface has no special trunking config. Will trunking form?`,
 opts:['Yes — dynamic auto always forms a trunk','No — dynamic auto requires the other side to actively negotiate','Yes — routers always enable trunking by default','No — trunking requires manual configuration on both sides'],
 ans:1,
 hint:'Dynamic auto is PASSIVE — it waits for the other side to initiate trunking.',
 correct_fb:'"<strong>dynamic auto</strong>" is passive — it will form a trunk ONLY if the other side is set to "dynamic desirable" or "trunk." A router interface by default is not DTP-aware and won\'t initiate trunking. Result: the link stays as an <strong>access port</strong>. For router-on-a-stick, you must use "switchport mode trunk" on the switch side.',
 wrong_fb:'"<strong>dynamic auto</strong>" passively waits — it won\'t form a trunk unless the neighbor actively initiates it (via "trunk" or "dynamic desirable"). A plain router interface won\'t negotiate DTP. So trunking will NOT form. <strong>Always use "switchport mode trunk"</strong> when connecting to a router for inter-VLAN routing.'
},
{topic:3, diff:'medium', type:'Multiple Choice',
 q:'What command would you use to verify which VLANs are allowed on a trunk link?',
 opts:['show vlan brief','show interfaces trunk','show vlan database','show ip interface brief'],
 ans:1,
 hint:'You need to see trunk-specific information, not just VLAN assignments.',
 correct_fb:'"<strong>show interfaces trunk</strong>" displays: trunk-capable ports, their encapsulation type (802.1Q), the native VLAN, and critically — the <strong>VLANs allowed and active in the management domain</strong>. This is the go-to command for trunk troubleshooting. "show vlan brief" shows access port VLAN assignments, not trunk details.',
 wrong_fb:'"<strong>show interfaces trunk</strong>" is correct. It shows: which ports are trunking, the encapsulation (dot1q), native VLAN, and allowed/active VLANs. "show vlan brief" shows VLAN assignments for access ports but does NOT show trunk-specific information. Always use "show interfaces trunk" for trunking troubleshooting.'
},
{topic:3, diff:'hard', type:'Multiple Choice',
 q:'What is the danger of a native VLAN mismatch on a trunk link?',
 opts:['The trunk link will shut down automatically','Control plane traffic may be sent to the wrong VLAN, causing connectivity issues or security vulnerabilities','VLANs will be automatically re-mapped to match','Only the native VLAN traffic is affected; other VLANs work normally'],
 ans:1,
 hint:'Native VLAN traffic is untagged — what happens when untagged frames arrive on a port expecting a different native VLAN?',
 correct_fb:'A <strong>native VLAN mismatch</strong> causes untagged frames from one switch to be placed into a DIFFERENT VLAN on the other switch. This can cause CDP, VTP, and STP BPDUs (sent untagged on the native VLAN) to be processed by the wrong VLAN. This is also a security risk (VLAN hopping). Cisco recommends changing the native VLAN to an unused VLAN.',
 wrong_fb:'<strong>Native VLAN mismatch</strong> is serious: untagged frames on one switch are assumed to belong to ITS native VLAN, but the other switch assigns untagged frames to a DIFFERENT VLAN. Control plane protocols (STP BPDUs, CDP) can malfunction or be misdirected. This is also a VLAN hopping attack vector. Always match native VLANs on both trunk ends.'
},
{topic:3, diff:'medium', type:'Scenario',
 q:`To enable inter-VLAN routing using router-on-a-stick for VLAN 20, which configuration is needed on the router subinterface?`,
 opts:['interface GigabitEthernet0/0.20\n encapsulation dot1q 20\n ip address 192.168.20.1 255.255.255.0','interface GigabitEthernet0/0\n vlan 20\n ip address 192.168.20.1 255.255.255.0','interface GigabitEthernet0/0.20\n switchport access vlan 20\n ip address 192.168.20.1 255.255.255.0','interface Vlan20\n ip address 192.168.20.1 255.255.255.0'],
 ans:0,
 hint:'Router-on-a-stick requires subinterfaces with dot1Q encapsulation specifying the VLAN ID.',
 correct_fb:'<strong>Correct!</strong> For router-on-a-stick VLAN 20: create subinterface (Gi0/0.20), set <strong>encapsulation dot1q 20</strong> (ties it to VLAN 20 tag), and assign an IP. The parent interface (Gi0/0) must have no IP address. The switch port connecting to the router must be set as a trunk to pass all VLANs.',
 wrong_fb:'Router-on-a-stick requires: (1) a <strong>subinterface</strong> (Gi0/0.20), (2) <strong>encapsulation dot1q [VLAN-ID]</strong>, and (3) an IP address. "switchport" commands are for switch ports, not router interfaces. Option D (interface Vlan20) is for Layer 3 switches, not routers. The correct answer is Option A.'
},
// ── TOPIC 4: ACLs ──
{topic:4, diff:'medium', type:'Multiple Choice',
 q:'Where should a Standard ACL be placed for BEST practice?',
 opts:['As close to the SOURCE as possible','As close to the DESTINATION as possible','On every router interface inbound','On the core switch only'],
 ans:1,
 hint:'Standard ACLs only filter by source IP — placing them near the source could block all traffic from that source going anywhere.',
 correct_fb:'<strong>Standard ACLs near the destination</strong>. Since Standard ACLs only match on SOURCE IP, placing them near the source could inadvertently block ALL traffic from that host/network to EVERY destination — not just the intended one. Near the destination gives you surgical control over exactly which traffic is blocked where.',
 wrong_fb:'Standard ACLs should be placed <strong>as close to the DESTINATION as possible</strong>. Extended ACLs go close to the source. This is because Standard ACLs can only match the source IP — if placed near the source, they would block traffic to ALL destinations from that source, not just the intended destination.'
},
{topic:4, diff:'easy', type:'Multiple Choice',
 q:'What is the "implicit deny" in an ACL?',
 opts:['An explicit deny any any statement you must add at the end','An invisible deny ip any any at the end of every ACL that blocks all unmatched traffic','A permit statement that allows management traffic','A Cisco-specific command that must be enabled'],
 ans:1,
 hint:'If traffic doesn\'t match any rule in an ACL, what happens to it by default?',
 correct_fb:'Every ACL has an <strong>invisible "deny ip any any"</strong> at the very end. If a packet doesn\'t match ANY explicit permit or deny rule, it is silently dropped by this implicit deny. This is why you MUST include a "permit" statement for any traffic you want to allow — otherwise everything gets blocked. Always verify with "show access-lists".',
 wrong_fb:'The <strong>implicit deny</strong> is an invisible <strong>"deny ip any any"</strong> at the end of every ACL. You cannot see it with "show access-lists" but it is always there. This means if you create an ACL and forget to add a permit statement, ALL traffic through that interface will be blocked. This is a very common exam trap!'
},
{topic:4, diff:'hard', type:'Scenario',
 q:`An Extended ACL should block HTTP traffic from 192.168.1.0/24 to server 10.0.0.5. Which ACL entry is CORRECT?`,
 opts:['access-list 110 deny tcp 192.168.1.0 0.0.0.255 host 10.0.0.5 eq 80','access-list 10 deny ip 192.168.1.0 255.255.255.0 host 10.0.0.5','access-list 110 deny ip host 192.168.1.0 10.0.0.5 0.0.0.0 eq 80','access-list 110 permit tcp 192.168.1.0 0.0.0.255 host 10.0.0.5 eq 80'],
 ans:0,
 hint:'Extended ACLs use numbers 100-199. HTTP = TCP port 80. Wildcards, not subnet masks.',
 correct_fb:'<strong>access-list 110</strong> (Extended, 100-199). "<strong>deny tcp</strong>" targets HTTP which runs on TCP. "<strong>192.168.1.0 0.0.0.255</strong>" is the source network with wildcard mask. "<strong>host 10.0.0.5</strong>" is the destination. "<strong>eq 80</strong>" specifies HTTP port. Remember: Extended ACLs = source IP, destination IP, protocol, port.',
 wrong_fb:'Option A is correct: <strong>access-list 110</strong> (Extended=100-199), <strong>deny tcp</strong> (HTTP runs on TCP), source <strong>192.168.1.0 0.0.0.255</strong> (wildcard, not subnet mask!), destination <strong>host 10.0.0.5</strong>, port <strong>eq 80</strong> (HTTP). Option B uses ACL 10 (Standard — can\'t filter by destination or port). Always use wildcards, not subnet masks in ACLs.'
},
{topic:4, diff:'medium', type:'Multiple Choice',
 q:'What is the difference between a Standard ACL and an Extended ACL?',
 opts:['Standard ACLs filter on source IP only; Extended ACLs filter on source/destination IP, protocol, and port','Standard ACLs are faster; Extended ACLs are slower','Standard ACLs use numbers 100-199; Extended ACLs use 1-99','Standard ACLs are inbound only; Extended ACLs can be applied inbound or outbound'],
 ans:0,
 hint:'The key difference is WHAT they can match — how granular is the filtering?',
 correct_fb:'<strong>Standard ACLs (1-99)</strong> match ONLY the source IP address — simple but less granular. <strong>Extended ACLs (100-199)</strong> match source IP, destination IP, protocol (TCP/UDP/ICMP), and port numbers — highly granular. Extended ACLs give you surgical control: "deny TCP from this host to that server on port 443 only."',
 wrong_fb:'Key difference: <strong>Standard ACLs</strong> match <strong>source IP only</strong> (numbered 1-99). <strong>Extended ACLs</strong> match source IP, destination IP, protocol, AND port numbers (numbered 100-199). Both can be applied inbound or outbound. Extended ACLs go near the source; Standard ACLs near the destination. The numbering is reversed from your answer — Standard=1-99, Extended=100-199.'
},
// ── TOPIC 5: Spanning Tree ──
{topic:5, diff:'medium', type:'Multiple Choice',
 q:'How is the Root Bridge elected in Spanning Tree Protocol?',
 opts:['The switch with the highest MAC address','The switch with the highest Bridge Priority','The switch with the lowest Bridge ID (Priority + MAC address)','The switch with the most ports'],
 ans:2,
 hint:'Lower is better in STP elections. The Bridge ID combines two values.',
 correct_fb:'The <strong>Root Bridge</strong> is the switch with the <strong>lowest Bridge ID</strong>. Bridge ID = Bridge Priority (default 32768, configurable in 4096 increments) + MAC address. If priorities are equal, the lowest MAC address breaks the tie. Use "spanning-tree vlan [id] root primary" to force a switch to become root.',
 wrong_fb:'Root Bridge = switch with <strong>lowest Bridge ID</strong>. Bridge ID = Priority (default 32768) + MAC address. Lower priority wins; ties broken by lower MAC address. <strong>Lower = better in STP</strong>. To manipulate which switch wins, lower its priority with "spanning-tree vlan 1 priority 4096" or use the shortcut "spanning-tree vlan 1 root primary."'
},
{topic:5, diff:'hard', type:'Scenario',
 q:'Switch A has priority 32768, MAC aa:bb:cc:00:00:01. Switch B has priority 32768, MAC aa:bb:cc:00:00:02. Switch C has priority 4096, MAC aa:bb:cc:00:00:03. Which switch becomes the Root Bridge?',
 opts:['Switch A — lowest MAC','Switch B — second lowest MAC','Switch C — lowest priority','Cannot be determined without knowing port costs'],
 ans:2,
 hint:'Check priorities first, then MAC addresses only if priorities are tied.',
 correct_fb:'<strong>Switch C wins</strong> with priority <strong>4096</strong> — far lower than 32768. Priority is checked FIRST before MAC addresses. Switch C\'s MAC is actually the highest, but that doesn\'t matter because its priority dominates. This is exactly why network admins manually set the priority on the most capable switch to control STP topology.',
 wrong_fb:'<strong>Switch C</strong> is the Root Bridge. Priority is compared first: Switch C has 4096, others have 32768. <strong>Lower priority wins immediately</strong> — MAC address comparison only happens when priorities are equal. This is a critical STP concept: always control your root bridge by setting priority, never rely on MAC address election.'
},
{topic:5, diff:'medium', type:'Multiple Choice',
 q:'What is the purpose of PortFast on a switch port?',
 opts:['Increases port speed to maximum','Skips the Listening and Learning states, bringing the port to Forwarding immediately','Prevents BPDUs from being sent out the port','Enables the port to carry multiple VLANs'],
 ans:1,
 hint:'PortFast is designed for end-device ports that should never need to wait 30+ seconds.',
 correct_fb:'<strong>PortFast</strong> bypasses the STP Listening (15s) and Learning (15s) states, bringing the port to <strong>Forwarding immediately</strong>. This prevents the 30-second delay end devices experience when connecting. PortFast should ONLY be used on access ports connected to end devices (PCs, servers, printers) — NEVER on ports connecting to other switches!',
 wrong_fb:'<strong>PortFast skips Listening and Learning states</strong> (saves ~30 seconds). Without PortFast, every new connection waits: Blocking → Listening (15s) → Learning (15s) → Forwarding. For PCs and servers, that 30s delay is painful. PortFast gets them connected immediately. Always pair PortFast with BPDU Guard to prevent switch loops.'
},
{topic:5, diff:'hard', type:'Multiple Choice',
 q:'What does BPDU Guard do, and why should it always be used with PortFast?',
 opts:['BPDU Guard increases BPDU transmission speed on PortFast ports','BPDU Guard places a port in err-disabled state if it receives a BPDU, preventing unauthorized switches from connecting','BPDU Guard disables BPDU processing globally on the switch','BPDU Guard enables faster STP convergence when BPDUs are received'],
 ans:1,
 hint:'What would happen if someone plugged a switch into a PortFast-enabled port?',
 correct_fb:'<strong>BPDU Guard</strong> places a port into <strong>err-disabled state</strong> the moment it receives a BPDU. If someone connects an unauthorized switch to a PortFast port, that switch will send BPDUs — BPDU Guard immediately shuts the port down, preventing a potential loop. To recover, an admin must manually run "no shutdown" after removing the rogue device.',
 wrong_fb:'<strong>BPDU Guard</strong> shuts down (err-disables) a port if any BPDU is received. PortFast ports are on access ports where NO switches should ever connect. If a switch is plugged in, it sends BPDUs. Without BPDU Guard, this could create a loop and take down the network. With BPDU Guard, the port is immediately disabled. These two features are always deployed together.'
},
// ── TOPIC 6: IPv6 ──
{topic:6, diff:'easy', type:'Multiple Choice',
 q:'Which prefix identifies a link-local IPv6 address?',
 opts:['FF00::/8','FC00::/7','FE80::/10','2000::/3'],
 ans:2,
 hint:'Link-local means used only on the local link — not routed. The prefix starts with FE8.',
 correct_fb:'<strong>FE80::/10</strong> identifies link-local addresses. They always begin with FE80 and are automatically generated on every IPv6-enabled interface. Link-local addresses are ONLY used for communication on the local link — they are NOT routable and never leave the local segment. Routers use them for neighbor discovery and routing protocol hellos.',
 wrong_fb:'<strong>FE80::/10</strong> = Link-local (local segment only). Memory aid: FF00::/8 = Multicast, FC00::/7 = Unique Local (like RFC 1918 private addresses), 2000::/3 = Global Unicast (publicly routable). Link-local addresses start with FE80 and are essential for IPv6 — every interface generates one automatically, even without DHCPv6 or manual configuration.'
},
{topic:6, diff:'medium', type:'Multiple Choice',
 q:'What are the TWO rules for compressing an IPv6 address?',
 opts:['Remove all zeros; use :: multiple times','Omit leading zeros per group; use :: ONCE for the longest run of all-zero groups','Omit trailing zeros per group; use :: for any zeros','Remove all colons and compress to 64 bits'],
 ans:1,
 hint:'IPv6 compression has exactly two rules, and :: can only appear once per address.',
 correct_fb:'Two rules: 1) <strong>Omit leading zeros</strong> within each 16-bit group (0DB8 → DB8, but 00B0 → B0). 2) Use <strong>::</strong> once to replace the longest consecutive run of all-zero groups. Example: 2001:0DB8:0000:0000:0000:0000:0001:0002 → <strong>2001:DB8::1:2</strong>. The :: can only appear ONCE — otherwise the address is ambiguous.',
 wrong_fb:'IPv6 compression rules: (1) <strong>Drop leading zeros</strong> in each group (0042 → 42). (2) Use <strong>::</strong> exactly <strong>once</strong> for the longest string of consecutive all-zero groups. You can only use :: once — using it twice makes the address unresolvable. A common exam trap is an address with two :: — that is always invalid.'
},
{topic:6, diff:'hard', type:'Multiple Choice',
 q:'A router interface has MAC address 00:1A:2B:3C:4D:5E. Using EUI-64, what is the interface ID portion of the link-local address?',
 opts:['021A:2BFF:FE3C:4D5E','001A:2B3C:4D5E:0000','FF1A:2BFF:FE3C:4D5E','021A:2B3C:FE4D:5E00'],
 ans:0,
 hint:'EUI-64: split MAC in half, insert FFFE, then flip the 7th bit of the first byte.',
 correct_fb:'EUI-64 process: (1) Split MAC: 00:1A:2B | 3C:4D:5E. (2) Insert FFFE: 00:1A:2B:<strong>FF:FE</strong>:3C:4D:5E. (3) Flip 7th bit of first byte: 00 = 0000 0000 → 0000 00<strong>1</strong>0 = 02. Result: <strong>02:1A:2B:FF:FE:3C:4D:5E</strong> → <strong>021A:2BFF:FE3C:4D5E</strong>. Full link-local: FE80::021A:2BFF:FE3C:4D5E.',
 wrong_fb:'EUI-64 steps: (1) Split MAC in half: 00:1A:2B | 3C:4D:5E. (2) Insert FFFE in the middle: 00:1A:2B:FF:FE:3C:4D:5E. (3) Flip bit 7 (Universal/Local bit) of the first byte: 00 (0000 0000) → 02 (0000 0010). Final interface ID: <strong>021A:2BFF:FE3C:4D5E</strong>. This is tested on virtually every CCNA exam.'
},
{topic:6, diff:'medium', type:'Multiple Choice',

{topic:7, diff:'medium', type:'Multiple Choice',

},
{topic:7, diff:'hard', type:'Scenario',
 q:`What is the correct sequence to configure SSH on a Cisco router?`,

{topic:7, diff:'medium', type:'Multiple Choice',
 q:'Port security is configured with "violation shutdown." What happens when a violation occurs?',

 correct_fb:'"<strong>violation shutdown</strong>" (default mode) places the port in <strong>err-disabled</strong> state immediately when a violation occurs. The port LED turns amber. An admin must manually recover with "shutdown" followed by "no shutdown." This is the most secure option. Compare: "restrict" drops frames + logs, "protect" silently drops frames. Shutdown = no traffic at all.',
 wrong_fb:'"<strong>violation shutdown</strong>" = port goes to <strong>err-disabled</strong> state. The three violation modes: <strong>Shutdown</strong> (default) = err-disable port, log it; <strong>Restrict</strong> = drop frames, log/increment counter, keep port up; <strong>Protect</strong> = silently drop frames, no log, keep port up. The CCNA exam loves testing these differences. Shutdown is most secure; Protect is least visible.'
},
{topic:7, diff:'easy', type:'Multiple Choice',
 q:'What is the purpose of DHCP Snooping?',
 opts:['Speeds up DHCP discovery by caching responses','Prevents rogue DHCP servers from handing out incorrect IP addresses to clients','Encrypts DHCP messages between server and client','Blocks all DHCP traffic on untrusted ports'],
 ans:1,
 hint:'Think about what would happen if an unauthorized DHCP server existed on your network.',
 correct_fb:'<strong>DHCP Snooping</strong> designates ports as trusted (connected to legitimate DHCP servers/uplinks) or untrusted (access ports facing clients). DHCP OFFER and ACK messages from <strong>untrusted ports are dropped</strong>, blocking rogue DHCP servers. It also builds a DHCP snooping binding table used by Dynamic ARP Inspection (DAI) for further protection.',
 wrong_fb:'<strong>DHCP Snooping</strong> prevents rogue DHCP servers. It classifies ports as trusted (uplinks to real DHCP servers) or untrusted (client-facing). Only trusted ports can send DHCP Offers/ACKs. A rogue DHCP server on an untrusted port will have its responses dropped. The binding table it creates is also used by Dynamic ARP Inspection — a key Layer 2 security combo.'
},

{topic:0,diff:'easy',type:'Multiple Choice',
q:'Which OSI layer is responsible for end-to-end communication, flow control, and error recovery between hosts?',
opts:['Layer 2 – Data Link','Layer 3 – Network','Layer 4 – Transport','Layer 5 – Session'],

correct_fb:'<strong>Layer 4 – Transport</strong> provides end-to-end communication between hosts. TCP at this layer provides reliable delivery with sequencing, acknowledgment, and retransmission. UDP provides best-effort delivery. Flow control (sliding window) and error recovery (retransmission) are key Layer 4 functions.',
wrong_fb:'<strong>Layer 4 (Transport)</strong> handles end-to-end reliability. TCP (connection-oriented) and UDP (connectionless) both live here. Layer 2 handles local frame delivery. Layer 3 handles logical addressing and routing. Layer 5 manages sessions between applications — but does not handle packet sequencing or flow control.'
},

correct_fb:'The PDU at <strong>Layer 3 (Network)</strong> is a <strong>Packet</strong>. Packets contain IP source and destination addresses and are routed between networks. Full PDU list: Layer 1=Bits, Layer 2=Frames, Layer 3=Packets, Layer 4=Segments, Layers 5-7=Data.',
wrong_fb:'<strong>Layer 3 = Packet</strong>. Complete PDU mapping: Layer 1 (Physical)=Bits, Layer 2 (Data Link)=Frames, Layer 3 (Network)=<strong>Packets</strong>, Layer 4 (Transport)=Segments, Layers 5-7 (Session/Presentation/Application)=Data. Knowing these PDU names cold is essential for the CCNA exam.'
},
{topic:0,diff:'easy',type:'Multiple Choice',
q:'Which device operates at BOTH Layer 1 and Layer 2 of the OSI model?',
opts:['Router','Hub','Switch','Repeater'],
ans:2,
hint:'This device reads MAC addresses (Layer 2) and also regenerates signals (Layer 1).',
correct_fb:'A <strong>Switch</strong> operates at Layer 2 (Data Link) — it reads MAC addresses to make forwarding decisions. But it also operates at Layer 1 (Physical) because it regenerates electrical signals on each port. Routers operate at Layer 3. Hubs and repeaters operate only at Layer 1.',
wrong_fb:'A <strong>Switch</strong> spans Layer 1 and Layer 2. At Layer 2, it reads MAC addresses in frames to forward traffic intelligently. At Layer 1, it regenerates signals. Hubs/repeaters are purely Layer 1. Routers are Layer 3. Layer 3 switches additionally operate at Layer 3 but a standard switch is Layer 1/2.'

{topic:0,diff:'easy',type:'Multiple Choice',
q:'The TCP/IP model\'s "Internet" layer maps to which OSI layer?',
opts:['Layer 2 – Data Link','Layer 3 – Network','Layer 4 – Transport','Layer 5 – Session'],

correct_fb:'The TCP/IP <strong>Internet layer</strong> maps directly to <strong>OSI Layer 3 (Network)</strong>. Both handle IP addressing and routing between networks. The TCP/IP model has 4 layers: Network Access (OSI 1-2), Internet (OSI 3), Transport (OSI 4), Application (OSI 5-7).',
wrong_fb:'TCP/IP Internet layer = <strong>OSI Layer 3 (Network)</strong>. The TCP/IP model is a simplified 4-layer model: Network Access maps to OSI Layers 1-2, Internet maps to OSI Layer 3, Transport maps to OSI Layer 4, Application maps to OSI Layers 5-7.'
},
{topic:0,diff:'medium',type:'Multiple Choice',
q:'Which protocol operates at Layer 4 and provides RELIABLE, connection-oriented communication?',
opts:['UDP','IP','TCP','ICMP'],
ans:2,
hint:'This protocol uses a three-way handshake to establish connections before data transfer.',
correct_fb:'<strong>TCP (Transmission Control Protocol)</strong> at Layer 4 provides reliable, connection-oriented communication. It uses a <strong>three-way handshake</strong> (SYN, SYN-ACK, ACK), sequence numbers, acknowledgments, and retransmission to guarantee delivery. UDP is also Layer 4 but is connectionless and unreliable.',
wrong_fb:'<strong>TCP</strong> is the reliable Layer 4 protocol. UDP is Layer 4 but unreliable (no handshake). IP is Layer 3 (logical addressing). ICMP is Layer 3 (used by ping/traceroute). TCP\'s reliability features — handshake, sequencing, ACKs, retransmission — make it ideal for applications like HTTP, FTP, and SSH where data integrity matters.'
},
{topic:0,diff:'medium',type:'Multiple Choice',
q:'A network engineer says data is being "encapsulated." What does encapsulation mean in the OSI model?',
opts:['Encrypting data before transmission','Adding header (and sometimes trailer) information at each OSI layer as data moves down the stack','Removing headers as data moves up the stack at the destination','Compressing data to reduce bandwidth usage'],
ans:1,
hint:'Think about what happens to a data package as it travels from the application to the physical layer.',
correct_fb:'<strong>Encapsulation</strong> is the process of <strong>adding headers (and sometimes trailers) at each layer</strong> as data moves DOWN the OSI stack from the sending device. At Layer 4, a TCP/UDP header is added (creating a segment). At Layer 3, an IP header is added (creating a packet). At Layer 2, a frame header and trailer are added. The reverse process at the destination is called de-encapsulation.',
wrong_fb:'<strong>Encapsulation = adding headers as data moves down the OSI stack</strong>. The reverse — removing headers at the destination as data moves up the stack — is called de-encapsulation. Encryption happens at Layer 6 (Presentation) and is separate from encapsulation. Compression is also a Layer 6 function.'
},
{topic:0,diff:'medium',type:'Multiple Choice',
q:'What does ARP (Address Resolution Protocol) do, and at which OSI layer does it operate?',
opts:['Resolves IP addresses to MAC addresses; operates at Layer 2/3 boundary','Resolves domain names to IP addresses; operates at Layer 7','Assigns IP addresses dynamically; operates at Layer 3','Resolves MAC addresses to IP addresses; operates at Layer 2'],
ans:0,
hint:'ARP bridges the gap between logical (IP) and physical (MAC) addressing.',
correct_fb:'<strong>ARP resolves IP addresses to MAC addresses</strong>. When a host knows the destination IP but needs the MAC address to build a frame, it broadcasts an ARP request. ARP operates at the <strong>Layer 2/3 boundary</strong> — it uses IP addresses (Layer 3) to discover MAC addresses (Layer 2). DNS resolves names to IPs. DHCP assigns IPs.',
wrong_fb:'<strong>ARP maps IP → MAC address</strong>. It broadcasts "Who has IP x.x.x.x? Tell me your MAC." The owner responds with its MAC. ARP bridges Layer 3 (IP) and Layer 2 (MAC). DNS (Layer 7) resolves hostnames to IPs. DHCP (Layer 7) dynamically assigns IP addresses. RARP does the reverse of ARP (MAC → IP, now obsolete).'
},
{topic:0,diff:'medium',type:'Multiple Choice',
q:'Which OSI layer is responsible for establishing, managing, and terminating sessions between applications?',
opts:['Layer 4 – Transport','Layer 5 – Session','Layer 6 – Presentation','Layer 7 – Application'],
ans:1,
hint:'Think NetBIOS, RPC, SQL sessions — these are managed above the transport layer.',
correct_fb:'<strong>Layer 5 – Session</strong> establishes, maintains, and terminates communication sessions between applications. Examples include NetBIOS, RPC (Remote Procedure Call), and SQL sessions. It also handles session checkpointing and recovery. This layer is often confused with Layer 4, but Layer 4 handles transport — Layer 5 manages the dialogue between applications.',
wrong_fb:'<strong>Layer 5 (Session)</strong> manages application sessions. Layer 4 (Transport) handles end-to-end reliability and flow control between hosts. Layer 6 (Presentation) handles encryption and data formatting. Layer 7 (Application) provides network services to end-user applications. Session layer examples: NetBIOS, RPC, NFS.'
},
{topic:0,diff:'medium',type:'Scenario',

opts:['Layer 1 – Physical','Layer 3 – Network','Layer 4 – Transport','Layer 7 – Application'],

hint:'If IP works but name resolution does not, think about which layer handles naming services.',
correct_fb:'This is a <strong>Layer 7 (Application)</strong> problem — specifically DNS (Domain Name System). The fact that the IP ping works confirms Layers 1–4 are functioning correctly. DNS runs at Layer 7 and resolves hostnames to IP addresses. Check DNS server configuration, DNS record existence, or DNS reachability.',
wrong_fb:'<strong>Layer 7 (Application)</strong> — DNS is an application-layer protocol. Since ping by IP works, the network path (Layers 1-4) is fine. The failure is in name resolution. DNS operates at Layer 7. Other Layer 7 protocols: HTTP, HTTPS, FTP, SMTP, SNMP, DHCP. Always use the OSI model to isolate which layer has failed before troubleshooting.'

{topic:0,diff:'medium',type:'Multiple Choice',

},
{topic:0,diff:'hard',type:'Scenario',
q:'A technician runs Wireshark and sees TCP SYN packets leaving a host but no SYN-ACK packets returning. Connectivity to other destinations works fine. Which OSI layer analysis should be performed NEXT?',
opts:['Layer 1 — check physical cables','Layer 2 — check MAC address table','Layer 3 — check routing and ACLs between source and destination','Layer 7 — check application configuration'],
ans:2,
hint:'SYN sent but no SYN-ACK received means the packet is reaching somewhere but not returning — or being filtered.',
correct_fb:'<strong>Layer 3 investigation</strong> — routing and ACLs. Since other destinations work, Layers 1-2 are fine. The SYN leaving but no SYN-ACK returning suggests either: (1) routing issue preventing return traffic, (2) an ACL on a router blocking the SYN-ACK, or (3) the destination is unreachable but another host is not (asymmetric routing or missing return route). Check "show ip route" and "show access-lists" on routers in the path.',
wrong_fb:'<strong>Layer 3 (Network)</strong> — routing and ACLs. Since other destinations work, physical/data link layers are fine. SYN sent but no SYN-ACK returned points to: an ACL dropping return traffic, a missing return route (asymmetric routing), or a firewall blocking the session. Check "show ip route" and "show access-lists". Layer 7 would only be investigated if connectivity existed but the application was failing.'
},
{topic:0,diff:'hard',type:'Multiple Choice',
q:'Which of the following BEST describes the function of the Data Link layer (Layer 2)?',
opts:['Provides logical addressing and routing between different networks','Provides node-to-node delivery of frames within the same network segment using MAC addresses','Provides end-to-end delivery between processes on different hosts','Provides physical transmission of raw bits over a medium'],
ans:1,
hint:'Layer 2 is concerned with communication within a single network — not between different networks.',
correct_fb:'<strong>Layer 2 (Data Link)</strong> provides <strong>node-to-node delivery within the same network segment</strong> using MAC addresses. It builds frames, adds MAC source/destination addresses, and handles error detection (CRC/FCS). It is divided into LLC (Logical Link Control) and MAC (Media Access Control) sublayers. It does NOT route between networks — that is Layer 3.',
wrong_fb:'<strong>Layer 2 = node-to-node delivery within a segment using MAC addresses</strong>. Layer 3 provides logical (IP) addressing and inter-network routing. Layer 4 provides end-to-end delivery between processes. Layer 1 handles raw bit transmission. Layer 2 includes two sublayers: LLC (error control, flow control) and MAC (addressing, media access).'
},
{topic:0,diff:'hard',type:'Multiple Choice',
q:'What is the difference between TCP and UDP at the Transport layer?',
opts:['TCP is faster; UDP provides error checking','TCP is connection-oriented with guaranteed delivery; UDP is connectionless with no guaranteed delivery','TCP is used for video streaming; UDP is used for web browsing','TCP operates at Layer 3; UDP operates at Layer 4'],
ans:1,
hint:'One uses a three-way handshake; the other just fires packets and hopes for the best.',
correct_fb:'<strong>TCP</strong> is connection-oriented (three-way handshake), provides guaranteed delivery via ACKs, sequencing, and retransmission — reliable but slower. <strong>UDP</strong> is connectionless, no ACKs, no guaranteed delivery — fast but unreliable. Use cases: TCP for HTTP/FTP/SSH/SMTP (data integrity required). UDP for DNS/DHCP/VoIP/video streaming (speed preferred over reliability).',
wrong_fb:'<strong>TCP = reliable, connection-oriented (handshake + ACKs). UDP = fast, connectionless (no handshake)</strong>. Both are Layer 4. TCP: web (HTTP/S), email (SMTP), file transfer (FTP), remote access (SSH). UDP: DNS queries, DHCP, VoIP, video streaming, SNMP. The CCNA exam often asks which protocol (TCP or UDP) a given application uses.'
},
{topic:0,diff:'hard',type:'Scenario',
q:'A user reports that a website loads slowly. A network engineer confirms physical connectivity is good, IP routing is working, and DNS resolution succeeds. At which OSI layer should investigation continue?',
opts:['Layer 1 – Physical (cable quality)','Layer 2 – Data Link (frame errors)','Layer 4 – Transport (TCP window size/congestion)','Layer 3 – Network (routing table)'],
ans:2,
hint:'Slow performance with everything else working often points to flow control or congestion.',
correct_fb:'<strong>Layer 4 (Transport)</strong> — specifically TCP performance. When physical, routing, and DNS all work but performance is slow, TCP issues are the likely cause: small window size limiting throughput, retransmissions due to packet loss, or high RTT causing slow congestion window growth. Use tools like Wireshark to check for retransmissions, duplicate ACKs, or zero-window events.',
wrong_fb:'<strong>Layer 4 (Transport) — TCP performance</strong>. Since Layers 1-3 and DNS (Layer 7) are confirmed working, the slowness points to TCP issues: retransmissions, small window size, high latency causing slow slow-start, or packet loss triggering congestion control. Wireshark can reveal duplicate ACKs or retransmissions. QoS at Layer 3/4 may also help prioritize traffic.'
},
{topic:0,diff:'easy',type:'Multiple Choice',
q:'Which layer of the OSI model do wireless access points primarily operate at?',
opts:['Layer 1 only','Layer 1 and Layer 2','Layer 3','Layer 4'],
ans:1,
hint:'Wireless APs handle radio signals AND MAC address-based frame forwarding.',
correct_fb:'Wireless Access Points operate at <strong>Layer 1 (Physical)</strong> — handling radio frequencies, signal strength, and channel management — AND <strong>Layer 2 (Data Link)</strong> — using 802.11 MAC addresses to manage wireless frames. They bridge wireless (802.11) and wired (802.3 Ethernet) at Layer 2.',
wrong_fb:'Wireless APs operate at <strong>Layer 1 and Layer 2</strong>. Layer 1: radio signals, frequencies, channels (802.11a/b/g/n/ac/ax). Layer 2: 802.11 MAC addressing, CSMA/CA media access, frame forwarding. APs do NOT route traffic (Layer 3) — that\'s a router\'s job. A wireless router combines AP + router functionality across Layers 1-3.'
},
{topic:0,diff:'medium',type:'Multiple Choice',
q:'HTTPS (secure web traffic) relies on SSL/TLS for encryption. At which OSI layer does SSL/TLS primarily operate?',
opts:['Layer 4 – Transport','Layer 5 – Session','Layer 6 – Presentation','Layer 7 – Application'],
ans:2,
hint:'SSL/TLS handles encryption and decryption — a data formatting/translation function.',
correct_fb:'SSL/TLS operates primarily at <strong>Layer 6 (Presentation)</strong>, which handles encryption, decryption, and data formatting. SSL/TLS encrypts application data before transmission and decrypts it upon receipt. Some models place SSL/TLS between Layer 4 and 7, but for CCNA purposes, encryption = Layer 6 Presentation.',
wrong_fb:'SSL/TLS encryption is a <strong>Layer 6 (Presentation)</strong> function. The Presentation layer is responsible for data translation, encryption, compression, and formatting. HTTPS = HTTP (Layer 7) + SSL/TLS encryption (Layer 6). TCP at Layer 4 handles the transport of the encrypted data but doesn\'t perform the encryption itself.'
